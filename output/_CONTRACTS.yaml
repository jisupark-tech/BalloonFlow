# ═══════════════════════════════════════════
# CROSS-CLASS METHOD CALL CONTRACTS
# Verifies caller→target method resolution
# ═══════════════════════════════════════════
method_calls:
  - caller: "GameBootstrap.OnPlayClicked"
    target: "LevelManager.LoadLevel(int)"
    requires: "LevelManager.HasInstance, LevelDataProvider initialized"

  - caller: "GameBootstrap.OnNextClicked"
    target: "LevelManager.GetNextLevelId()"

  - caller: "GameBootstrap.OnRetryClicked"
    target: "LevelManager.RetryLevel()"

  - caller: "GameBootstrap.HandleLevelCompleted"
    target: "GameBootstrap.ShowResultPage(bool, int, int)"

  - caller: "GameBootstrap.HandleLevelFailed"
    target: "ContinueHandler.CanContinue()"

  - caller: "GameBootstrap.RefreshCurrencyDisplay"
    target: "CurrencyManager.Coins, GemManager.Gems"

  - caller: "LevelManager.LoadLevel"
    target: "LevelDataProvider.GetLevelData(int)"
    requires: "LevelDataProvider must be on same GO or wired via SerializeField"

  - caller: "LevelManager.SetupLevel"
    target: "DartManager.ResetAll()"
    requires: "DartManager.HasInstance"

  - caller: "LevelManager.SetupLevel"
    target: "PopProcessor.ResetAll()"
    requires: "PopProcessor.HasInstance"

  - caller: "LevelManager.SetupLevel"
    target: "HolderManager.InitializeHolders(List<ValueTuple>)"
    requires: "HolderManager.HasInstance"

  - caller: "LevelManager.SetupLevel"
    target: "BalloonController.SetupBalloons(List<BalloonSetupData>, int)"
    requires: "BalloonController.HasInstance"

  - caller: "LevelManager.SetupLevel"
    target: "BoardStateManager.InitializeBoard(int, int)"
    requires: "BoardStateManager.HasInstance"

  - caller: "LevelManager.SetupLevel"
    target: "GimmickManager.InitializeGimmicks(LevelConfig)"
    requires: "GimmickManager.HasInstance (Singleton)"

  - caller: "DartManager.SpawnDart"
    target: "ObjectPoolManager.Get(string, Vector3, Quaternion)"
    requires: "Pool 'Dart' must be registered"

  - caller: "BalloonController.GetOrCreateBalloonObject"
    target: "ObjectPoolManager.Get(string)"
    requires: "Pool 'Balloon' must be registered"

  - caller: "DartManager.TryHitBalloon"
    target: "BalloonIdentifier.Color, BalloonIdentifier.IsPopped"
    requires: "Balloon prefab must have BalloonIdentifier component"

  - caller: "DartManager.ExecuteHit"
    target: "HolderManager.ConsumeMagazine(int)"

  - caller: "HolderManager.HandleRailLoopComplete"
    target: "HolderManager.ReturnToHolder(int, int) or RemoveHolder(int)"

  - caller: "ObjectPoolManager.OnSingletonAwake"
    target: "Resources.Load<GameObject>(Prefabs/Balloon)"
    requires: "Prefabs must exist in Assets/Resources/Prefabs/"

# ═══════════════════════════════════════════
# ASSET REQUIREMENTS
# Every runtime-loaded asset must exist
# ═══════════════════════════════════════════
asset_requirements:
  - path: "Resources/Prefabs/Balloon"
    type: GameObject
    created_by: "Editor/PrefabBuilder.cs"
    required_for: [ObjectPoolManager, BalloonController]

  - path: "Resources/Prefabs/Dart"
    type: GameObject
    created_by: "Editor/PrefabBuilder.cs"
    required_for: [ObjectPoolManager, DartManager]

  - path: "Resources/Prefabs/Holder"
    type: GameObject
    created_by: "Editor/PrefabBuilder.cs"
    required_for: [ObjectPoolManager]

  - path: "Resources/Sprites/BalloonSprite"
    type: Sprite
    created_by: "Editor/PrefabBuilder.cs"
    required_for: ["Balloon prefab SpriteRenderer"]

  - path: "Resources/Sprites/DartSprite"
    type: Sprite
    created_by: "Editor/PrefabBuilder.cs"
    required_for: ["Dart prefab SpriteRenderer"]

  - path: "Resources/Sprites/HolderSprite"
    type: Sprite
    created_by: "Editor/PrefabBuilder.cs"
    required_for: ["Holder prefab SpriteRenderer"]
