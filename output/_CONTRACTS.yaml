# BalloonFlow Integration Contract Registry
# Generated by Main Coder | Phase 0+1 | 2026-03-12
# This file tracks ALL cross-file dependencies to prevent integration failures.

project: "BalloonFlow"
version: 2
last_updated: "2026-03-12"

# ═══════════════════════════════════════════
# EVENT CONTRACTS
# Every event must have ≥1 publisher AND ≥1 subscriber
# ═══════════════════════════════════════════
events:
  # ── Input Events ──
  - name: OnHolderTapped
    struct_file: GameEvents.cs
    fields:
      holderId: int
    publishers: [InputHandler]
    subscribers: [HolderManager]

  - name: OnInputStateChanged
    struct_file: GameEvents.cs
    fields:
      enabled: bool
    publishers: [InputHandler]
    subscribers: []  # UI feedback (Phase 2+)

  # ── Holder Events ──
  - name: OnHolderSelected
    struct_file: GameEvents.cs
    fields:
      holderId: int
      color: int
      magazineCount: int
    publishers: [HolderManager]
    subscribers: [DartManager]

  - name: OnHolderReturned
    struct_file: GameEvents.cs
    fields:
      holderId: int
      remainingMagazine: int
    publishers: [HolderManager]
    subscribers: [BoardStateManager]

  - name: OnHolderOverflow
    struct_file: GameEvents.cs
    fields:
      holderCount: int
    publishers: [HolderManager]
    subscribers: [BoardStateManager]

  - name: OnAllHoldersEmpty
    struct_file: GameEvents.cs
    fields: {}
    publishers: [HolderManager]
    subscribers: [BoardStateManager]

  - name: OnMagazineEmpty
    struct_file: GameEvents.cs
    fields:
      holderId: int
    publishers: [HolderManager]
    subscribers: []

  # ── Dart Events ──
  - name: OnDartDeployed
    struct_file: GameEvents.cs
    fields:
      dartId: int
      color: int
      position: Vector3
    publishers: [DartManager]
    subscribers: [FeedbackController]

  - name: OnDartFired
    struct_file: GameEvents.cs
    fields:
      dartId: int
      holderId: int
      color: int
    publishers: [DartManager]
    subscribers: [FeedbackController]

  - name: OnDartHitBalloon
    struct_file: GameEvents.cs
    fields:
      dartId: int
      balloonId: int
    publishers: [DartManager]
    subscribers: [PopProcessor]

  - name: OnRailLoopComplete
    struct_file: GameEvents.cs
    fields:
      holderId: int
      remainingMagazine: int
    publishers: [DartManager]
    subscribers: [HolderManager]

  - name: OnDeploymentComplete
    struct_file: GameEvents.cs
    fields:
      color: int
      count: int
    publishers: [DartManager]
    subscribers: []

  # ── Balloon Events ──
  - name: OnBalloonPopped
    struct_file: GameEvents.cs
    fields:
      balloonId: int
      color: int
      position: Vector3
    publishers: [BalloonController]
    subscribers: [PopProcessor, ScoreManager, BoardStateManager]

  - name: OnGimmickTriggered
    struct_file: GameEvents.cs
    fields:
      gimmickType: string
      targetId: int
    publishers: [BalloonController]
    subscribers: [GimmickManager, FeedbackController]

  # ── Score Events ──
  - name: OnScoreChanged
    struct_file: GameEvents.cs
    fields:
      currentScore: int
      delta: int
    publishers: [ScoreManager]
    subscribers: [HUDController]

  # ── Board Events ──
  - name: OnBoardCleared
    struct_file: GameEvents.cs
    fields:
      levelId: int
    publishers: [BoardStateManager]
    subscribers: [LevelManager]

  - name: OnBoardFailed
    struct_file: GameEvents.cs
    fields:
      levelId: int
      reason: string
    publishers: [BoardStateManager, HolderManager]
    subscribers: [LevelManager]

  - name: OnBoardStateChanged
    struct_file: GameEvents.cs
    fields:
      remainingBalloons: int
      totalBalloons: int
    publishers: [BoardStateManager]
    subscribers: [HUDController]

  # ── Level Events ──
  - name: OnLevelLoaded
    struct_file: GameEvents.cs
    fields:
      levelId: int
      packageId: int
    publishers: [LevelManager]
    subscribers: [BalloonController, HUDController, BoardStateManager]

  - name: OnLevelCompleted
    struct_file: GameEvents.cs
    fields:
      levelId: int
      score: int
      starCount: int
    publishers: [LevelManager]
    subscribers: [GameBootstrap]

  - name: OnLevelFailed
    struct_file: GameEvents.cs
    fields:
      levelId: int
    publishers: [LevelManager]
    subscribers: [GameBootstrap]

  # ── Economy Events ──
  - name: OnCoinChanged
    struct_file: GameEvents.cs
    fields:
      currentCoins: int
      delta: int
      source: string
    publishers: [CurrencyManager]
    subscribers: [GameBootstrap]

  - name: OnGemChanged
    struct_file: GameEvents.cs
    fields:
      currentGems: int
      delta: int
    publishers: [GemManager]
    subscribers: [GameBootstrap]

  # ── UI Events ──
  - name: OnPageChanged
    struct_file: GameEvents.cs
    fields:
      pageName: string
    publishers: [UIManager, PageController]
    subscribers: []

  - name: OnPopupRequested
    struct_file: GameEvents.cs
    fields:
      popupId: string
      priority: int
    publishers: []  # Various systems
    subscribers: [PopupManager]

  - name: OnPopupClosed
    struct_file: GameEvents.cs
    fields:
      popupId: string
    publishers: [PopupManager]
    subscribers: []

  # ── Combo Events ──
  - name: OnComboIncremented
    struct_file: GameEvents.cs
    fields:
      comboCount: int
    publishers: [PopProcessor]
    subscribers: [FeedbackController, ScoreManager]

# ═══════════════════════════════════════════
# OBJECTPOOL KEY CONTRACTS
# Every pool key must have a prefab in _ASSET_MANIFEST.yaml
# ═══════════════════════════════════════════
pool_keys:
  - key: "Balloon"
    prefab_path: "Resources/Prefabs/Balloon"
    consumers: [BalloonController]
    required_components: [BalloonIdentifier, SpriteRenderer, CircleCollider2D]
    initial_size: 30

  - key: "Dart"
    prefab_path: "Resources/Prefabs/Dart"
    consumers: [DartManager]
    required_components: [SpriteRenderer, CircleCollider2D]
    initial_size: 20

  - key: "Holder"
    prefab_path: "Resources/Prefabs/Holder"
    consumers: []  # Not currently pooled, but available for visual holder spawn
    required_components: [HolderIdentifier, SpriteRenderer, BoxCollider2D]
    initial_size: 10

