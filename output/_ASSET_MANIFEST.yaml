# BalloonFlow Asset Manifest
# Generated by Main Coder | Phase 0+1 | 2026-03-12
# Lists ALL Unity assets required at runtime.

project: "BalloonFlow"
version: 1
last_updated: "2026-03-12"

# ═══════════════════════════════════════════
# PREFABS (Resources/Prefabs/)
# ═══════════════════════════════════════════
prefabs:
  - name: Balloon
    path: "Assets/Resources/Prefabs/Balloon.prefab"
    components: [SpriteRenderer, CircleCollider2D, BalloonIdentifier]
    pool_key: "Balloon"
    created_by: "Editor/PrefabBuilder.cs"
    notes: "White circle sprite, color set at runtime. Scale 0.8x"

  - name: Dart
    path: "Assets/Resources/Prefabs/Dart.prefab"
    components: [SpriteRenderer, CircleCollider2D]
    pool_key: "Dart"
    created_by: "Editor/PrefabBuilder.cs"
    notes: "Diamond sprite, trigger collider. Scale 0.5x"

  - name: Holder
    path: "Assets/Resources/Prefabs/Holder.prefab"
    components: [SpriteRenderer, BoxCollider2D, HolderIdentifier]
    pool_key: "Holder"
    created_by: "Editor/PrefabBuilder.cs"
    notes: "Rounded rect sprite, tap detection via InputHandler raycast"

# ═══════════════════════════════════════════
# SCENES
# ═══════════════════════════════════════════
scenes:
  - name: GameScene
    path: "Assets/Scenes/GameScene.unity"
    created_by: "Editor/SceneBuilder.cs"
    version_key: "BalloonFlow_SceneBuilt_v4"
    camera:
      type: orthographic
      size: 10
      tag: MainCamera
    canvas:
      render_mode: ScreenSpaceOverlay
      scaler: ScaleWithScreenSize
      reference_resolution: [1080, 1920]
      match: 0.5
    pages:
      - name: TitlePage
        default_visible: true
        children: [LogoText, SubtitleText, TapToStart]
      - name: MainPage
        default_visible: false
        children: [MainTitle, CurrencyBar, PlayButton]
      - name: GamePage
        default_visible: false
        children: [HUD_Top, BoardArea, HolderArea]
      - name: ResultPage
        default_visible: false
        children: [ResultPanel]
      - name: LevelSelectPage
        default_visible: false
      - name: SettingsPage
        default_visible: false
      - name: PopupOverlay
        default_visible: false
        children: [PopupContainer]
    manager_objects:
      - name: Mgr_ObjectPool
        component: ObjectPoolManager
      - name: Mgr_Input
        component: InputHandler
        wiring: [{field: _gameCamera, source: "Main Camera"}]
      - name: Mgr_UI
        component: UIManager
      - name: Mgr_Popup
        component: PopupManager
        wiring: [{field: _overlayBackground, source: "PopupOverlay"}]
      - name: Mgr_Rail
        component: RailManager
      - name: Mgr_Score
        component: ScoreManager
      - name: Mgr_Level
        components: [LevelManager, LevelDataProvider]
        wiring: [{field: _levelDataProvider, source: "self (LevelDataProvider)"}]
      - name: Mgr_BoardState
        component: BoardStateManager
      - name: Mgr_Holder
        component: HolderManager
      - name: Mgr_Dart
        component: DartManager
      - name: Mgr_Balloon
        component: BalloonController
      - name: Mgr_Pop
        component: PopProcessor
      - name: Mgr_HUD
        component: HUDController
        wiring:
          - {field: _scoreText, source: "ScoreText"}
          - {field: _remainingText, source: "RemainingText"}
          - {field: _holderCountText, source: "HolderText"}
          - {field: _levelText, source: "LevelText"}
      - name: Mgr_Page
        component: PageController
        wiring:
          - {field: _titlePage, source: "TitlePage"}
          - {field: _mainPage, source: "MainPage"}
          - {field: _levelSelectPage, source: "LevelSelectPage"}
          - {field: _gamePage, source: "GamePage"}
          - {field: _resultPage, source: "ResultPage"}
          - {field: _settingsPage, source: "SettingsPage"}
      - name: Mgr_Feedback
        component: FeedbackController
      - name: Mgr_Currency
        component: CurrencyManager
      - name: Mgr_Gem
        component: GemManager
      - name: Mgr_Life
        component: LifeManager
      - name: Mgr_DailyReward
        component: DailyRewardManager
      - name: Mgr_Booster
        component: BoosterManager
      - name: Mgr_Continue
        component: ContinueHandler
      - name: Mgr_Shop
        component: ShopManager
      - name: Mgr_Ad
        component: AdManager
      - name: Mgr_Offer
        component: OfferManager
      - name: Mgr_IAP
        component: IAPManager
      - name: Mgr_Package
        component: PackageManager
      - name: Mgr_Gimmick
        component: GimmickManager
      - name: Mgr_Balance
        component: BalanceProcessor
      - name: Mgr_TutorialCtrl
        component: TutorialController
      - name: Mgr_TutorialMgr
        component: TutorialManager
      - name: GameBootstrap
        component: GameBootstrap
        wiring:
          - {field: _titlePage, source: "TitlePage (CanvasGroup)"}
          - {field: _mainPage, source: "MainPage (CanvasGroup)"}
          - {field: _gamePage, source: "GamePage (CanvasGroup)"}
          - {field: _resultPage, source: "ResultPage (CanvasGroup)"}
          - {field: _playButton, source: "PlayButton (Button)"}
          - {field: _resultTitleText, source: "ResultTitle (Text)"}
          - {field: _resultScoreText, source: "ResultScore (Text)"}
          - {field: _nextButton, source: "NextButton (Button)"}
          - {field: _retryButton, source: "RetryButton (Button)"}
          - {field: _homeButton, source: "HomeButton (Button)"}
          - {field: _coinDisplayText, source: "CoinText (Text)"}
          - {field: _gemDisplayText, source: "GemText (Text)"}

# ═══════════════════════════════════════════
# EDITOR SCRIPTS
# ═══════════════════════════════════════════
editor_scripts:
  - name: SceneBuilder
    path: "Editor/SceneBuilder.cs"
    creates: [scenes, manager_objects, ui_hierarchy, serialized_field_wiring]
    version_key: "BalloonFlow_SceneBuilt_v4"
    execution: "[InitializeOnLoad] + EditorApplication.delayCall"
    menu: "BalloonFlow/Rebuild Scenes"

  - name: PrefabBuilder
    path: "Editor/PrefabBuilder.cs"
    creates: [prefabs, sprites]
    version_key: "BalloonFlow_PrefabsBuilt_v1"
    execution: "[InitializeOnLoad] + EditorApplication.delayCall"
    menu: "BalloonFlow/Rebuild Prefabs"

  - name: ProjectConfigurator
    path: "Editor/ProjectConfigurator.cs"
    creates: [build_settings, player_settings]
    execution: "[InitializeOnLoad]"

# ═══════════════════════════════════════════
# RESOURCES (sprites, data)
# ═══════════════════════════════════════════
resources:
  - path: "Assets/Resources/Sprites/BalloonSprite.png"
    type: Sprite
    created_by: "Editor/PrefabBuilder.cs"
    pixels_per_unit: 64

  - path: "Assets/Resources/Sprites/DartSprite.png"
    type: Sprite
    created_by: "Editor/PrefabBuilder.cs"
    pixels_per_unit: 64

  - path: "Assets/Resources/Sprites/HolderSprite.png"
    type: Sprite
    created_by: "Editor/PrefabBuilder.cs"
    pixels_per_unit: 64
