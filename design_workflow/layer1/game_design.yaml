technical:
  min_android_sdk: 24
  min_ios: "14.0"
  target_fps: 60
  max_draw_calls: 50
  max_balloon_on_screen: 80
  object_pool_required: true
  screen_orientation: portrait
  render_pipeline: "3D (URP 권장)"

