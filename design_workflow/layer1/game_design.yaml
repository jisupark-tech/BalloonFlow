# ─────────────────────────────────────
# 8. Art Direction — concept.yaml _LOCKED
# ─────────────────────────────────────
art_direction:
  style: "깔끔하고 찰진 3D 하이퍼 캐주얼 스타일"
  direction: "캐릭터화하지 않고 오브젝트 질감과 색감으로 승부. Yarn Loop 미감 지향."
  balloon: "매끄럽고 쫀득한 고무 물풍선. 볼록하고 탱글탱글, 겹겹이 쌓임."
  holder: "상자 형태, 숫자 뱃지, 볼륨감. 표정 없이 깨끗한 오브젝트."
  dart: "핀/침 형태. 보관함과 동일 색상. 표정 없이 깨끗한 오브젝트."
  background: "깔끔한 파스텔 톤 단색 배경 (민트 그라데이션 등). 풍선+다트에만 시선 100%."
  pop_effect: "물/반짝이 파편 방사형 + 파열음 피치 상승 + 마지막 풍선 화면 흔들림. 레일 위에서 다트를 발사하는 정도(담백)"

# ─────────────────────────────────────
# 9. Technical Requirements
