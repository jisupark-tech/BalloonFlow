# BalloonFlow — Stage 2-5: BM — Monetization Detail
# STATUS: confirmed — 1.0(소프트런칭) 범위
# 정본 참조: 아웃게임디렉션.md, systems/outgame.yaml

domain: BM
sub_doc: monetization
status: confirmed

# ─────────────────────────────────────
# 1. 수익화 모델
# ─────────────────────────────────────
monetization_model: "F2P + IAP + Ad"
scope: "1.0은 Static Pricing만. Dynamic Pricing은 소프트런칭 데이터 확인 후"

# ─────────────────────────────────────
# 2. 가치 계산 체계 (단일 가치 시스템)
# ─────────────────────────────────────
value_system:
  description: "모든 IAP 상품의 가치는 총가치(유저 관점 인지 가치) 단일 기준으로 관리"
  base_rate:
    reference: "Standard Coin T1 ($0.99 = 900코인)"
    coins_per_dollar: 909.09
    dollar_per_coin: 0.0011

  formulas:
    total_value_efficiency: "상품의 총가치($) / 판매 가격($)"
    total_value_discount: "1 - (판매 가격($) / 상품의 총가치($))"
    coin_efficiency: "제공 코인 총가치($) / 판매 가격($)"
    coin_discount: "1 - (판매 가격($) / 제공 코인 총가치($))"
    coin_ratio: "제공 코인 총가치 / 상품의 총가치"
    continue_equiv: "제공 코인 / 900"

  design_principles:
    - "Tier 1($0.99) = 이어하기 1회(900코인). 경제의 기준점"
    - "코인량은 이어하기 0.5회(450코인)의 배수"
    - "100, 500, 1000 등 딱 떨어지는 명료한 숫자 단위 우선"
    - "상위 가격 상품은 하위 가격 상품보다 총가치 반드시 높아야 함"

  booster_unit_values:
    tray_add: { coins: 300, usd: 0.33 }
    shuffle: { coins: 500, usd: 0.55 }
    hand: { coins: 633, usd: 0.70 }
    color_remove: { coins: 967, usd: 1.06 }
    set_of_4: { coins: 2400, usd: 2.64 }

# ─────────────────────────────────────
