# BalloonFlow — Stage 2-5: BM — Monetization Detail
# Full monetization strategy and revenue projections

domain: BM
sub_doc: monetization

# ─────────────────────────────────────
# 1. Revenue Model Mix
# ─────────────────────────────────────
revenue_model:
  type: "F2P + IAP + Ad (Hybrid)"
  target_split:
    iap: 55   # %
    ad: 45    # %
  note: "초기 광고 비중 높음 → 유저 성숙 후 IAP 비중 증가 목표"

# ─────────────────────────────────────
# 2. Ad Strategy
# ─────────────────────────────────────
ad_strategy:
  rewarded:
    placements:
      - { id: "free_heart", trigger: "하트 0 상태 팝업", reward: "하트 1개", cap: "5/day" }
      - { id: "free_continue", trigger: "레벨 실패 팝업", reward: "다트 +5 이어하기", cap: "3/day" }
      - { id: "free_booster", trigger: "레벨 시작 부스터 슬롯", reward: "랜덤 부스터", cap: "3/day" }
      - { id: "double_reward", trigger: "클리어 결과 화면", reward: "코인 2x", cap: "10/day" }
      - { id: "free_coin", trigger: "상점 내 무료 코인 버튼", reward: "코인 200", cap: "5/day" }
      - { id: "spin_wheel", trigger: "일일 룰렛 추가 스핀", reward: "랜덤 보상", cap: "3/day" }
    avg_daily_views_target: 6
    revenue_per_view: 0.02   # USD eCPM $20 기준

  interstitial:
    frequency: "매 3레벨 클리어 후"
    cooldown_sec: 120
    skip_rules:
      - "Level 1~5 (튜토리얼)"
      - "첫 세션 15분"
      - "IAP 유저 50% 감소"
      - "연속 실패 3회 직후 (유저 이탈 방지)"
    avg_daily_views_target: 4
    revenue_per_view: 0.01   # eCPM $10 기준

  daily_ad_revenue_estimate:
    rewarded: "6 * 0.02 = $0.12"
    interstitial: "4 * 0.01 = $0.04"
    total: "$0.16/DAU/day"

# ─────────────────────────────────────
# 3. IAP Strategy
# ─────────────────────────────────────
iap_strategy:
  gem_packs:
    - { id: "gem_xs", name: "소량 젬", gems: 80, price: 0.99, gem_per_dollar: 80.8, badge: "" }
    - { id: "gem_s", name: "중간 젬", gems: 500, price: 4.99, gem_per_dollar: 100.2, badge: "인기" }
    - { id: "gem_m", name: "대량 젬", gems: 1200, price: 9.99, gem_per_dollar: 120.1, badge: "추천" }
    - { id: "gem_l", name: "메가 젬", gems: 3000, price: 19.99, gem_per_dollar: 150.1, badge: "핫딜" }
    - { id: "gem_xl", name: "울트라 젬", gems: 8000, price: 49.99, gem_per_dollar: 160.0, badge: "최고 가치" }

  special_offers:
    starter_pack:
      trigger: "Level 10 클리어"
      time_limit: "24h"
      price: 1.99
      contents: ["젬 100", "부스터팩 (3종 x3)", "하트 풀 충전"]
      value_ratio: 5.0
      target_conversion: 0.05

    level_rescue_pack:
      trigger: "같은 레벨 3회 연속 실패"
      time_limit: "6h"
      price: 3.99
      contents: ["젬 150", "Bomb Dart x5", "Rainbow Dart x5", "Extra Darts x5"]
      value_ratio: 3.5
      target_conversion: 0.08

    weekend_pack:
      trigger: "주말 첫 로그인"
      time_limit: "48h"
      price: 2.99
      contents: ["젬 120", "코인 5000", "부스터 랜덤팩 x5"]
      value_ratio: 4.0
      target_conversion: 0.04

  no_ads:
    price: 4.99
    type: "non_consumable"
    effect: "전면 광고 완전 제거. 보상형 광고는 선택 유지."
    target_conversion: 0.02

  piggy_bank:
    price: 2.99
    fill_per_level: "젬 3~5개 (레벨 난이도 비례)"
    fill_cycle: "8판 플레이 시 가득 참"
    full_value: "젬 ~35"
    value_ratio: 2.5
    repeat_purchase: true

# ─────────────────────────────────────
# 4. Conversion Funnel
# ─────────────────────────────────────
conversion_funnel:
  D1_payer_rate: 0.01
  D7_payer_rate: 0.03
  D30_payer_rate: 0.05
  avg_purchase_value: 3.50   # USD
  ARPPU_D30: 15.00
  whale_threshold: 50.00   # 총 지출 $50+ = whale
  whale_rate: 0.005

# ─────────────────────────────────────
# 5. First Purchase Journey
# ─────────────────────────────────────
first_purchase_journey:
  steps:
    - { level: "1~5", action: "무료 체험. 광고 없음." }
    - { level: "6~9", action: "첫 광고 노출. 보상형 광고 체험." }
    - { level: 10, action: "스타터팩 오퍼 (24시간 제한)" }
    - { level: "11~20", action: "자연스러운 부스터 필요 발생" }
    - { level: 20, action: "피기뱅크 해금. 누적 시각화 시작." }
    - { level: "20~30", action: "하트 부족 첫 경험. 젬 소비 시작." }
    - { level: 30, action: "시즌패스 해금. 프리미엄 보상 미리보기." }
  target_first_purchase: "Day 1~3, Level 10~30 구간"
