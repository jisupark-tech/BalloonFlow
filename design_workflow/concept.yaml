# BalloonFlow — Stage 2-1: Concept
# Project: BalloonFlow | Genre: Puzzle | Sub-genre: queue_sort
# Generated: 2026-03-11

project: BalloonFlow
genre: Puzzle
sub_genre: queue_sort
platform: unity
resolution: 1080x1920

# ─────────────────────────────────────
# Core Fun
# ─────────────────────────────────────
core_fun:
  one_liner: "다트를 쏘아 같은 색 풍선을 터뜨리는 큐 정리의 쾌감"
  extended: >
    레일 위를 흘러가는 형형색색 풍선들. 플레이어는 다트를 탭하여 같은 색 풍선에 명중시킨다.
    명중한 풍선이 터지며 인접한 같은 색 풍선이 연쇄로 터지는 순간, 무질서가 질서로 변하는
    연쇄 정리의 만족감이 코어 재미를 형성한다. "Oddly Satisfying" 장르의 시청각 쾌감과
    큐 매니지먼트 퍼즐의 전략적 깊이가 결합된 게임.
  satisfaction_keywords:
    - 연쇄 팝 (chain pop)
    - 큐 비우기 (queue clear)
    - 색상 정렬 완료 (color sort complete)
    - 마지막 풍선 터뜨리기 (last balloon pop)

# ─────────────────────────────────────
# Design Pillars (3개)
# ─────────────────────────────────────
design_pillars:
  - name: "Satisfying Pop"
    description: >
      풍선이 터지는 순간의 시청각 피드백이 ASMR급 만족감을 준다.
      연쇄 팝일수록 이펙트와 사운드가 증폭되어 쾌감이 배가된다.
    priority: 1
    metrics:
      - "연쇄 팝 발생률 >= 40% (전체 팝 중)"
      - "세션당 평균 연쇄 길이 >= 2.5"

  - name: "Strategic Queue"
    description: >
      단순 탭이 아닌, 어떤 색 다트를 먼저 쏠지 전략적 판단이 필요하다.
      레일 위 풍선 배열을 읽고 최적의 순서를 계획하는 퍼즐 깊이.
    priority: 2
    metrics:
      - "레벨 완료 시 남은 다트 수 분산 >= 2.0 (전략 차이 발생)"
      - "undo 사용률 >= 15% (의사결정 존재)"

  - name: "Bite-Sized Flow"
    description: >
      한 판 30~90초. 지하철 한 정거장, 엘리베이터 대기 시간에 딱 맞는 분량.
      짧지만 성취감 있는 플레이 단위로 세션을 채운다.
    priority: 3
    metrics:
      - "평균 레벨 클리어 시간 45~75초"
      - "일일 세션 수 >= 3"

# ─────────────────────────────────────
# Target Audience
# ─────────────────────────────────────
target_audience:
  primary:
    age: "25-45"
    gender: "여성 60% / 남성 40%"
    description: "출퇴근 등 자투리 시간에 캐주얼 퍼즐을 즐기는 모바일 유저"
    behavior: "하루 3~5세션, 세션당 5~15분"
  secondary:
    age: "18-24"
    gender: "성별 무관"
    description: "ASMR/Satisfying 콘텐츠를 즐기는 숏폼 세대"
    behavior: "SNS 숏폼 광고로 유입, 시각적 쾌감 중심"

# ─────────────────────────────────────
# Core Loop
# ─────────────────────────────────────
core_loop:
  diagram: >
    [레벨 진입] → [레일 위 풍선 관찰] → [다트 색상 확인]
    → [탭하여 다트 발사] → [같은 색 풍선 명중 → POP!]
    → [인접 같은 색 연쇄 팝] → [새 풍선 유입]
    → [레일 비우기 = 클리어] or [레일 초과 = 실패]
    → [보상/별 획득] → [다음 레벨 or 재도전]
  outer_loop: >
    [레벨 진행] → [챕터 완료] → [신규 기믹 해금]
    → [부스터 획득/구매] → [더 어려운 레벨 도전]
    → [컬렉션 수집] → [시즌 이벤트 참여]

# ─────────────────────────────────────
# Art Direction
# ─────────────────────────────────────
art_direction:
  style: "Flat 2D + 부드러운 파스텔 톤"
  color_palette: "파스텔 레드, 블루, 그린, 옐로, 핑크, 퍼플, 오렌지, 스카이"
  balloon_style: "둥글고 광택 있는 풍선, 살짝 투명한 질감"
  dart_style: "날카롭지만 귀여운 톤의 미니 다트"
  pop_effect: "풍선 터짐 → 색종이 파티클 + 약간의 화면 흔들림"
  background: "챕터별 테마 배경 (하늘, 바다, 숲, 놀이공원 등)"

# ─────────────────────────────────────
# Reference Games
# ─────────────────────────────────────
references:
  - name: "Bubble Shooter"
    relevance: "발사체 + 색상 매칭의 기본 구조"
    difference: "BalloonFlow는 고정 보드가 아닌 흐르는 레일 구조"
  - name: "Sort It 3D"
    relevance: "큐/컨테이너 정렬의 만족감"
    difference: "BalloonFlow는 물리적 발사 메커닉 추가"
  - name: "Zuma"
    relevance: "레일 위 구슬 + 발사체 매칭"
    difference: "BalloonFlow는 다트 큐 매니지먼트 + 연쇄 팝 강화"
