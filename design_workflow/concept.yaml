# BalloonFlow — Stage 2-1: Concept
# Project: BalloonFlow | Genre: Puzzle | Sub-genre: queue_sort
# Source: BalloonFlow_컨셉문서.docx (2026.03.10)
# 전략 3: 리스킨(컨셉/아트 교체) 기반

project: BalloonFlow
genre: Puzzle
sub_genre: queue_sort
platform: unity
resolution: 1080x1920

# ─────────────────────────────────────
# Core Fun
# ─────────────────────────────────────
core_fun:
  one_liner: >
    어떤 색부터 터뜨릴지 고르는 전략적 고민,
    그리고 선택 후 풍선이 팡팡팡 연쇄로 터져나가는 폭발적 쾌감
  extended: >
    Pixel Flow의 검증된 큐 매니지먼트 메카닉을 기반으로 한 컬러 매칭 퍼즐.
    타겟을 픽셀에서 풍선으로 교체하여 터질 때의 감각적 피드백을 강화하고,
    보관함이 레일(원형 루프) 위에서 다트를 발사하는 구조로, 홀더(5칸) 관리가 핵심 긴장감.
  satisfaction_keywords:
    - 보관함 선택의 전략적 긴장감
    - 다트가 톡톡톡 순차 배치되는 기대감
    - 풍선이 팡팡팡 연쇄로 터지는 폭발적 쾌감
    - 보드를 깨끗이 비우는 정리의 만족감

# ─────────────────────────────────────
# Design Pillars (5개) — _LOCKED
# ─────────────────────────────────────
design_pillars:
  - name: "선택의 긴장감"
    description: >
      어떤 색 보관함을 먼저 열지가 클리어 여부를 가른다.
      탄창이 남은 보관함이 홀더로 돌아와 홀더가 꽉 차는 긴장감.
      순서를 잘못 고르면 복귀 보관함으로 홀더가 넘치는 게임 오버.
    priority: 1

  - name: "터뜨리는 쾌감 극대화"
    description: >
      선택 후 풍선이 팡팡 터지는 순간의 시각(파편) + 청각(피치 상승) + 촉각(진동)에
      모든 연출을 집중. Pixel Flow 대비 피드백 밀도가 이 게임의 핵심 자산.
    priority: 2

  - name: "시각적 명확성"
    description: >
      파스텔 단색 배경 위에 풍선과 다트만 존재. 불필요한 요소 없이 100% 시선 집중.
      캐릭터화하지 않고 오브젝트 질감으로 승부.
    priority: 3

  - name: "1초 이해"
    description: >
      보관함 탭 → 레일 위에서 다트 발사 → 풍선 터짐. 별도 세계관 설명 없이
      누구나 즉시 이해 가능한 구조.
    priority: 4

  - name: "쏘는 쪽은 담백, 터지는 쪽은 과하게"
    description: >
      다트와 보관함은 절제된 연출, 풍선 터지는 순간에 모든 연출 리소스를 집중.
      유저 시선이 상단 풍선에 100% 가도록 유도.
    priority: 5

design_pillars_validation_note: >
  이후 모든 시스템, 밸런스, 콘텐츠, BM 기획은 위 필러에 부합하는지를
  기준으로 검증됩니다.

# ─────────────────────────────────────
# Target Audience — _LOCKED
# ─────────────────────────────────────
target_audience:
  primary:
    market: "미국"
    gender: "여성 70% / 남성 30%"
    age_avg: 32
    age_core: "25-34세, 35-44세 핵심층"
    description: >
      Pixel Flow 유저 프로필(여성 71%, 평균 32세)과 거의 일치.
      Oddly Satisfying/ASMR 감성의 차분하고 정돈된 경험을 선호.
    behavior: "하루 3~5세션, 자투리 시간 활용"
  secondary:
    age: "18-24"
    description: "ASMR/Satisfying 콘텐츠를 즐기는 숏폼 세대"
    behavior: "SNS 숏폼 광고로 유입, 시각적 쾌감 중심"

# ─────────────────────────────────────
# Core Mechanic: Color Matching Queue Puzzle — _LOCKED
# ─────────────────────────────────────
core_mechanic:
  basis: "Pixel Flow의 검증된 큐 매니지먼트 메카닉"
  play_flow:
    step_1: "유저가 홀더(5칸)에 대기 중인 색상 보관함을 터치합니다."
    step_2: "보관함이 레일(원형 루프) 위로 올라가 한 바퀴를 돌기 시작합니다."
    step_3: >
      레일을 따라 이동하며 동일 색상의 풍선을 만나면 다트를 발사합니다.
      탄창 숫자(예: 8)만큼 다트가 톡톡톡 발사됩니다.
    step_4: >
      발사된 다트가 동일 색상의 풍선 1개에 순차적으로 1:1 타격합니다.
      풍선에 닿는 즉시 팡 터져나갑니다.
    step_5: >
      레일 도중 탄창이 0이 되면 보관함이 즉시 레일에서 제거됩니다.
      한 바퀴를 돌고도 탄창이 남아있으면 보관함은 홀더로 복귀하여 대기합니다.
    step_6: "빠른 리듬으로 풍선이 연쇄 터지는 속도감을 제공합니다."

  hit_structure: "1:1 (다트 1개 → 풍선 1개 타격)"
  rail_type: "circular_loop (원형 루프 — 보관함이 한 바퀴 순회)"

  pixel_flow_difference:
    feedback: >
      풍선은 픽셀과 달리 터지는 순간 물(또는 반짝이) 파편이 튀고
      소리가 나는 감각적 피드백이 발생.
    structure: >
      보관함이 레일(원형 루프)에 올라가 한 바퀴를 돌며 매칭 풍선에 다트를 발사하는 구조.
      탄창이 남은 채로 한 바퀴를 돌면 홀더로 복귀하여 홀더 초과 실패 리스크가 발생.
      Pixel Flow의 큐 매니지먼트와 동일한 홀더 초과 실패 조건.
    prototype_risk: >
      "보관함 탭 → 다트 레일 배치 → 발사"의 추가 단계가
      기대감이 될지 딜레이가 될지는 프로토타입에서 속도 튜닝을 통해 검증 필요.

# ─────────────────────────────────────
# Core Loop
# ─────────────────────────────────────
core_loop:
  inner: >
    [레벨 진입] → [보드 위 풍선 관찰]
    → [홀더(5칸)에서 보관함 선택 (탭)]
    → [보관함이 레일(원형 루프)에 올라가 한 바퀴 돌며 매칭 풍선에 다트 발사]
    → [동일 색 풍선 1:1 타격 → 팡팡팡 연쇄 터짐]
    → [탄창 0=즉시 제거 / 탄창 남음=홀더 복귀 대기]
    → [보드 비우기 = 클리어] or [홀더 초과 = 실패]
    → [보상 획득] → [다음 레벨]
  outer: >
    [레벨 진행] → [패키지 완료] → [신규 기믹 해금]
    → [부스터 활용] → [컬렉션 수집] → [시즌 이벤트 참여]
  fail_condition:
    status: _CONFIRMED
    primary: >
      홀더 초과. 홀더(5칸) 대기 보관함이 5개를 초과하면 실패.
      탄창이 남은 보관함이 레일에서 홀더로 복귀하면 홀더가 채워지며,
      이 복귀된 보관함으로 인해 홀더가 넘치는 것이 핵심 긴장감.
    holder_slots: 5
    candidates:
      - "홀더(5칸)에 보관함이 가득 차서 새 보관함 추가 불가 (확정)"
      - "탄창이 남은 보관함이 레일에서 복귀 → 홀더 자리 차지 → 초과 시 실패"
    note: >
      홀더 초과 확정 (Pixel Flow 동일). 2순위로 레일 초과 방식(Pencil Loop 변형) 재미 검증은 별도 프로토타입.

# ─────────────────────────────────────
# Art Direction — _LOCKED
# ─────────────────────────────────────
art_direction:
  style: "깔끔하고 찰진 3D 하이퍼 캐주얼 스타일"
  direction: >
    캐릭터화하지 않고 오브젝트 자체의 질감과 색감으로 승부.
    Yarn Loop처럼 차분하고 정돈된 미감을 지향.
  balloon_texture: "매끄럽고 쫀득한 일반적인 고무 물풍선 질감. 볼록하고 탱글탱글하며, 겹겹이 쌓여 있음."
  holder_design: >
    상자 형태로 다양한 색상 적용. 숫자 뱃지가 자연스럽게 붙고,
    탭할 수 있는 볼륨감. 표정 없이 깨끗한 오브젝트.
  dart_design: >
    레일 위에 깔리는 핀/침 형태. 보관함과 동일한 색상으로 통일되어
    색상 매칭이 직관적으로 읽힘. 표정 없이 깨끗한 오브젝트.
  background: "깔끔한 파스텔 톤 단색 배경 (예: 부드러운 민트 그라데이션). 오직 풍선과 다트에게만 100% 시선 집중."
  feedback_juiciness:
    dart_hit: "풍선에 꽂힐 때 물(또는 반짝이) 파편이 방사형으로 튐"
    sound: "터지는 파열음의 피치(음높이)가 점점 올라감: 팡- 팡- 팡- 팡- 팡!!"
    last_balloon: "마지막 풍선이 터질 때 피치 최고점에서 크게 터지며 화면이 살짝 흔들림"
    asymmetry: "연출 비대칭 원칙 — 쏘는 쪽(다트)은 담백하게 — 레일 위에서 다트를 발사하는 정도, 터지는 쪽(풍선)은 과하게"

# ─────────────────────────────────────
# World Building & Framing
# ─────────────────────────────────────
framing:
  ingame: >
    보관함이 레일에 올라가 다트를 발사해 풍선을 터뜨리는 구조는 단순하고 직관적.
    별도의 세계관 설명 없이도 1초 만에 이해됨.
  outgame:
    status: _CONFIRMED
    plan: >
      아웃게임 기본값 설정 완료 (라이프, 부스터 4종, 컨티뉴, 코인 경제, 상점, 광고, 데일리 보상).
      정본: systems/outgame.yaml
  meta:
    status: _DEFERRED
    plan: "메타 시스템(컬렉션, 꾸미기 등)은 리텐션 데이터를 기반으로 도입 여부를 검토."

# ─────────────────────────────────────
# UI/UX Layout — _LOCKED
# ─────────────────────────────────────
ui_layout:
  screen_areas:
    - { area: "상단 UI", content: "Level 25, Coins 350 — 최소한의 정보만 표시" }
    - { area: "상단 보드", content: "색상별 풍선이 겹겹이 쌓여있는 퍼즐 영역" }
    - { area: "컨베이어", content: "보관함에서 나온 다트가 레일을 따라 이동하며 풍선을 향해 발사되는 구간" }
    - { area: "하단 슬롯", content: "그리드에 각 색상의 보관함(탄창 숫자 표시). 탭하면 다트가 레일에 순차 배치" }
    - { area: "타이틀", content: "'Balloon Flow!' — 화면 하단에 깨끗하고 명확하게 표시" }
  note: "실제 게임 화면이 아닌 컨셉 참고용 시안. 풍선 보드의 레이아웃과 보관함 + 다트 구조를 참고."

# ─────────────────────────────────────
# Events & Live Operations (컨셉 확정분)
# ─────────────────────────────────────
events_concept:
  win_streak_bonus:
    description: "한 세션 안에서 연속 플레이를 유도하는 구조. 보너스 자체가 '더 많이 터뜨리는 경험'."
    streaks:
      - { streak: 3, reward: "클리어 시 보너스 풍선이 화면에 추가 등장 → 터지며 추가 보상" }
      - { streak: 5, reward: "골드 풍선이 섞여 터지며 추가 코인 지급" }
      - { streak: 10, reward: "특별 풍선이 연쇄로 팡팡팡 터지며 대량 보상" }

  seasonal_operation:
    name: "풍선 축제"
    description: "풍선의 비주얼만 교체하면 시즌이 갱신. 아트 리소스 교체 비용이 낮으면서 신선함 확보."
    examples:
      - "봄: 벚꽃 풍선"
      - "여름: 수박 풍선"
      - "할로윈: 호박 풍선"
      - "크리스마스: 오너먼트 풍선"
    skins: "시즌 한정 다트/보관함 스킨으로 수집 동기 부여"

  season_pass:
    structure: "업계 표준 구조"
    free_track: "기능적 보상 (코인, 부스터, 라이프 리필)"
    premium_track: "꾸미기 보상 (시즌 한정 풍선 이펙트, 다트/보관함 스킨)"
    philosophy: "더 예쁘게 터뜨리는 경험이지, 더 쉽게 클리어하는 파워가 아님"

  daily_challenge:
    name: "오늘의 풍선"
    description: "매일 특수 조건의 레벨이 하나 열림"
    examples:
      - "빨간 풍선만 100개 터뜨리기"
      - "30초 안에 전부 클리어"
      - "보관함 3개로 보드 비우기"
    reward: "클리어 시 시즌 패스 경험치 지급"

# ─────────────────────────────────────
# Strategic Positioning
# ─────────────────────────────────────
positioning:
  vs_pixel_flow:
    target_object: "픽셀 → 풍선"
    feedback: "픽셀 제거(시각적 피드백 약함) → 물/반짝이 파편 + 파열음 피치 상승(ASMR급)"
    agent: "색상 큐브 → 색상 보관함 + 다트(역할 분리)"
    magazine_animation: "숫자만 감소 → 보관함에서 다트가 순차 배치→발사 (속도 튜닝 검증 필요)"
    outgame: "하트, 부스터 등 기본 시스템 보유(D30 12.4%) → 피어 분석 후 설계 (Pencil Loop 포함)"

  yarn_loop_comparison: >
    Yarn Loop은 "뜨개질로 된 아트를 풀어서 해체한다"는, 제거 행위 자체의 질감과
    세계관이 달라진 케이스. Balloon Flow는 세계관 전환이 아니라
    "터지는 순간의 감각적 피드백 강화"로 차별화를 잡음.

  differentiation: >
    컨셉 전환의 깊이는 Yarn Loop에 미치지 못하지만,
    Pixel Flow가 제공하지 못하는 피드백 밀도 차이로 승부.
    시각/청각/촉각(진동) 채널을 동시에 자극.

# ─────────────────────────────────────
# Risks
# ─────────────────────────────────────
risks:
  - id: R1
    risk: "컨셉 전환이 약하면 'Pixel Flow 짝퉁' 인식 가능성"
    mitigation: "풍선 피드백 품질이 체감될 수준으로 차별화"
  - id: R2
    risk: "Loom Games(원작)가 시즌 테마로 같은 영역을 커버할 가능성"
    mitigation: "피드백 품질과 속도감이 해자(moat)"
  - id: R3
    risk: "풍선 터뜨리기 소재가 캐주얼 시장에서 흔한 소재"
    mitigation: "ASMR급 피드백 품질로 돌파"
  - id: R4
    risk: >
      다트 발사 행위의 톤이 타겟 유저(미국, 여성 70%, 32세) 감성과 충돌 가능성.
      Oddly Satisfying/ASMR 감성은 차분하고 정돈되는 방향인데 "다트 발사"는 액션적 톤.
    mitigation: "다트의 시각적 존재감을 최소화하고 풍선 피드백에 집중시키는 연출 튜닝"

# ─────────────────────────────────────
# Reference Games — _LOCKED
# ─────────────────────────────────────
references:
  - name: "Pixel Flow"
    relevance: "검증된 큐 매니지먼트 메카닉 원본. 코어 루프 참고."
