summary: >
  Pixel Flow의 검증된 큐 메카닉을 그대로 가져가되, 타겟을 픽셀에서 풍선으로 교체하여
  터질 때의 감각적 피드백을 근본적으로 강화하고, 보관함이 레일(원형 루프)에 올라가
