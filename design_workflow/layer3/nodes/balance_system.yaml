# ═══════════════════════════════════════════
# BalloonFlow — L3 Node: Balance System
# ═══════════════════════════════════════════
# Phase 2 | Owner: Main Coder
# Systems: DifficultyCalculator, BalanceProcessor

node_id: balance_system
phase: 2
coder: main

systems:
  - DifficultyCalculator
  - BalanceProcessor

contracts:
  DifficultyCalculator:
    provides:
      - "CalculateDifficulty(levelData) -> float"
      - "GetSawtoothModifier(levelNumber) -> float"
      - "GetFinalDifficulty(levelNumber) -> float"
    requires:
      - "LevelDataProvider.LoadLevelData()"
    formulas:
      canonical_ref: "balance/difficulty_curve.yaml"
      difficulty: >
        D(L) = 25*(colors-3)/5 + 25*balloons/80 + 20*special_ratio
             + 15*(1-(buffer-1)) + 15*rail_complexity
      sawtooth: "modifiers[(level-1)%5] where modifiers=[0.7, 0.85, 0.95, 1.0, 0.6]"

  BalanceProcessor:
    provides:
      - "RecordPlayResult(levelId, result, data)"
      - "GetLevelStats(levelId) -> LevelBalanceStats"
    requires:
      - "LevelManager.OnLevelCompleted"
      - "LevelManager.OnLevelFailed"

output_files:
  - "DifficultyCalculator.cs"
  - "BalanceProcessor.cs"
