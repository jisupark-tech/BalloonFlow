# ═══════════════════════════════════════════
# BalloonFlow — L3 Node: Meta Systems
# ═══════════════════════════════════════════
# Phase 2 | Owner: SubA(Star, Collection, Achievement) + SubB(Skin)

node_id: meta_collection_star
phase: 2
layer: Domain
domain: Meta
owner: SubA_SubB

systems:
  StarManager:
    owner: SubCoderA
    description: "스타 누적, 레벨별 최고 스타, 게이트 판정."
    contract:
      provides:
        - "RecordStars(string levelId, int starCount)"
        - "GetTotalStars() -> int"
        - "GetLevelStars(string levelId) -> int"
        - "MeetsStarGate(int requirement) -> bool"
      events_published:
        - "OnTotalStarsChanged(int total)"
      requires:
        - "ScoreManager.OnStarEarned"
    implementation:
      storage: "Dictionary<string, int> levelStars"
      total_calculation: "Sum of all levelStars values"
      update_rule: "새 스타 > 기존 스타일 때만 업데이트 (최고 기록 유지)"
      persistence: "SaveManager"

  CollectionManager:
    owner: SubCoderA
    description: "풍선 도감 수집, 마일스톤 보상."
    contract:
      provides:
        - "UnlockCollectible(string collectibleId)"
        - "GetCollectionProgress() -> CollectionData"
        - "GetMilestoneRewards() -> MilestoneData[]"
        - "ClaimMilestoneReward(string milestoneId) -> RewardData"
      events_published:
        - "OnCollectibleUnlocked(string collectibleId)"
        - "OnMilestoneReached(string milestoneId)"
      requires:
        - "LevelManager.OnLevelCompleted"
        - "CurrencyManager.AddCurrency()"
    implementation:
      total_collectibles: 60
      unlock_sources:
        - "특정 레벨 최초 클리어 → 해당 챕터 테마 풍선"
        - "특수 풍선 타입 첫 사용 → 해당 풍선 도감"
        - "이벤트 보상"
        - "시즌패스 보상"
      milestones:
        - { count: 10, reward: { coin: 2000 } }
        - { count: 25, reward: { gem: 50 } }
        - { count: 40, reward: { skin: "collector_dart" } }
        - { count: 60, reward: { skin: "master_frame" } }
      persistence: "SaveManager (HashSet<string> unlocked)"

  AchievementManager:
    owner: SubCoderA
    description: "도전과제 추적, 달성 보상."
    contract:
      provides:
        - "GetAchievements() -> AchievementData[]"
        - "CheckAchievement(string achievementId) -> bool"
        - "ClaimAchievementReward(string achievementId) -> RewardData"
        - "GetProgress(string achievementId) -> float"
      events_published:
        - "OnAchievementUnlocked(string achievementId)"
      requires:
        - "PopProcessor.OnChainPopComplete"
        - "LevelManager.OnLevelCompleted"
        - "CurrencyManager.AddCurrency()"
    implementation:
      total: 50
      categories:
        pop_master: ["Pop 100", "Pop 1K", "Pop 10K"]
        combo_king: ["5-chain", "8-chain", "10-chain"]
        speed_runner: ["Clear < 30s", "Clear < 20s"]
        collector: ["Collect 10", "Collect 30", "Collect All"]
        marathon: ["Clear 50 levels", "Clear 100", "Clear 200"]
      tracking: "각 카테고리별 counter. 이벤트 수신 시 증가."
      rewards: "젬 10~50 per achievement"

  SkinManager:
    owner: SubCoderB
    description: "다트/풍선 스킨 관리."
    contract:
      provides:
        - "GetOwnedSkins() -> SkinData[]"
        - "EquipSkin(string skinId, string slot)"
        - "GetEquippedSkin(string slot) -> SkinData"
        - "PurchaseSkin(string skinId) -> bool"
      requires:
        - "CurrencyManager.SpendCurrency()"
    implementation:
      slots: ["dart_skin", "pop_effect"]
      acquisition:
        coin_purchase: "2000~8000"
        gem_purchase: "100~500"
        season_pass: true
        achievement: true
      total_skins:
        dart: 20
        pop_effect: 10
      default: { dart: "default_dart", pop_effect: "default_pop" }
      persistence: "SaveManager (owned set + equipped map)"

output_files:
  - "StarManager.cs"
  - "CollectionManager.cs"
  - "AchievementManager.cs"
  - "SkinManager.cs"
