# ═══════════════════════════════════════════
# BalloonFlow — L3 Node: Core Foundation
# ═══════════════════════════════════════════
# Phase 0 | Owner: Main Coder
# Systems: Singleton, EventBus, ObjectPool

node_id: core_foundation
phase: 0
coder: main

systems:
  - Singleton
  - EventBus
  - ObjectPool

contracts:
  provides:
    - "Singleton<T>.Instance -> T"
    - "EventBus.Publish<T>(event)"
    - "EventBus.Subscribe<T>(handler)"
    - "EventBus.Unsubscribe<T>(handler)"
    - "ObjectPool.Get(prefabId) -> GameObject"
    - "ObjectPool.Return(prefabId, obj)"
    - "ObjectPool.Prewarm(prefabId, count)"
  requires: []

implementation:
  Singleton:
    base_class: "Singleton<T> : MonoBehaviour where T : MonoBehaviour"
    features: [lazy_instance, dont_destroy_on_load]
  EventBus:
    pattern: "Dictionary<Type, List<Delegate>>"
    features: [type_safe_events, auto_cleanup]
  ObjectPool:
    pattern: "Dictionary<string, Queue<GameObject>>"
    pool_targets:
      - { name: "Balloon", initial: 30 }
      - { name: "Dart", initial: 20 }
      - { name: "PopEffect", initial: 15 }

output_files:
  - "Singleton.cs"
  - "EventBus.cs"
  - "ObjectPool.cs"
