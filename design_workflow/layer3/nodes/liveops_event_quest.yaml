# ═══════════════════════════════════════════
# BalloonFlow — L3 Node: LiveOps (Confirmed Only)
# ═══════════════════════════════════════════
# Phase 3 | Owner: Sub Coder B
# Systems: SeasonPassManager, SeasonManager, QuestManager, StreakManager

node_id: liveops_deferred
phase: deferred
status: _DEFERRED
coder: TBD
deferred_note: "BM/LiveOps 디렉션 완료 후 구현. 컨셉 확정분만 기록."

systems:
  - SeasonPassManager
  - SeasonManager
  - QuestManager
  - StreakManager

contracts:
  SeasonPassManager:
    provides:
      - "GetSeasonPassStatus() -> SeasonPassData"
      - "AddXP(amount)"
      - "ClaimReward(level, track) -> RewardData"
      - "IsSeasonPassPremium() -> bool"
    requires:
      - "LevelManager.OnLevelCompleted"
    config:
      xp_per_clear: 10
      xp_per_daily_challenge: 30
    note: >
      무료 트랙: 기능적 보상. 프리미엄 트랙: 꾸미기 보상.
      "더 예쁘게 터뜨리는 경험이지, 파워가 아님."

  SeasonManager:
    provides:
      - "GetCurrentSeason() -> SeasonData"
      - "GetSeasonTheme() -> ThemeData"
      - "GetSeasonTimeRemaining() -> float"
    note: "풍선 축제 — 벚꽃/수박/호박/오너먼트 풍선 스킨 교체"

  QuestManager:
    provides:
      - "GetDailyChallenge() -> ChallengeData"
      - "IsDailyChallengeComplete() -> bool"
      - "ClaimDailyChallengeReward() -> RewardData"
    requires:
      - "LevelManager.OnLevelCompleted"
      - "SeasonPassManager.AddXP()"
    note: "오늘의 풍선 — 데일리 챌린지"

  StreakManager:
    provides:
      - "GetCurrentStreak() -> int"
      - "IncrementStreak()"
      - "ResetStreak()"
      - "GetStreakReward(streak) -> StreakRewardData"
    requires:
      - "LevelManager.OnLevelCompleted"
      - "LevelManager.OnLevelFailed"
    config:
      milestones: [3, 5, 10]
    note: "3연승=보너스풍선, 5연승=골드풍선, 10연승=특별 풍선 연쇄 팡팡팡"

output_files:
  - "SeasonPassManager.cs"
  - "SeasonManager.cs"
  - "QuestManager.cs"
  - "StreakManager.cs"
