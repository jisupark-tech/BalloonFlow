# ═══════════════════════════════════════════
# BalloonFlow — L3 Node: Core Input & Score
# ═══════════════════════════════════════════
# Phase 0 | Owner: Main Coder
# Systems: InputHandler, ScoreManager

node_id: core_input_score
phase: 0
layer: Core
domain: InGame
owner: MainCoder

systems:
  InputHandler:
    description: "터치/탭 입력 처리. 풍선 직접 탭 → 이벤트 발행."
    contract:
      provides:
        - "EnableInput()"
        - "DisableInput()"
        - "IsInputEnabled() -> bool"
      events_published:
        - "OnBalloonTapped(int balloonId)"
        - "OnEmptyTapped(Vector2 position)"
      requires: []
    implementation:
      input_method: "탭 — Physics2D.Raycast로 풍선 감지"
      touch_handling: "Input.GetTouch(0) OR Input.mousePosition (에디터)"
      balloon_detection: "Collider2D on balloon prefab + LayerMask"
      disabled_during: ["팝 연출 중", "튜토리얼 강제 가이드 중 (특정 풍선만 허용)", "결과 화면"]

  ScoreManager:
    description: "점수 집계, 스타 판정, 클리어/실패 조건 체크."
    contract:
      provides:
        - "AddScore(int amount)"
        - "GetCurrentScore() -> int"
        - "GetStarCount() -> int"
        - "CheckClearCondition() -> bool"
        - "CheckFailCondition() -> bool"
        - "GetClearBonus() -> int"
        - "ResetScore()"
      events_published:
        - "OnScoreChanged(int newScore)"
        - "OnStarEarned(int starCount)"
        - "OnLevelCleared(int score, int stars)"
        - "OnLevelFailed(string reason)"
      requires:
        - "LevelDataProvider.GetStarThresholds()"
        - "DartManager.GetRemainingDarts()"
        - "BoardStateManager.GetOverflowCount()"
    implementation:
      star_thresholds:
        # base_score = balloon_count * 100 (정본: systems/ingame.yaml)
        star_1: "base_score (= balloon_count * 100)"
        star_2: "ceil(base_score * 1.5)"
        star_3: "ceil(base_score * 2.2)"
      clear_condition: "BoardStateManager.IsBoardClear() == true"
      fail_conditions:
        - "DartManager.GetRemainingDarts() == 0 AND !BoardStateManager.IsBoardClear()"
        - "BoardStateManager.GetOverflowCount() > overflow_limit"
      clear_bonus: "remaining_darts * 50"

output_files:
  - "InputHandler.cs"
  - "ScoreManager.cs"
