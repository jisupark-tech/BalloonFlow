# ═══════════════════════════════════════════
# BalloonFlow — L3 Node: Core Input & Score & Rail
# ═══════════════════════════════════════════
# Phase 0 | Owner: Main Coder
# Systems: InputHandler, ScoreManager, RailManager

node_id: core_input_score_rail
phase: 0
coder: main

systems:
  - InputHandler
  - ScoreManager
  - RailManager

contracts:
  InputHandler:
    provides:
      - "EnableInput()"
      - "DisableInput()"
      - "IsInputEnabled() -> bool"
    events_published:
      - "OnHolderTapped(holderId)"
    note: "보관함 탭 감지. 풍선 직접 탭이 아님."

  ScoreManager:
    provides:
      - "AddScore(amount)"
      - "GetCurrentScore() -> int"
      - "GetStarCount() -> int"
      - "GetClearBonus() -> int"
      - "GetRemainingHolderBonus() -> int"
    requires:
      - "PopProcessor.OnPopComplete"
      - "BoardStateManager.OnBoardCleared"
      - "LevelDataProvider.GetStarThresholds()"
    events_published:
      - "OnScoreChanged(newScore)"
      - "OnStarEarned(starCount)"
      - "OnLevelCleared(score, stars)"
      - "OnLevelFailed(reason)"
    formulas:
      base_pop: 100
      star_1: "balloon_count * 100"
      star_2: "ceil(base_score * 1.5)"
      star_3: "ceil(base_score * 2.2)"

  RailManager:
    provides:
      - "GetRailPath() -> Vector3[]"
      - "SetRailLayout(railData)"
      - "GetDartPosition(dartId) -> Vector3"
      - "ResetRail()"
    requires:
      - "LevelDataProvider.GetRailLayout()"

output_files:
  - "InputHandler.cs"
  - "ScoreManager.cs"
  - "RailManager.cs"
