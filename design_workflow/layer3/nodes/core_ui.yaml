# ═══════════════════════════════════════════
# BalloonFlow — L3 Node: Core UI
# ═══════════════════════════════════════════
# Phase 0 | Owner: Main Coder
# Systems: UIManager, PopupManager

node_id: core_ui
phase: 0
coder: main

systems:
  - UIManager
  - PopupManager

contracts:
  UIManager:
    provides:
      - "ShowScreen(screenId)"
      - "HideScreen(screenId)"
      - "GetCurrentScreen() -> string"
    events_published:
      - "OnScreenChanged(from, to)"

  PopupManager:
    provides:
      - "ShowPopup(popupId, priority, data)"
      - "ClosePopup(popupId)"
      - "GetActivePopup() -> string"
      - "HasPendingPopups() -> bool"
    requires:
      - "UIManager"
    config:
      max_concurrent: 1
    note: "OutGame 확정 후 오퍼/하트/컨티뉴 팝업 우선순위 추가"

output_files:
  - "UIManager.cs"
  - "PopupManager.cs"
