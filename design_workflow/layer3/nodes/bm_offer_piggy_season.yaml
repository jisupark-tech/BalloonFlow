# ═══════════════════════════════════════════
# BalloonFlow — L3 Node: BM Offer, PiggyBank, SeasonPass
# ═══════════════════════════════════════════
# Phase 2 | Owner: Main(Offer) + SubA(PiggyBank) + SubB(SeasonPass)

node_id: bm_offer_piggy_season
phase: 2
layer: Domain
domain: BM
owner: Main_SubA_SubB

systems:
  OfferManager:
    owner: MainCoder
    description: "특별 오퍼 타이밍, 조건 기반 노출."
    contract:
      provides:
        - "CheckOfferTrigger(OfferContext context) -> Offer[]"
        - "GetActiveOffers() -> Offer[]"
        - "DismissOffer(string offerId)"
        - "IsOfferAvailable(string offerId) -> bool"
      events_published:
        - "OnOfferTriggered(string offerId)"
        - "OnOfferExpired(string offerId)"
      requires:
        - "LevelManager.GetCurrentLevel()"
        - "LevelManager.OnLevelFailed"
        - "IAPManager.ProcessIAP()"
    implementation:
      offers:
        starter_pack:
          trigger: "Level 10 클리어"
          time_limit_hours: 24
          price: 1.99
          once_only: true
        level_rescue:
          trigger: "같은 레벨 3회 연속 실패"
          time_limit_hours: 6
          price: 3.99
          cooldown_hours: 24
        weekend_pack:
          trigger: "주말 첫 로그인"
          time_limit_hours: 48
          price: 2.99
          weekly: true
      display_rules:
        - "세션당 동일 오퍼 1회만"
        - "광고 직후 60초 간격"
        - "PopupManager 우선순위 4"

  PiggyBankManager:
    owner: SubCoderA
    description: "피기뱅크 누적, 구매."
    contract:
      provides:
        - "GetPiggyBankStatus() -> PiggyBankData"
        - "AddToPiggyBank(int amount)"
        - "PurchasePiggyBank() -> bool"
        - "IsPiggyBankFull() -> bool"
        - "IsPiggyBankUnlocked() -> bool"
      requires:
        - "LevelManager.OnLevelCompleted"
        - "IAPManager.ProcessIAP()"
        - "CurrencyManager.AddCurrency()"
    implementation:
      unlock_level: 20
      fill_per_clear: "3 + floor(difficulty / 25)"
      fill_capacity: 35
      fill_cycle: "약 8판"
      price: 2.99
      reward: "누적 젬 전체 지급"
      visual: "풍선 모양 피기뱅크, 점점 부풀어 오름"
      on_purchase: "젬 지급 → 카운터 리셋 → 재누적 시작"
      popup: "가득 참 → 레벨 클리어 후 팝업 (우선순위 6)"

  SeasonPassManager:
    owner: SubCoderB
    description: "시즌패스 진행, XP, 보상 트랙."
    contract:
      provides:
        - "GetSeasonPassStatus() -> SeasonPassData"
        - "AddXP(int amount)"
        - "ClaimReward(int level, string track) -> RewardData"
        - "IsSeasonPassPremium() -> bool"
        - "GetCurrentSeasonPassLevel() -> int"
      requires:
        - "LevelManager.OnLevelCompleted"
        - "IAPManager.ProcessIAP()"
        - "CurrencyManager.AddCurrency()"
        - "BoosterManager.AddBooster()"
    implementation:
      levels: 30
      xp_sources:
        level_clear: 10
        star_earned: 5
        daily_quest_complete: 30
      xp_per_level: "100 + (pass_level * 10)"
      price: 4.99
      duration_weeks: 4
      free_track: "코인, 기본 부스터"
      premium_track: "젬, 프리미엄 부스터, 한정 다트 스킨, 한정 풍선 스킨"
      unlock_level: 30

output_files:
  - "OfferManager.cs"
  - "PiggyBankManager.cs"
  - "SeasonPassManager.cs"
