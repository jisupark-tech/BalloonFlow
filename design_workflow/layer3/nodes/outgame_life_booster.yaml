# ═══════════════════════════════════════════
# BalloonFlow — L3 Node: OutGame Life & Booster
# ═══════════════════════════════════════════
# Phase 1 | Owner: SubA(Life, DailyReward) + SubB(Booster, Continue)

node_id: outgame_life_booster
phase: 1
layer: Domain
domain: OutGame
owner: SubA_SubB

systems:
  LifeManager:
    owner: SubCoderA
    description: "하트 시스템. 최대 5개, 30분 자동 충전."
    contract:
      provides:
        - "GetCurrentLives() -> int"
        - "ConsumeLife() -> bool"
        - "AddLife(int count)"
        - "RefillLives(string method)"
        - "GetNextRegenTime() -> float"
        - "HasLives() -> bool"
      events_published:
        - "OnLivesChanged(int current, int max)"
        - "OnLivesEmpty()"
        - "OnLifeRegenerated()"
      requires:
        - "CurrencyManager.SpendCurrency() (gem refill)"
    implementation:
      max_lives: 5
      regen_interval_minutes: 30
      regen_timer: "Application.persistentDataPath에 마지막 소비 시간 저장, 앱 복귀 시 경과 시간 계산"
      refill_methods:
        gem: { cost: 200, result: "max_lives" }
        ad: { placement: "free_heart", result: "+1 life" }
        gift: { result: "+1 life, 초과 가능 (max_lives + 10)" }
      persistence: "SaveManager"

  DailyRewardManager:
    owner: SubCoderA
    description: "일일 출석 보상. 7일 주기."
    contract:
      provides:
        - "GetDailyRewardStatus() -> DailyRewardData"
        - "ClaimDailyReward() -> RewardData"
        - "GetStreak() -> int"
      events_published:
        - "OnDailyRewardClaimed(int day, RewardData rewards)"
      requires:
        - "CurrencyManager.AddCurrency()"
        - "BoosterManager.AddBooster()"
    implementation:
      cycle: 7
      rewards:
        day_1: { coin: 100 }
        day_2: { coin: 200 }
        day_3: { coin: 300, booster: "BF_PRE_01" }
        day_4: { coin: 400 }
        day_5: { coin: 500, booster: "BF_IN_01" }
        day_6: { coin: 600 }
        day_7: { coin: 700, gem: 20, booster: "BF_PRE_02" }
      streak_reset: "1일 미접속 시 리셋"
      persistence: "SaveManager (last_claim_date, streak)"

  BoosterManager:
    owner: SubCoderB
    description: "부스터 인벤토리, 사용 관리."
    contract:
      provides:
        - "GetBoosterInventory() -> BoosterData[]"
        - "UseBooster(string boosterId) -> bool"
        - "AddBooster(string boosterId, int count)"
        - "GetBoosterCount(string boosterId) -> int"
        - "CanUseBooster(string boosterId) -> bool"
      events_published:
        - "OnBoosterUsed(string boosterId)"
        - "OnBoosterAcquired(string boosterId, int count)"
      requires:
        - "CurrencyManager.SpendCurrency()"
    implementation:
      boosters:
        BF_PRE_01: { name: "Color Reveal", category: pre_play, cost_coin: 500, effect: "dart_preview_5" }
        BF_PRE_02: { name: "Extra Darts +5", category: pre_play, cost_coin: 800, effect: "add_darts_5" }
        BF_PRE_03: { name: "Rail Freeze", category: pre_play, cost_gem: 20, effect: "freeze_10s" }
        BF_IN_01: { name: "Bomb Dart", category: in_play, cost_coin: 600, effect: "bomb_dart_1" }
        BF_IN_02: { name: "Rainbow Dart", category: in_play, cost_coin: 700, effect: "rainbow_dart_1" }
        BF_IN_03: { name: "Shuffle Rail", category: in_play, cost_gem: 15, effect: "shuffle_rail" }
      persistence: "SaveManager (booster_inventory JSON)"

  ContinueHandler:
    owner: SubCoderB
    description: "실패 후 이어하기 로직."
    contract:
      provides:
        - "GetContinueCost() -> ContinueCostData"
        - "UseContinue(string method) -> bool"
        - "GetContinueCount() -> int"
        - "ResetContinueCount()"
      requires:
        - "CurrencyManager.SpendCurrency()"
        - "AdManager.ShowRewardedAd()"
        - "DartManager.AddBonusDarts()"
    implementation:
      first_continue: "광고 무료 (ad_first_free)"
      gem_cost_base: 30
      escalation: "+10 per additional use in same level"
      max_per_level: 3
      continue_effect: "다트 +5 추가, 보드 상태 유지"
      cost_formula: "cost = 30 + (continue_count - 1) * 10"

output_files:
  - "LifeManager.cs"
  - "DailyRewardManager.cs"
  - "BoosterManager.cs"
  - "ContinueHandler.cs"
