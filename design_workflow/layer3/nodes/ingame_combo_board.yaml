# ═══════════════════════════════════════════
# BalloonFlow — L3 Node: InGame Combo & Board
# ═══════════════════════════════════════════
# Phase 1 | Owner: Sub Coder A
# Systems: ComboCalculator, BoardStateManager

node_id: ingame_combo_board
phase: 1
layer: Domain
domain: InGame
owner: SubCoderA

systems:
  ComboCalculator:
    description: "연쇄 팝 점수 계산. 배수 테이블 기반."
    contract:
      provides:
        - "CalculateComboScore(int chainLength, int baseScore) -> int"
        - "GetComboMultiplier(int chainLength) -> float"
        - "ShouldAwardBonusDart(int chainLength) -> bool"
      requires: []
    implementation:
      multiplier_table: [1.0, 1.5, 2.0, 3.0]
      index_formula: "min(chainLength - 1, 3)"
      bonus_dart_threshold: 4
      bonus_dart_count: 1
      formula: "score = baseScore * multiplier_table[min(chain-1, 3)]"
      examples:
        - { chain: 1, base: 100, multiplier: 1.0, score: 100, bonus_dart: false }
        - { chain: 2, base: 100, multiplier: 1.5, score: 150, bonus_dart: false }
        - { chain: 3, base: 100, multiplier: 2.0, score: 200, bonus_dart: false }
        - { chain: 5, base: 100, multiplier: 3.0, score: 300, bonus_dart: true }

  BoardStateManager:
    description: "보드 전체 상태 통합 조회."
    contract:
      provides:
        - "GetBoardState() -> BoardState"
        - "GetOverflowCount() -> int"
        - "GetRemainingBalloons() -> int"
        - "IsBoardClear() -> bool"
        - "SaveBoardSnapshot() -> BoardSnapshot"
      requires:
        - "RailManager.GetBalloonPositions()"
        - "BalloonController.GetAllBalloons()"
    implementation:
      board_state:
        total_balloons: int
        remaining_balloons: int
        overflow_count: int
        colors_on_board: "ColorEnum[]"
        special_count: int
      clear_check: "remaining_balloons == 0"
      overflow_check: "overflow_count > level_overflow_limit"
      snapshot: "직렬화 가능 구조. undo/replay용."

output_files:
  - "ComboCalculator.cs"
  - "BoardStateManager.cs"
