# ═══════════════════════════════════════════
# BalloonFlow — L3 Node: InGame Balloon & Board
# ═══════════════════════════════════════════
# Phase 1 | Owner: Sub Coder A
# Systems: BalloonController, BoardStateManager

node_id: ingame_balloon_board
phase: 1
coder: sub_a

systems:
  - BalloonController
  - BoardStateManager

contracts:
  BalloonController:
    provides:
      - "GetBalloon(balloonId) -> BalloonData"
      - "GetBalloonsByColor(color) -> BalloonData[]"
      - "PopBalloon(balloonId) -> PopResult"
      - "GetAllBalloons() -> BalloonData[]"
      - "GetRemainingCount() -> int"
    requires:
      - "LevelDataProvider.GetBalloonLayout()"
      - "ObjectPool.Get()"
      - "ObjectPool.Return()"
    events_published:
      - "OnBalloonPopped(balloonId, color, position)"
      - "OnBalloonSpawned(balloonId)"
    data:
      BalloonData: "balloonId, color, position, hp"
    note: >
      고정 보드. 풍선은 초기 배치 후 새로 유입되지 않음 (Spawner 기믹 제외).
      "매끄럽고 쫀득한 고무 물풍선" — 3D 모델 참조.
      BigObject 기믹: 1x1보다 큰 오브젝트, lifePoints 보유 — 여러 번 타격해야 제거.

  BoardStateManager:
    provides:
      - "GetBoardState() -> BoardState"
      - "GetRemainingBalloons() -> int"
      - "IsBoardClear() -> bool"
      - "CheckFailCondition() -> FailResult"
    requires:
      - "BalloonController.GetRemainingCount()"
      - "HolderManager.AreAllHoldersEmpty()"
    events_published:
      - "OnBoardStateChanged"
      - "OnBoardCleared"
      - "OnBoardFailed(reason)"
    fail_condition: >
      홀더 초과 가정. 레일 끝 대기 영역(홀더)에 다트가 가득 차면 실패.
      홀더 초과를 기본 가정으로 프로토타입 제작.
      CheckFailCondition()은 홀더 용량 초과 여부를 검사.

output_files:
  - "BalloonController.cs"
  - "BoardStateManager.cs"
  - "BalloonData.cs"
  - "BoardState.cs"
