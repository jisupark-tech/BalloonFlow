# ═══════════════════════════════════════════
# BalloonFlow — L3 Node: UX Pages & Tutorial
# ═══════════════════════════════════════════
# Phase 2 (Tutorial) + Phase 3 (Pages, HUD, Feedback)

node_id: ux_pages_tutorial
phase: [2, 3]

# Phase 2: Tutorial
phase_2_systems:
  coder: sub_b
  systems:
    - TutorialController
    - TutorialManager
  contracts:
    TutorialController:
      provides:
        - "StartTutorial(step)"
        - "NextTutorialStep()"
        - "IsTutorialActive() -> bool"
        - "CompleteTutorial()"
      requires:
        - "LevelManager.OnLevelLoaded"
        - "InputHandler.OnHolderTapped"
        - "UIManager.ShowScreen()"
      events_published:
        - "OnTutorialStepCompleted(step)"
        - "OnTutorialCompleted"
      note: "보관함 탭 유도 중심 가이드. 풍선 탭이 아님."
    TutorialManager:
      provides:
        - "IsTutorialComplete() -> bool"
        - "ShowHighlight(target)"
        - "ShowArrow(target, direction)"
        - "HideGuides()"
      requires:
        - "TutorialController.OnTutorialStepCompleted"
        - "UIManager"
  output_files:
    - "TutorialController.cs"
    - "TutorialManager.cs"

# Phase 3: Pages, HUD, Feedback
phase_3_systems:
  PageController:
    coder: sub_a
    provides:
      - "NavigateTo(pageId)"
      - "GoBack()"
    requires:
      - "UIManager.ShowScreen()"
    output: "PageController.cs"

  HUDController:
    coder: sub_a
    provides:
      - "UpdateScore(score)"
      - "UpdateRemainingBalloons(count)"
      - "UpdateHolderMagazine(holderId, remaining)"
      - "UpdateStarProgress(progress)"
    requires:
      - "ScoreManager.OnScoreChanged"
      - "PopProcessor.OnPopComplete"
      - "HolderManager.OnHolderSelected"
    note: "보관함 탄창 수 표시가 포함된 HUD"
    output: "HUDController.cs"

  FeedbackController:
    coder: main
    provides:
      - "PlayPopEffect(position, popIndex, color)"
      - "PlaySound(soundId)"
      - "PlayHaptic(intensity)"
      - "PlayClearCelebration()"
      - "PlayFailEffect()"
    requires:
      - "PopProcessor.OnPopComplete"
      - "ScoreManager.OnLevelCleared"
      - "ScoreManager.OnLevelFailed"
    note: >
      비대칭 원칙: 다트=담백, 풍선팝=과하게.
      popIndex로 피치 상승: 팡-팡-팡-팡-팡!!
      마지막 풍선: 피치 최고점 + 화면 흔들림.
    output: "FeedbackController.cs"
