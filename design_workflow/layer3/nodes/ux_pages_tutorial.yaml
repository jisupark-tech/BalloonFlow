# ═══════════════════════════════════════════
# BalloonFlow — L3 Node: UX Pages & Tutorial
# ═══════════════════════════════════════════
# Phase 3 | Owner: Main(Tutorial, Shop) + SubA(Page, TutorialMgr, Feedback) + SubB(HUD)

node_id: ux_pages_tutorial
phase: 3
layer: Game
domain: UX_OutGame_Content
owner: Main_SubA_SubB

systems:
  TutorialController:
    owner: MainCoder
    description: "튜토리얼 레벨(1~5) 강제 가이드."
    contract:
      provides:
        - "StartTutorial(int step)"
        - "NextTutorialStep()"
        - "IsTutorialActive() -> bool"
        - "GetTutorialStep() -> int"
        - "CompleteTutorial()"
      events_published:
        - "OnTutorialStepCompleted(int step)"
        - "OnTutorialCompleted()"
      requires:
        - "LevelManager.OnLevelLoaded"
        - "InputHandler.OnBalloonTapped"
        - "UIManager (highlight, arrows)"
    implementation:
      steps:
        1: { level: 1, guide: "full", target: "첫 풍선 탭 유도", highlight: "specific_balloon" }
        2: { level: 2, guide: "full", target: "연쇄 팝 체험", highlight: "adjacent_same_color" }
        3: { level: 3, guide: "semi", target: "다트 큐 전환", highlight: "dart_queue" }
        4: { level: 4, guide: "semi", target: "실패 경험", highlight: null }
        5: { level: 5, guide: "light", target: "스타 시스템 안내", highlight: "star_bar" }
        6: { level: 6, guide: "light", target: "새 색상 소개", highlight: "new_color_balloon" }
        7: { level: 10, guide: "popup", target: "상점 안내", highlight: "shop_button" }
      input_restriction: "guide=full일 때 하이라이트된 풍선만 탭 가능"

  ShopManager:
    owner: MainCoder
    description: "상점 UI 데이터, 구매 처리."
    contract:
      provides:
        - "GetShopItems(string category) -> ShopItem[]"
        - "PurchaseItem(string itemId) -> PurchaseResult"
        - "RefreshShop()"
      requires:
        - "CurrencyManager.SpendCurrency()"
        - "CurrencyManager.CanAfford()"
        - "BoosterManager.AddBooster()"
        - "IAPManager.ProcessIAP()"
    implementation:
      tabs: [gems, boosters, skins, special_offers]
      refresh: "스페셜 오퍼만 시간 기반 갱신"

  PageController:
    owner: SubCoderA
    description: "화면 전환 관리."
    contract:
      provides:
        - "NavigateTo(string pageId)"
        - "GoBack()"
        - "GetCurrentPage() -> string"
      requires:
        - "UIManager.ShowScreen()"
    implementation:
      pages: [Title, Main, Level, Result, Shop, Settings, Collection, SeasonPass]
      navigation_stack: "Stack<string> (뒤로가기 지원)"
      transition: "Fade 0.3s"

  TutorialManager:
    owner: SubCoderA
    description: "FTUE 전체 관리, 하이라이트/화살표 표시."
    contract:
      provides:
        - "IsTutorialComplete() -> bool"
        - "GetFTUEProgress() -> int"
        - "ShowHighlight(Transform target)"
        - "ShowArrow(Transform target, Vector2 direction)"
        - "HideGuides()"
      requires:
        - "TutorialController.OnTutorialStepCompleted"
        - "UIManager"
    implementation:
      highlight: "다크 오버레이 + 타겟 영역 마스크 (원형/사각)"
      arrow: "Animated sprite arrow"
      text_bubble: "가이드 텍스트 말풍선"
      persistence: "SaveManager (tutorial_complete: bool)"

  FeedbackController:
    owner: SubCoderA
    description: "시청각/햅틱 피드백."
    contract:
      provides:
        - "PlayPopEffect(Vector3 position, int chainLength, ColorEnum color)"
        - "PlaySound(string soundId)"
        - "PlayHaptic(float intensity)"
        - "PlayClearCelebration()"
        - "PlayFailEffect()"
      requires:
        - "PopProcessor.OnChainPopComplete"
        - "ScoreManager.OnLevelCleared"
        - "ScoreManager.OnLevelFailed"
    implementation:
      pop_effect:
        base: "색종이 파티클 (풍선 색상)"
        chain_2: "+ 약한 화면 흔들림"
        chain_3: "+ 강한 화면 흔들림 + 광선 이펙트"
        chain_4_plus: "+ 스페셜 풀스크린 이펙트"
      sounds:
        pop: "pitch_base + (chain * 0.1) 상승"
        dart_fire: "슝"
        clear: "팡파레"
        fail: "슬픔"
        coin: "찰칵"
      haptic:
        pop: { duration: 10, intensity: 0.3 }
        chain_pop: { duration: 30, intensity: 0.6 }
        clear: { pattern: [50, 30, 50], intensity: 0.8 }

  HUDController:
    owner: SubCoderB
    description: "인게임 HUD 업데이트."
    contract:
      provides:
        - "UpdateScore(int score)"
        - "UpdateDartCount(int remaining)"
        - "UpdateObjective(int current, int total)"
        - "UpdateStarProgress(float progress)"
        - "ShowComboText(float multiplier)"
      requires:
        - "ScoreManager.OnScoreChanged"
        - "DartManager.OnDartFired"
        - "PopProcessor.OnChainPopComplete"
    implementation:
      layout:
        top_left: "레벨 번호 + 일시정지"
        top_center: "남은 풍선 수 (목표)"
        top_right: "남은 다트 수 + 점수"
        top_bar: "스타 프로그레스 바"
        bottom_center: "다트 큐 (5개 표시)"
        bottom_left: "부스터 슬롯 3개"
      animations:
        score_change: "숫자 카운트업 + 크기 펀치"
        combo_text: "페이드인 → 스케일업 → 페이드아웃 (0.8s)"
        dart_low_warning: "남은 3개 이하 시 빨간색 강조"
        overflow_warning: "대기 영역 80% 시 붉은 글로우"

output_files:
  - "TutorialController.cs"
  - "ShopManager.cs"
  - "PageController.cs"
  - "TutorialManager.cs"
  - "FeedbackController.cs"
  - "HUDController.cs"

editor_scripts:
  - file: "Editor/SceneBuilder.cs"
    description: >
      [InitializeOnLoad] 1회 실행.
      Title, Main, GameScene 3씬 생성.
      Canvas(1080x1920), Camera, EventSystem, Managers 오브젝트 배치.
      UI 계층구조(Panel, Button, Text), Manager 싱글톤 부착.
      Build Settings에 3씬 등록.
    scenes:
      - { name: "Title", elements: ["Logo", "LoadingBar", "TouchToStart"] }
      - { name: "Main", elements: ["PlayButton", "CoinDisplay", "GemDisplay", "HeartDisplay", "ShopButton", "SettingsButton", "ChapterMap"] }
      - { name: "GameScene", elements: ["Managers", "RailContainer", "DartLauncher", "HUD", "BoosterSlots", "PauseButton"] }
    canvas:
      render_mode: "Screen Space - Overlay"
      scaler: "Scale With Screen Size"
      reference_resolution: [1080, 1920]

  - file: "Editor/ProjectConfigurator.cs"
    description: >
      [InitializeOnLoad] 1회 실행.
      CompanyName, ProductName, minSdkVersion=24,
      targetArchitectures=5 (ARMv7+ARM64),
      screenOrientation=Portrait 설정.

  - file: "Editor/PrefabBuilder.cs"
    description: >
      [InitializeOnLoad] 1회 실행.
      Balloon, Dart, PopEffect 프리팹 생성.
      SerializeField 자동 연결.
