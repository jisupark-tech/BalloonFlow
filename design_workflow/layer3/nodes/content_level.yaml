# ═══════════════════════════════════════════
# BalloonFlow — L3 Node: Content Level System
# ═══════════════════════════════════════════
# Phase 1 | Owner: Sub Coder B
# Systems: LevelDataProvider, LevelManager

node_id: content_level
phase: 1
coder: sub_b

systems:
  - LevelDataProvider
  - LevelManager

contracts:
  LevelDataProvider:
    provides:
      - "LoadLevelData(levelNumber) -> LevelData"
      - "GetBalloonLayout() -> BalloonLayout[]"
      - "GetHolderSetup() -> HolderSetup[]"
      - "GetRailLayout() -> RailLayout"
      - "GetStarThresholds() -> int[3]"
      - "GetSpecialMechanics() -> string[]"
      - "GetGimmickFlags() -> GimmickFlags"
    requires: []
    data: >
      LevelData JSON (Level Library schema): level_id, package_id, position_in_package,
      level_purpose (튜토리얼/노말/하드/슈퍼하드/휴식), balloon_count, num_colors,
      holder_count, magazine_per_holder, board_layout,
      special_mechanics, gimmick_flags, star_thresholds
    note: >
      100레벨 (5패키지 × 20레벨).
      GetGimmickFlags()는 해당 레벨의 활성 기믹 플래그를 반환.
      level_purpose로 레벨 유형 구분 (튜토리얼/노말/하드/슈퍼하드/휴식).

  LevelManager:
    provides:
      - "LoadLevel(levelNumber)"
      - "StartLevel()"
      - "CompleteLevel(score, stars)"
      - "FailLevel(reason)"
      - "RetryLevel()"
      - "GetCurrentLevel() -> int"
    requires:
      - "LevelDataProvider.LoadLevelData()"
      - "ScoreManager.OnLevelCleared"
      - "ScoreManager.OnLevelFailed"
    events_published:
      - "OnLevelLoaded(levelNumber)"
      - "OnLevelStarted"
      - "OnLevelCompleted(levelNumber, score, stars)"
      - "OnLevelFailed(levelNumber, reason)"

output_files:
  - "LevelDataProvider.cs"
  - "LevelManager.cs"
  - "LevelData.cs"
  - "HolderSetup.cs"
