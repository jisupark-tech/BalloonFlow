# ═══════════════════════════════════════════
# BalloonFlow — L3 Node: Content Level System
# ═══════════════════════════════════════════
# Phase 1 | Owner: Main(LevelManager) + SubA(LevelDataProvider)

node_id: content_level
phase: 1
layer: Domain
domain: Content
owner: Main_SubA

systems:
  LevelManager:
    owner: MainCoder
    description: "레벨 로드, 진행, 완료/실패 처리."
    contract:
      provides:
        - "LoadLevel(int levelNumber)"
        - "StartLevel()"
        - "CompleteLevel(int score, int stars)"
        - "FailLevel(string reason)"
        - "RetryLevel()"
        - "GetCurrentLevel() -> int"
        - "GetCurrentLevelData() -> LevelData"
      events_published:
        - "OnLevelLoaded(int levelNumber)"
        - "OnLevelStarted()"
        - "OnLevelCompleted(int levelNumber, int score, int stars)"
        - "OnLevelFailed(int levelNumber, string reason)"
      requires:
        - "LevelDataProvider.LoadLevelData()"
        - "ScoreManager.OnLevelCleared"
        - "ScoreManager.OnLevelFailed"
        - "LifeManager.ConsumeLife()"
        - "CurrencyManager.AddCurrency()"
    implementation:
      level_flow:
        1_load: "LevelDataProvider에서 데이터 로드"
        2_setup: "RailManager, BalloonController, DartManager 초기화"
        3_start: "InputHandler 활성화, 타이머 시작"
        4_play: "유저 플레이 (ScoreManager가 클리어/실패 감지)"
        5_result: "CompleteLevel or FailLevel → 결과 화면"
      rewards:
        coin: "100 + level_number * 5"
        star_bonus: "star_count * 50"
        booster: "매 10레벨 클리어 시 랜덤 부스터"

  LevelDataProvider:
    owner: SubCoderA
    description: "레벨 JSON 로드, 파싱."
    contract:
      provides:
        - "LoadLevelData(int levelNumber) -> LevelData"
        - "GetRailLayout() -> RailLayout"
        - "GetBalloonLayout() -> BalloonLayout[]"
        - "GetDartQueue() -> DartData[]"
        - "GetStarThresholds() -> int[3]"
        - "GetMoveLimit() -> int"
        - "GetOverflowLimit() -> int"
        - "GetSpecialMechanics() -> string[]"
      requires: []
    implementation:
      data_source: "Resources/Levels/bf_XXXX.json"
      json_schema:
        level_number: int
        rail_segments: "RailSegment[]"
        balloons: "{ color: int, type: int, rail_index: int, position: int }[]"
        dart_queue: "{ color: int }[]"
        star_thresholds: [int, int, int]
        move_limit: int
        overflow_limit: int
        special_mechanics: "string[]"
        balloon_speed: float
      caching: "현재 레벨 + 다음 레벨 프리로드"

output_files:
  - "LevelManager.cs"
  - "LevelDataProvider.cs"
  - "LevelData.cs (data class)"
