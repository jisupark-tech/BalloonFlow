# ═══════════════════════════════════════════
# BalloonFlow — L3 Node: Content Package & Gimmick
# ═══════════════════════════════════════════
# Phase 2 | Owner: Sub Coder A
# Systems: PackageManager, GimmickManager, ClearRateValidator

node_id: content_package_gimmick
phase: 2
coder: sub_a

systems:
  - PackageManager
  - GimmickManager
  - ClearRateValidator

contracts:
  PackageManager:
    provides:
      - "GetCurrentPackage() -> int"
      - "IsPackageUnlocked(packageId) -> bool"
      - "CompletePackage(packageId)"
    requires:
      - "LevelManager.OnLevelCompleted"
    events_published:
      - "OnPackageCompleted(packageId)"
      - "OnPackageUnlocked(packageId)"
    note: >
      5패키지 × 20레벨 = 100레벨 구조.
      패키지별 Beat Chart 목표 (CR, 시도 횟수) 관리.

  GimmickManager:
    provides:
      - "IsGimmickUnlocked(gimmickId) -> bool"
      - "GetActiveGimmicks(levelNumber) -> string[]"
      - "ApplyGimmick(gimmickId, target)"
      - "ApplyHidden(target)"
      - "ApplySpawner(target, isTransparent)"
      - "ApplyBigObject(target, lifePoints)"
      - "ApplyChain(targets)"
    requires:
      - "LevelDataProvider.GetSpecialMechanics()"
    events_published:
      - "OnGimmickActivated(gimmickId)"
    note: >
      5종 기믹: Hidden(숨김풍선), Spawner(투명/불투명),
      BigObject(대형 오브젝트, 생명력), Chain(연결 풍선).
      기믹 격리 원칙: 각 기믹은 독립적으로 동작하며 코어 루프에 영향을 주지 않음.
      Spawner는 GimmickManager 내에서 처리 (별도 SpawnerManager 불필요).
      각 패키지 pos 1 or 11에서 기믹 도입 튜토리얼.

  ClearRateValidator:
    provides:
      - "ValidateClearRate(levelId) -> ValidationResult"
      - "GetOutOfRangeLevels() -> LevelId[]"
    requires:
      - "BalanceProcessor.GetLevelStats()"
    thresholds:
      fail_rate_max: 0.60
      near_miss_target: 0.35

output_files:
  - "PackageManager.cs"
  - "GimmickManager.cs"
  - "ClearRateValidator.cs"
