# ═══════════════════════════════════════════
# BalloonFlow — L3 Node: Content Chapter & Gimmick
# ═══════════════════════════════════════════
# Phase 2 | Owner: Main Coder

node_id: content_chapter_gimmick
phase: 2
layer: Domain
domain: Content
owner: MainCoder

systems:
  ChapterManager:
    description: "챕터 진행, 스타 게이트 해금 판정."
    contract:
      provides:
        - "GetCurrentChapter() -> int"
        - "IsChapterUnlocked(int chapterId) -> bool"
        - "GetChapterProgress(int chapterId) -> float"
        - "CompleteChapter(int chapterId)"
        - "GetStarGateRequirement(int chapterId) -> int"
      events_published:
        - "OnChapterCompleted(int chapterId)"
        - "OnChapterUnlocked(int chapterId)"
      requires:
        - "StarManager.GetTotalStars()"
        - "LevelManager.OnLevelCompleted"
    implementation:
      chapters: 10
      levels_per_chapter: 20
      star_gates:
        chapter_2: 15
        chapter_3: 35
        chapter_4: 60
        chapter_5: 90
        chapter_6: 125
        chapter_7: 160
        chapter_8: 200
        chapter_9: 245
        chapter_10: 280
      completion_reward:
        coin: 2000
        gem: 30
        collectible: "챕터 테마 풍선"

  GimmickManager:
    description: "특수 기믹 해금 및 활성화 관리."
    contract:
      provides:
        - "IsGimmickUnlocked(string gimmickId) -> bool"
        - "GetActiveGimmicks(int levelNumber) -> string[]"
        - "ApplyGimmick(string gimmickId, object target)"
      events_published:
        - "OnGimmickActivated(string gimmickId)"
      requires:
        - "LevelDataProvider.GetSpecialMechanics()"
        - "LevelManager.GetCurrentLevel()"
    implementation:
      gimmick_unlock_schedule:
        double_balloon: 15
        frozen_balloon: 25
        bomb_balloon: 35
        lock_balloon: 40
        rainbow_balloon: 50
        speed_rail: 70
        branching_rail: 90
        reverse_rail: 120
        portal: 150
        darkness: 180
      gimmick_effects:
        speed_rail: "풍선 이동 속도 1.5x"
        branching_rail: "분기점에서 랜덤 방향 또는 유저 선택"
        reverse_rail: "일부 구간 역방향 이동"
        portal: "풍선이 다른 레일 세그먼트로 텔레포트"
        darkness: "일부 풍선 색상 가려짐 (인접 팝으로 공개)"

output_files:
  - "ChapterManager.cs"
  - "GimmickManager.cs"
