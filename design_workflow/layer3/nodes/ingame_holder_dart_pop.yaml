# ═══════════════════════════════════════════
# BalloonFlow — L3 Node: InGame Core Loop
# ═══════════════════════════════════════════
# Phase 1 | Owner: Main Coder
# Systems: HolderManager, DartManager, PopProcessor
# 핵심 코어 루프: 보관함 → 다트 → 풍선 1:1 타격

node_id: ingame_holder_dart_pop
phase: 1
coder: main

systems:
  - HolderManager
  - DartManager
  - PopProcessor

contracts:
  HolderManager:
    provides:
      - "GetHolders() -> HolderData[]"
      - "SelectHolder(holderId) -> bool"
      - "GetCurrentHolder() -> HolderData"
      - "GetMagazineCount(holderId) -> int"
      - "IsHolderEmpty(holderId) -> bool"
      - "ConsumeMagazine(holderId) -> int"
      - "AreAllHoldersEmpty() -> bool"
    requires:
      - "LevelDataProvider.GetHolderSetup()"
      - "InputHandler.OnHolderTapped"
    events_published:
      - "OnHolderSelected(holderId, color, magazineCount)"
      - "OnHolderEmpty(holderId)"
      - "OnAllHoldersEmpty"
    data:
      HolderData: "holderId, color, magazineCount, magazineRemaining"

  DartManager:
    provides:
      - "DeployDarts(color, count) -> DartData[]"
      - "GetActiveDarts() -> DartData[]"
      - "GetDeployedCount() -> int"
      - "IsDeploymentComplete() -> bool"
    requires:
      - "HolderManager.OnHolderSelected"
      - "HolderManager.ConsumeMagazine()"
      - "RailManager.GetRailPath()"
      - "ObjectPool.Get()"
      - "ObjectPool.Return()"
    events_published:
      - "OnDartDeployed(dartId, color, position)"
      - "OnDartHitBalloon(dartId, balloonId)"
      - "OnDeploymentComplete(color, count)"
    behavior: >
      보관함 선택 → 탄창 수만큼 다트를 톡톡톡 순차 배치.
      레일 따라 이동 → 동일 색 풍선 1:1 타격.

  PopProcessor:
    provides:
      - "ProcessPop(balloonId, dartColor) -> PopResult"
      - "GetPopCount() -> int"
    requires:
      - "BalloonController.PopBalloon()"
      - "DartManager.OnDartHitBalloon"
    events_published:
      - "OnPopComplete(balloonId, color, position, popIndex)"
    note: >
      popIndex는 현재 탄창 발사 내 순서 번호.
      FeedbackController가 popIndex로 피치 상승 효과 구현.
      체인 팝 메커닉 없음 — 순차 1:1 타격만.

output_files:
  - "HolderManager.cs"
  - "DartManager.cs"
  - "PopProcessor.cs"
  - "HolderData.cs"
  - "DartData.cs"
  - "PopResult.cs"
