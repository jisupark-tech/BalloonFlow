# ═══════════════════════════════════════════
# BalloonFlow — L3 Node: Core Economy & SDK
# ═══════════════════════════════════════════
# Phase 0 | Owner: Main Coder
# Systems: CurrencyManager, IAPManager, AdManager, NotificationManager, ABTestManager, RemoteConfigService

node_id: core_economy_sdk
phase: 0
layer: Core
domain: OutGame_BM_LiveOps
owner: MainCoder

systems:
  CurrencyManager:
    description: "재화 원장. 코인/젬 트랜잭션 관리."
    contract:
      provides:
        - "GetBalance(string currencyId) -> int"
        - "AddCurrency(string currencyId, int amount, string source)"
        - "SpendCurrency(string currencyId, int amount, string sink) -> bool"
        - "CanAfford(string currencyId, int amount) -> bool"
      events_published:
        - "OnCurrencyChanged(string currencyId, int newBalance, int delta, string source)"
        - "OnInsufficientFunds(string currencyId, int required, int current)"
      requires: []
    implementation:
      currencies:
        - { id: "coin", initial: 500 }
        - { id: "gem", initial: 30 }
      persistence: "SaveManager.Save/Load"
      validation: "balance >= 0 항상 보장"
      logging: "모든 트랜잭션 로그 (source/sink, amount, balance_after)"

  IAPManager:
    description: "Unity IAP 래핑. 구매 처리, 영수증 검증."
    contract:
      provides:
        - "ProcessIAP(string productId) -> IAPResult"
        - "GetProducts() -> IAPProduct[]"
        - "RestorePurchases()"
        - "IsProductOwned(string productId) -> bool"
      events_published:
        - "OnPurchaseCompleted(string productId, float price)"
        - "OnPurchaseFailed(string productId, string reason)"
      requires:
        - "CurrencyManager.AddCurrency()"
    sdk: "UNITY_IAP"
    products:
      - { id: "bf_gem_xs", type: consumable, price: 0.99 }
      - { id: "bf_gem_s", type: consumable, price: 4.99 }
      - { id: "bf_gem_m", type: consumable, price: 9.99 }
      - { id: "bf_gem_l", type: consumable, price: 19.99 }
      - { id: "bf_gem_xl", type: consumable, price: 49.99 }
      - { id: "bf_starter", type: consumable, price: 1.99 }
      - { id: "bf_no_ads", type: non_consumable, price: 4.99 }
      - { id: "bf_piggy", type: consumable, price: 2.99 }
      - { id: "bf_season_pass", type: consumable, price: 4.99 }

  AdManager:
    description: "광고 노출 관리. Google AdMob 래핑."
    contract:
      provides:
        - "ShowRewardedAd(string placement) -> AdResult"
        - "ShowInterstitial() -> bool"
        - "IsRewardedAdReady() -> bool"
        - "ShouldShowInterstitial() -> bool"
        - "GetDailyAdCount(string placement) -> int"
      events_published:
        - "OnRewardedAdCompleted(string placement, RewardData reward)"
        - "OnInterstitialShown()"
      requires: []
    sdk: "GOOGLE_MOBILE_ADS"
    config:
      interstitial_every_n_levels: 3
      interstitial_cooldown_sec: 120
      rewarded_placements:
        free_heart: { cap: 5, reward: "life_1" }
        free_continue: { cap: 3, reward: "darts_5" }
        free_booster: { cap: 3, reward: "random_booster" }
        double_reward: { cap: 10, reward: "coin_2x" }
        free_coin: { cap: 5, reward: "coin_200" }
        spin_wheel: { cap: 3, reward: "random" }

  NotificationManager:
    description: "로컬 알림 스케줄링."
    contract:
      provides:
        - "ScheduleNotification(string type, DateTime time, string message)"
        - "CancelNotification(string type)"
        - "GetScheduledNotifications() -> NotificationData[]"
      requires: []
    notifications:
      - { type: "life_full", delay: "하트 풀 충전 시간", message: "하트가 가득 찼어요!" }
      - { type: "daily_reward", time: "18:00", message: "오늘의 보상이 기다리고 있어요!" }
      - { type: "season_end", delay: "시즌 종료 24시간 전", message: "시즌이 곧 끝나요!" }

  ABTestManager:
    description: "A/B 테스트 유저 그룹 배정, 변수 조회."
    contract:
      provides:
        - "GetVariant(string testId) -> string"
        - "IsInTest(string testId) -> bool"
        - "GetTestConfig(string testId) -> object"
      requires:
        - "RemoteConfigService.GetConfig()"

  RemoteConfigService:
    description: "Firebase Remote Config 래핑."
    contract:
      provides:
        - "GetConfig(string key) -> object"
        - "FetchConfig() -> bool"
        - "GetLastFetchTime() -> DateTime"
      events_published:
        - "OnConfigUpdated()"
      requires: []
    sdk: "FIREBASE_ANALYTICS"

output_files:
  - "CurrencyManager.cs"
  - "SDK/IAPManager.cs"
  - "SDK/AdManager.cs"
  - "NotificationManager.cs"
  - "SDK/ABTestManager.cs"
  - "SDK/RemoteConfigService.cs"
