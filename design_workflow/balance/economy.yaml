# BalloonFlow — Stage 2-3: Balance — Economy
# STATUS: confirmed — 1.0(소프트런칭) 범위
# 정본 참조: systems/outgame.yaml, bm/monetization.yaml

domain: Balance
sub_doc: economy
status: confirmed

# ─────────────────────────────────────
# 1. 재화 구조
# ─────────────────────────────────────
currency_structure:
  primary:
    name: "코인"
    type: soft
    initial: 2000
    initial_note: "이어하기 약 2회분. 런칭 초기 코인 수급 어려움 고려"
  secondary:
    name: "젬 (하드 재화)"
    status: _TBD
    note: "1.0 미포함. 피어 분석 후 필요 시 추가"

# ─────────────────────────────────────
# 2. 코인 소스 (획득)
# ─────────────────────────────────────
coin_source:
  level_clear:
    normal: 50
    hard: 75
    super_hard: 100
    note: "기본 소스. 튜토리얼/휴식도 노말과 동일(50)"
  rewarded_ad: "TBD (피어 분석 후)"
  iap: "코인팩/번들 구매 (bm/monetization.yaml 참조)"
  daily_reward: "7일 주기 순차 보상"

# ─────────────────────────────────────
# 3. 코인 싱크 (소비)
# ─────────────────────────────────────
coin_sink:
  boosters:
    tray_add: { cost: 300, unit: 1, note: "가장 저렴한 보험" }
    shuffle: { cost: 1500, unit: 3, note: "소트 퍼즐 표준" }
    hand: { cost: 1900, unit: 3, note: "Hidden 기믹 대응" }
    color_remove: { cost: 2900, unit: 3, note: "가장 강력" }
  heart_refill: { cost: 900, note: "전체 충전 (5개)" }
  continue:
    escalating_cost: [900, 1900, 2900]
    max_uses_per_play: 3
    note: "첫 1회 무료, 이후 900→1900→2900코인 단계별 상승. 재시도 시 1회차 리셋"
  cosmetics: { status: _TBD, note: "이후 업데이트" }

# ─────────────────────────────────────
# 4. 패키지별 코인 흐름 예상
# ─────────────────────────────────────
coin_flow_per_package:
  description: >
    20레벨 패키지 기준 코인 소스/싱크 예상.
    무과금 유저, 부스터 미사용 기준 자연 획득량.
  estimates:
    PKG1:
      source_estimate: "20레벨 × 50코인 = 1,000코인 (대부분 노말/휴식)"
      sink_estimate: "낮음 (튜토리얼 단계, 부스터 필요 낮음)"
      net_flow: "양수 (코인 축적기)"
    PKG2:
      source_estimate: "노말15×50 + 하드3×75 + 슈퍼하드1×100 + 휴식1×50 = 1,125코인"
      sink_estimate: "하드에서 부스터 1~2회 (300~600코인)"
      net_flow: "소폭 양수"
    PKG3:
      source_estimate: "~1,125코인"
      sink_estimate: "하드+슈퍼하드에서 부스터+컨티뉴 증가 (1,000~1,500코인)"
      net_flow: "균형~소폭 음수 (과금 유도 시작)"
    PKG4:
      source_estimate: "~1,125코인"
      sink_estimate: "부스터+컨티뉴 빈번 (1,500~2,000코인)"
      net_flow: "음수 (과금 유도)"
    PKG5:
      source_estimate: "~1,125코인"
      sink_estimate: "부스터+컨티뉴 집중 (2,000~3,000코인)"
      net_flow: "음수 (과금 의존 증가)"

# ─────────────────────────────────────
# 5. 밸런스 원칙
# ─────────────────────────────────────
balance_principles:
  - "PKG1~2: 코인 축적기. 무과금으로 편안하게 진행"
  - "PKG3: 전환점. 부스터/컨티뉴 소비 증가 → 코인 부족 시작"
  - "PKG4~5: 과금 유도. 자연 획득만으로는 부족한 구조"
  - "net_coin_flow 추적: 패키지 단위 인플레 방지"
  - "트레이 추가(300코인)는 무과금도 자주 구매 가능"
  - "색상 제거(2900/3)는 무과금에게 고급 아이템"
  - "가격 정책 역산: 코인 가격은 부스터(300~2900) + 컨티뉴(900~2900) 기준"

# ─────────────────────────────────────
# 6. 확정된 경제 요소 (컨셉 기반)
# ─────────────────────────────────────
confirmed_economics:
  season_pass:
    status: _DEFERRED
    note: "BM/LiveOps 디렉션 완료 후 확정. 컨셉 가이드라인만 기록."
    free_track: "기능적 보상 (코인, 부스터, 라이프 리필)"
    premium_track: "꾸미기 보상 (시즌 한정 풍선 이펙트, 다트/보관함 스킨)"
    philosophy: >
      프리미엄 트랙은 순수 코스메틱. "더 예쁘게 터뜨리는 경험이지, 더 쉽게 클리어하는 파워가 아님."
      단, 무료 트랙의 부스터/라이프 리필은 게임플레이 보상이므로 이 원칙과 별개.
  win_streak_bonus:
    - { streak: 3, reward: "보너스 풍선 → 터지며 추가 보상" }
    - { streak: 5, reward: "골드 풍선 → 추가 코인" }
    - { streak: 10, reward: "특별 풍선이 연쇄로 팡팡팡 터지며 대량 보상" }

# ─────────────────────────────────────
# 7. KPI 추적 지표
# ─────────────────────────────────────
kpi_metrics:
  - "ARPDAU (일일 활성 유저당 매출)"
  - "Conversion Rate (첫 구매 전환율)"
  - "D1/D7/D30 리텐션"
  - "Booster Usage Rate (레벨별 부스터 사용률)"
  - "Continue Usage Rate (컨티뉴 사용률 × near_miss_rate 교차)"
  - "Net Coin Flow (패키지별 소스-싱크 추적)"
  - "IAP Revenue by Product (상품별 매출)"
  - "Ad Revenue per User (유저당 광고 매출)"
