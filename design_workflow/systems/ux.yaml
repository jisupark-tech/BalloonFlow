# BalloonFlow — Stage 2-2: UX System
# Domain: UX | Tier: 2
# 정본 참조: concept.yaml — ui_layout, design_pillars, feedback_asymmetry

domain: UX
tier: 2

# ─────────────────────────────────────
# Required Parameters (7/7)
# ─────────────────────────────────────
parameters:
  ftue_steps: 5
  # 1. 앱 실행 → 스플래시
  # 2. Level 1: 강제 가이드 (보관함 탭 → 다트 → 풍선 기본 체험)
  # 3. Level 2: 색상 매칭 체험 (올바른 보관함 선택)
  # 4. Level 3: 보관함 선택 순서 전략 안내
  # 5. Level 5: 스타 시스템 + 보상 체험

  tutorial_type: forced_guide
  # Level 1~2: 완전 가이드 (하이라이트 + 화살표 + 탭 유도)
  # Level 3~4: 반가이드 (힌트만)
  # Level 5: 라이트 가이드

  session_target_time: [5, 15]   # 분
  daily_target_time: [15, 45]    # 분

  hud_elements:
    - "현재 레벨 번호 (좌상단)"
    - "남은 풍선 수 (상단 중앙)"
    - "점수 (상단 우측)"
    - "스타 프로그레스 바 (상단)"
    - "보관함 그리드 (하단 — 각 색상 보관함 + 탄창 숫자 뱃지)"
    - "레일 영역 (중앙 — 다트 이동 경로)"
    - "일시정지 버튼 (좌상단)"

  popup_policy:
    priority_order:
      - 1: "레벨 클리어 결과 (필수)"
      - 2: "레벨 실패 → 컨티뉴 팝업 (첫 1회 무료, 이후 900→1900→2900코인 단계별 상승, 최대 3회)"
      - 3: "스타터팩 팝업 (NPU, 1회 한정, Lv.10~20)"
      - 4: "전면 광고 (Lv.20+, 30초 딜레이)"
      - 5: "재도전/메인 복귀 선택"
    rules:
      - "동시 팝업 최대 1개 (큐잉 처리)"
      - "스페셜 오퍼 팝업 간 최소 20분 쿨타임 (첫 등장 예외)"
    note: "정본: systems/outgame.yaml offer_policy"

  feedback_channels:
    visual:
      - "풍선 팝 — 물/반짝이 파편 방사형 (과하게)"
      - "마지막 풍선 팝 — 화면 흔들림 (과하게)"
      - "다트 레일 이동 — 깨끗한 궤적 (담백하게)"
      - "보관함 탭 — 살짝 눌림 반응 (담백하게)"
      - "스타 획득 애니메이션"
      - "보드 클리어 축하 연출"
    audio:
      - "풍선 팝 파열음 — 피치 점점 상승 (팡-팡-팡-팡-팡!!)"
      - "마지막 풍선 — 피치 최고점에서 크게"
      - "보관함 탭 사운드 (가벼움)"
      - "클리어 팡파레"
      - "BGM (차분하고 정돈된 톤)"
    haptic:
      - "풍선 팝 시 약한 진동"
      - "연속 팝 시 점점 강해지는 진동"
      - "클리어 시 패턴 진동"

  feedback_asymmetry_principle: >
    필러 5 구현: "쏘는 쪽은 담백, 터지는 쪽은 과하게".
    다트/보관함 연출 = 최소, 풍선 팝 연출 = 최대.
    유저 시선이 상단 풍선 보드에 100% 집중되도록.

# ─────────────────────────────────────
# Screen Flow — concept.yaml ui_layout 참조
# ─────────────────────────────────────
screen_flow:
  title_screen:
    elements: ["'Balloon Flow!' 로고", "터치 투 스타트", "로딩"]
    transition: "자동 → 메인 화면"
  main_screen:
    elements: ["플레이 버튼 (중앙)", "현재 레벨", "코인 표시 (우상단)", "하트 표시 (좌상단)", "상점 버튼", "데일리 보상 버튼"]
    note: "OutGame 확정 반영. 하트/코인/상점 UI 추가"
  level_screen:
    areas:
      - "상단 UI: Level, 남은 풍선 수, 점수"
      - "상단 보드: 색상별 풍선 쌓여있는 퍼즐 영역"
      - "중앙 컨베이어: 다트가 레일을 따라 이동하는 구간"
      - "하단 슬롯: 색상 보관함 그리드 (탄창 숫자 표시)"
      - "화면 하단: 'Balloon Flow!' 타이틀"
  result_screen:
    clear: ["스타 연출", "점수", "보상", "다음 레벨 버튼"]
    fail: ["실패 메시지", "컨티뉴 버튼 (첫 1회 무료, 이후 900→1900→2900코인, 최대 3회)", "재도전 버튼", "메인으로 버튼"]
    note: >
      컨티뉴 = 홀더 내 보관함을 상단 대기열로 이동, 유저 터치 시 레일 재투입.
      재시도 시 1회차(900코인)부터 리셋. 정본: systems/outgame.yaml

# ─────────────────────────────────────
# Systems List
# ─────────────────────────────────────
systems:
  - UIManager            # 전체 UI 상태 관리
  - PageController       # 화면 전환 관리
  - PopupManager         # 팝업 큐잉, 우선순위 관리
  - TutorialManager      # FTUE 진행 관리
  - FeedbackController   # 시청각/햅틱 피드백 제어 (비대칭 원칙)
  - HUDController        # 인게임 HUD 업데이트
