# BalloonFlow — Stage 2-2: UX System
# Domain: UX | Tier: 2

domain: UX
tier: 2

# ─────────────────────────────────────
# Required Parameters (7/7)
# ─────────────────────────────────────
parameters:
  ftue_steps: 7
  # 1. 앱 실행 → 스플래시 (2초)
  # 2. 간단 스토리 컷씬 (풍선이 날아가는 도입)
  # 3. Level 1: 강제 가이드 (첫 탭 유도)
  # 4. Level 2: 연쇄 팝 체험 (인접 같은 색 배치)
  # 5. Level 3: 다트 큐 관리 체험 (여러 색상 전환)
  # 6. Level 4: 실패 경험 + 재도전 유도
  # 7. Level 5: 스타 시스템 + 클리어 보상 체험

  tutorial_type: forced_guide
  # 강제 가이드: 하이라이트 + 화살표 + 탭 유도. Level 1~3은 완전 가이드,
  # Level 4~5는 반가이드 (힌트만 표시).

  session_target_time: [5, 15]   # 분. 1세션 목표 5~15분
  daily_target_time: [15, 45]    # 분. 일일 목표 15~45분

  hud_elements:
    - "현재 레벨 번호 (좌상단)"
    - "목표 표시 — 남은 풍선 수 (상단 중앙)"
    - "남은 다트 수 (우상단)"
    - "점수 (상단 우측)"
    - "스타 프로그레스 (상단 바)"
    - "다트 큐 (하단 중앙 — 현재+다음 5개 표시)"
    - "부스터 슬롯 3개 (하단 좌측)"
    - "일시정지 버튼 (좌상단)"
    - "설정 버튼 (우상단, 일시정지 메뉴 내)"

  popup_policy:
    priority_order:
      - 1: "레벨 클리어 결과 (필수)"
      - 2: "레벨 실패 + 컨티뉴 제안"
      - 3: "하트 부족 경고"
      - 4: "스타터팩/특별 오퍼 (시간 제한)"
      - 5: "시즌패스 진행"
      - 6: "피기뱅크 가득 참"
      - 7: "일일 보상 수령"
      - 8: "업데이트/공지"
    rules:
      - "동시 팝업 최대 1개 (큐잉 처리)"
      - "같은 오퍼 팝업은 세션당 1회만"
      - "전면 광고 직후 오퍼 팝업 금지 (최소 60초 간격)"
      - "레벨 3회 연속 실패 시 부스터 제안 팝업 우선"

  feedback_channels:
    visual:
      - "풍선 팝 이펙트 (색종이 파티클)"
      - "연쇄 팝 시 화면 흔들림 (증가하는 강도)"
      - "다트 발사 궤적 (곡선 트레일)"
      - "스타 획득 애니메이션"
      - "레일 overflow 경고 (붉은 글로우)"
      - "콤보 숫자 팝업 (2x, 3x...)"
    audio:
      - "풍선 팝 사운드 (피치 상승 — 연쇄 시)"
      - "다트 발사 '슝' 사운드"
      - "클리어 팡파레"
      - "실패 슬픔 사운드"
      - "코인 획득 찰칵 사운드"
      - "BGM (챕터별 테마)"
    haptic:
      - "풍선 팝 시 약한 진동 (10ms)"
      - "연쇄 팝 시 강한 진동 (30ms)"
      - "클리어 시 패턴 진동"

# ─────────────────────────────────────
# Screen Flow
# ─────────────────────────────────────
screen_flow:
  title_screen:
    elements: ["로고", "터치 투 스타트", "로딩 바"]
    transition: "자동 → 메인 화면 (로드 완료 시)"
  main_screen:
    elements: ["플레이 버튼 (중앙)", "현재 레벨 표시", "코인/젬 표시 (상단)", "하트 표시 (상단)", "설정 (우상단)", "상점 (좌하단)", "시즌패스 (우하단)", "챕터 맵 배경"]
  level_screen:
    elements: ["HUD (위 참조)", "레일 + 풍선", "다트 큐", "부스터 슬롯"]
  result_screen:
    clear: ["스타 연출", "점수 표시", "보상 코인", "광고 2배 버튼", "다음 레벨 버튼"]
    fail: ["실패 메시지", "목표 달성률", "컨티뉴 버튼 (광고/젬)", "재도전 버튼", "메인으로 버튼"]
  shop_screen:
    tabs: ["젬 팩", "코인 팩", "부스터", "스킨", "특별 오퍼"]

# ─────────────────────────────────────
# Systems List
# ─────────────────────────────────────
systems:
  - UIManager            # 전체 UI 상태 관리
  - PageController       # 화면 전환 관리
  - PopupManager         # 팝업 큐잉, 우선순위 관리
  - TutorialManager      # FTUE 진행 관리
  - FeedbackController   # 시청각/햅틱 피드백 제어
  - HUDController        # 인게임 HUD 업데이트
