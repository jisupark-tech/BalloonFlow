# BalloonFlow — Stage 2-2: Meta System
# Domain: Meta | Tier: 3

domain: Meta
tier: 3

# ─────────────────────────────────────
# Optional Parameters (all Meta params are optional)
# ─────────────────────────────────────
parameters:
  collection_system:
    enabled: true
    type: "풍선 도감"
    description: >
      게임에 등장하는 풍선 종류(일반, 이중, 얼음, 폭탄, 무지개, 자물쇠)와
      챕터별 특수 테마 풍선을 수집. 수집 완료 시 보상 지급.
    total_collectibles: 60
    categories:
      - { name: "기본 풍선", count: 8, source: "색상별 기본" }
      - { name: "특수 풍선", count: 12, source: "기믹별 변형" }
      - { name: "챕터 풍선", count: 30, source: "챕터 테마 한정" }
      - { name: "시즌 풍선", count: 10, source: "시즌 이벤트 한정" }
    rewards:
      - { milestone: 10, reward: "코인 2000" }
      - { milestone: 25, reward: "젬 50" }
      - { milestone: 40, reward: "한정 다트 스킨" }
      - { milestone: 60, reward: "한정 프로필 프레임" }

  decoration_system:
    enabled: true
    type: "다트 & 풍선 스킨"
    description: >
      다트 외형(색상, 이펙트)과 풍선 팝 이펙트를 커스터마이징.
      스킨은 게임 메커닉에 영향 없음 (순수 코스메틱).
    categories:
      - dart_skins: "20종 (기본 5 + 상점 10 + 시즌 5)"
      - pop_effects: "10종 (기본 2 + 상점 5 + 이벤트 3)"
    acquisition:
      - "코인 구매 (2000~8000)"
      - "젬 구매 (100~500)"
      - "시즌패스 보상"
      - "도전과제 달성"

  star_system:
    enabled: true
    description: "레벨당 1~3 스타. 점수 기반 판정."
    thresholds:
      # base_score = balloon_count * 100 (정본: systems/ingame.yaml)
      star_1: "base_score (= balloon_count * 100)"
      star_2: "ceil(base_score * 1.5)"
      star_3: "ceil(base_score * 2.2)"
    uses:
      - "챕터 해금 게이트 (다음 챕터 진입에 스타 N개 필요)"
      - "특별 보상 (누적 스타 마일스톤)"
    gate_requirements:
      chapter_2: 15   # 20레벨 중 15스타 (평균 0.75스타/레벨)
      chapter_5: 90
      chapter_8: 180
      chapter_10: 280

  achievement_system:
    enabled: true
    categories:
      - { name: "팝 마스터", examples: ["풍선 100개 터뜨리기", "풍선 10000개 터뜨리기"] }
      - { name: "콤보 킹", examples: ["5연쇄 달성", "10연쇄 달성"] }
      - { name: "스피드 러너", examples: ["30초 내 클리어", "20초 내 클리어"] }
      - { name: "컬렉터", examples: ["풍선 10종 수집", "전체 수집"] }
      - { name: "마라토너", examples: ["100레벨 클리어", "200레벨 클리어"] }
    total_achievements: 50
    rewards: "젬 10~50 per achievement"

  prestige_system:
    enabled: false
    note: "200레벨 컨텐츠 소진 후 하드 모드 또는 무한 모드 검토. 소프트런칭 데이터 기반."

# ─────────────────────────────────────
# Systems List
# ─────────────────────────────────────
systems:
  - CollectionManager    # 풍선 도감 관리
  - SkinManager          # 스킨 장착/해제
  - StarManager          # 스타 누적, 게이트 판정
  - AchievementManager   # 도전과제 추적, 보상 지급
