# BalloonFlow — Stage 2-2: Meta System
# Domain: Meta | Tier: 3
# STATUS: _DEFERRED — 리텐션 데이터 기반 도입 여부 검토

domain: Meta
tier: 3
status: _DEFERRED

# ─────────────────────────────────────
# Deferred Reason
# ─────────────────────────────────────
deferred_reason: >
  컨셉 문서 명시: "메타 시스템(컬렉션, 꾸미기 등)은 리텐션 데이터를
  기반으로 도입 여부를 검토합니다."
  소프트런칭 후 리텐션 데이터 확인 후 설계.

# ─────────────────────────────────────
# Expected Scope (리텐션 데이터 확인 후 확정)
# ─────────────────────────────────────
expected_parameters:
  collection_system:
    type: "풍선 도감"
    note: "시즌 풍선 스킨 수집과 연계 가능"
  decoration_system:
    type: "다트 & 보관함 스킨"
    note: "시즌패스 프리미엄 트랙 보상으로 활용 (concept.yaml 확정)"
  star_system:
    description: "레벨당 1~3 스타. 점수 기반 판정."
    note: >
      스타 시스템 자체는 InGame ScoreManager에서 관리 (확정).
      메타적 활용 (게이트, 마일스톤)은 리텐션 데이터 후 확정.
    thresholds:
      star_1: "base_score (= balloon_count * 100)"
      star_2: "ceil(base_score * 1.5)"
      star_3: "ceil(base_score * 2.2)"
  achievement_system:
    note: "리텐션 데이터 기반 도입 검토"

# ─────────────────────────────────────
# Confirmed from Season Pass (BM Domain)
# ─────────────────────────────────────
confirmed_cosmetics:
  description: >
    시즌패스 프리미엄 트랙에서 제공되는 코스메틱은 확정:
    시즌 한정 풍선 이펙트, 다트 스킨, 보관함 스킨.
    "더 예쁘게 터뜨리는 경험이지, 더 쉽게 클리어하는 파워가 아님."
  types:
    - "풍선 이펙트 스킨 (터질 때 비주얼 변경)"
    - "다트 스킨 (외형 변경)"
    - "보관함 스킨 (외형 변경)"
  note: "SkinManager는 시즌패스 보상 관리에만 사용. 독립 메타 시스템은 보류."

# ─────────────────────────────────────
# Expected Systems (확정 시 채워질 자리)
# ─────────────────────────────────────
expected_systems:
  - CollectionManager    # 도감 관리 — 리텐션 데이터 후
  - SkinManager          # 스킨 장착/해제 — 시즌패스 연계 선확정
  - StarManager          # 스타 메타 활용 — 리텐션 데이터 후
  - AchievementManager   # 도전과제 — 리텐션 데이터 후
