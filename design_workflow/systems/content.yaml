# BalloonFlow — Stage 2-2: Content System
# Domain: Content | Tier: 1
# 정본 참조: concept.yaml, beat_chart.yaml, gimmick_spec.yaml

domain: Content
tier: 1

# ─────────────────────────────────────
# Required Parameters (11/11)
# ─────────────────────────────────────
parameters:
  total_level_count: 100
  package_structure: "5 패키지 x 20 레벨 = 100 레벨 (출시 시)"
  level_duration_avg: [30, 90]   # 초. 평균 목표 60초
  new_mechanic_intro_cycle: "패키지별 도입 — beat_chart.yaml 참조"
  difficulty_spike_cycle: "pos 4,9,14,19 = 하드/슈퍼하드"
  level_purpose_type:
    - 튜토리얼     # 신규 요소 학습
    - 노말         # 일반 난이도
    - 하드         # pos 4,9,14 — 도전 레벨
    - 슈퍼하드     # pos 19 — 패키지 클라이맥스
    - 휴식         # pos 5,10,15,20 — 쉬운 레벨
  object_count_curve:
    description: "레벨별 오브젝트 수 증가 곡선 (100레벨 기준)"
    formula: "object_count = floor(8 + level_number * 0.64 + sin(level_number/5) * 3)"
    range: [8, 72]
    curve_type: "linear_with_oscillation"
    samples:
      level_1: 8
      level_10: 17
      level_20: 23
      level_40: 37
      level_60: 49
      level_80: 62
      level_100: 72
  color_intro_schedule:
    - { level_range: [1, 2], colors: 2, note: "튜토리얼 — Red, Blue" }
    - { level_range: [3, 5], colors: 3, note: "Green 추가 (PKG1 pos3)" }
    - { level_range: [6, 7], colors: 4, note: "Yellow 추가 (PKG1 pos6)" }
    - { level_range: [8, 20], colors: 5, note: "Pink 추가 (PKG1 pos8)" }
    - { level_range: [21, 25], colors: 5, note: "PKG2 시작, 5색 유지" }
    - { level_range: [26, 40], colors: 6, note: "Orange 추가 (PKG2 pos6)" }
    - { level_range: [41, 45], colors: 6, note: "PKG3 시작, 6색 유지" }
    - { level_range: [46, 60], colors: 7, note: "Purple 추가 (PKG3 pos6)" }
    - { level_range: [61, 65], colors: 7, note: "PKG4 시작, 7색 유지" }
    - { level_range: [66, 100], colors: 8, note: "Sky 추가 (PKG4 pos6) — 최대" }
  tutorial_level_count: 5
  gimmick_intro_schedule:
    - { level: 1, gimmick: "normal_object", description: "기본 오브젝트만. 보관함→다트→풍선 코어 루프 학습." }
    - { level: 11, gimmick: "hidden", description: "Hidden — 보관함 색상 숨김. 터치 가능 시 공개." }
    - { level: 21, gimmick: "spawner_transparent", description: "Spawner 투명 — 보드 위 생성기, 다음 색상 보임." }
    - { level: 31, gimmick: "spawner_opaque", description: "Spawner 불투명 — 보드 위 생성기, 다음 색상 안 보임." }
    - { level: 41, gimmick: "big_object", description: "Big Object — 1x1보다 큰 오브젝트, 라이프 시스템." }
    - { level: 61, gimmick: "chain", description: "Chain — 2개 보관함 연결, 쌍으로 동시 활성화." }
  gimmick_intro_note: >
    5종 기믹. 상세 정의는 gimmick_spec.yaml 참조.
    Beat Chart 디렉션은 beat_chart.yaml 참조.
  level_composition_params:
    object_count: "8~72 (레벨별)"
    holder_count: "2~8 (색상 수에 비례)"
    magazine_per_holder: "레벨별 설정 (탄창 수)"
    board_layout: "고정 보드 — 오브젝트 배치 패턴"
    gimmick_ratio: "기믹별 0%~60% (beat_chart.yaml 참조)"

# ─────────────────────────────────────
# Optional Parameters
# ─────────────────────────────────────
  special_level_types:
    - 슈퍼하드:
        description: "패키지 pos 19. 최대 기믹 조합 + 제한 조건."
        frequency: "매 패키지 1회 (pos 19)"
    - 하드:
        description: "패키지 pos 4,9,14. 기믹 2-3종 조합."
        frequency: "매 패키지 3회"

# ─────────────────────────────────────
# Season Themes — concept.yaml _LOCKED
# ─────────────────────────────────────
# NOTE: 패키지별 테마가 아닌, 시즌별 오브젝트 비주얼 교체 방식.
# 배경은 항상 깔끔한 파스텔 톤 단색 (concept.yaml art_direction _LOCKED)
season_themes:
  description: "풍선의 비주얼만 교체하면 시즌이 갱신. 배경은 고정 단색."
  examples:
    - "봄: 벚꽃 풍선"
    - "여름: 수박 풍선"
    - "할로윈: 호박 풍선"
    - "크리스마스: 오너먼트 풍선"

# ─────────────────────────────────────
# Tutorial Levels (1~5) — 보관함 기반
# ─────────────────────────────────────
tutorial_levels:
  level_1:
    balloons: 6
    colors: 2
    holders: 2
    magazine_each: 3
    gimmicks: []
    guide: "full — 보관함 탭 유도, 다트 배치→풍선 타격 체험"
    objective: "보관함 탭 → 다트 → 풍선 터뜨리기 기본 체험"

  level_2:
    balloons: 8
    colors: 2
    holders: 2
    magazine_each: 4
    gimmicks: []
    guide: "full — 2색 보관함 순서 선택 체험"
    objective: "보관함 선택 순서의 중요성 체험"

  level_3:
    balloons: 10
    colors: 3
    holders: 3
    magazine_each: 4
    gimmicks: []
    guide: "semi — 3색 매칭 체험 (올바른 보관함 하이라이트)"
    objective: "3색 보관함 선택하여 색상별 풍선 제거 체험"

  level_4:
    balloons: 10
    colors: 3
    holders: 3
    magazine_each: 3
    gimmicks: []
    guide: "semi — 살짝 부족한 탄창으로 전략 필요"
    objective: "순서 최적화가 필요한 첫 도전 (여유 적음)"

  level_5:
    balloons: 12
    colors: 3
    holders: 3
    magazine_each: 5
    gimmicks: []
    guide: "light — 스타 시스템 안내"
    objective: "3스타 도전 + 보상 수령 체험"

# ─────────────────────────────────────
# Daily Challenge — concept.yaml _LOCKED
# ─────────────────────────────────────
daily_challenge:
  name: "오늘의 풍선"
  description: "매일 특수 조건의 레벨이 하나 열림"
  examples:
    - "빨간 풍선만 100개 터뜨리기"
    - "30초 안에 전부 클리어"
    - "보관함 3개로 보드 비우기"
  reward: "클리어 시 시즌 패스 경험치 지급"

# ─────────────────────────────────────
# Systems List
# ─────────────────────────────────────
systems:
  - LevelManager         # 레벨 로드, 진행, 완료 처리
  - LevelDataProvider    # 레벨 데이터(JSON) 로드 및 파싱
  - PackageManager       # 패키지 진행, 해금 관리 (5 PKG)
  - GimmickManager       # 5종 기믹 활성화/비활성화
  - TutorialController   # 튜토리얼 레벨 진행 제어

# ─────────────────────────────────────
# References
# ─────────────────────────────────────
references:
  - beat_chart.yaml      # Beat Chart 디렉션 (패키지별 CR, 기믹 빈도, 감정 곡선)
  - gimmick_spec.yaml    # 5종 기믹 상세 정의 및 상호작용 매트릭스
