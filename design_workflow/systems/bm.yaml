# BalloonFlow — Stage 2-2: BM System
# Domain: BM | Tier: 2
# STATUS: confirmed (IAP/광고/오퍼) + _DEFERRED (시즌패스 — BM/LiveOps 디렉션 후)
# 정본 참조: bm/monetization.yaml, systems/outgame.yaml

domain: BM
tier: 2
status: partial

# ─────────────────────────────────────
# 수익화 모델
# ─────────────────────────────────────
monetization_model: "F2P + IAP + Ad"
scope: "1.0은 Static Pricing만. Dynamic Pricing은 소프트런칭 후"

# ─────────────────────────────────────
# DEFERRED: Season Pass — BM/LiveOps 디렉션 완료 후
# ─────────────────────────────────────
season_pass:
  status: _DEFERRED
  structure: "업계 표준 구조"
  free_track:
    type: "기능적 보상"
    contents: "코인, 부스터, 라이프 리필"
  premium_track:
    type: "꾸미기 보상"
    contents: "시즌 한정 풍선 이펙트, 다트/보관함 스킨"
  philosophy: >
    "더 예쁘게 터뜨리는 경험이지, 더 쉽게 클리어하는 파워가 아님."
    프리미엄 트랙은 순수 코스메틱만 포함. 게임플레이 이점 없음.
  xp_source: "레벨 클리어, 스타 획득, 데일리 챌린지 클리어"
  pricing:
    status: _TBD
    note: "피어 분석 후 확정. 업계 기준 $3.99~$6.99 예상."

# ─────────────────────────────────────
# IAP 상품 구조 (1.0 범위)
# ─────────────────────────────────────
iap_structure:
  description: "상세 상품 테이블은 bm/monetization.yaml 참조"
  categories:
    - { name: "표준 코인 상품", tiers: 6, price_range: "$0.99~$99.99", efficiency: "1.0x~2.0x" }
    - { name: "표준 번들 상품", tiers: 5, price_range: "$4.99~$99.99", efficiency: "1.7x~2.0x" }
    - { name: "스타터팩", tiers: 2, price_range: "$0.99~$1.99", efficiency: "3.0x+", limit: "1회 한정" }
    - { name: "광고 제거", tiers: 1, price_range: "$2.99~$4.99", limit: "1회 영구" }
  value_base: "Standard Coin T1 ($0.99 = 900코인) = 효율 1.0배"
  value_principle: "스타터팩(3.0x+) > 번들(1.7~2.5x) > 코인(1.0~2.0x)"

# ─────────────────────────────────────
# 광고
# ─────────────────────────────────────
ad_placements:
  rewarded:
    - "하트 충전 (하트 4개 이하)"
    - "부스터 1회 무료 사용 (판 진행 중)"
    - "코인 보상 2배 (데일리 보상)"
    - "컨티뉴 광고: 추후 추가 (피어 분석 필요)"
  interstitial:
    protection: "Lv.20까지 미노출 (FTUE 보호)"
    timing: "레벨 결과 화면에서만"
    cooldown: "30초"
    removal: "광고 제거 IAP 구매 시 영구 제거"

# ─────────────────────────────────────
# 이후 업데이트 (1.0 미포함)
# ─────────────────────────────────────
deferred:
  piggy_bank:
    status: _DEFERRED
    note: "소프트런칭 후 추가. $2.99, 코인 누적→구매하여 열기"
  dynamic_pricing:
    status: _DEFERRED
    note: "소프트런칭 데이터 확인 후 도입 (Best Value, Mega Sale 등)"
  revenue_projections:
    status: _DEFERRED
    note: "소프트런칭 데이터 필요"

# ─────────────────────────────────────
# Systems List
# ─────────────────────────────────────
confirmed_systems:
  - IAPManager           # IAP 구매 처리
  - AdManager            # 보상형/전면 광고 관리
  - OfferManager         # 상품 노출 정책/팝업 관리

deferred_systems:
  - SeasonPassManager    # 시즌패스 — BM/LiveOps 디렉션 완료 후
  - PiggyBankManager     # 피기뱅크 — 소프트런칭 후
