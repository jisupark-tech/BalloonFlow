# BalloonFlow — Stage 2-2: BM System
# Domain: BM | Tier: 2

domain: BM
tier: 2

# ─────────────────────────────────────
# Required Parameters (6/6)
# ─────────────────────────────────────
parameters:
  monetization_model: "F2P + IAP + Ad"

  ad_free_period: 15   # 최초 15분 (약 Level 5~7) 광고 없음

  rewarded_ad_placements:
    - { placement: "free_heart", trigger: "하트 소진 팝업", reward: "하트 1개", daily_cap: 5 }
    - { placement: "free_continue", trigger: "실패 팝업 (첫 번째)", reward: "다트 +5 이어하기", daily_cap: 3 }
    - { placement: "free_booster", trigger: "레벨 시작 부스터 슬롯", reward: "랜덤 부스터 1개", daily_cap: 3 }
    - { placement: "double_reward", trigger: "레벨 클리어 결과 화면", reward: "코인 보상 2배", daily_cap: 10 }
    - { placement: "free_coin", trigger: "상점 버튼", reward: "코인 200", daily_cap: 5 }
    - { placement: "spin_wheel", trigger: "일일 룰렛", reward: "랜덤 보상", daily_cap: 3 }

  interstitial_frequency:
    base: "매 3레벨 클리어 후 1회"
    cooldown: "최소 120초 간격"
    skip_conditions:
      - "IAP 구매 이력 있는 유저 (광고 제거 미구매 시에도 빈도 50% 감소)"
      - "튜토리얼 레벨 (1~5)"
      - "첫 세션 15분 이내"

  iap_price_range: [0.99, 49.99]   # USD

  first_purchase_timing:
    target: "Day 1, Level 20~30 구간"
    mechanism: "스타터팩 제한 시간 오퍼 (24시간)"
    expected_conversion: 0.03   # 3%

# ─────────────────────────────────────
# Optional Parameters
# ─────────────────────────────────────
  starter_pack:
    price: 1.99   # USD
    contents:
      - "젬 100개"
      - "부스터 팩 (Color Reveal x3, Extra Darts x3, Bomb Dart x3)"
      - "하트 풀 충전"
    unlock_condition: "Level 10 클리어"
    time_limit: "24시간"
    value_ratio: 5.0   # 정가 대비 5배 가치

  piggy_bank:
    price: 2.99   # USD
    fill_cycle: 8   # 8판 플레이 시 가득 참
    reward_composition: "100% 젬"
    value_ratio: 2.5   # 구매가 대비 2.5배 가치
    unlock_condition: "Level 20"
    exposure: "가득 찼을 때 팝업 (레벨 클리어 후 6순위)"
    visual_feedback: "풍선 모양 피기뱅크가 점점 부풀어 오름"

  season_pass:
    price: 4.99   # USD / 시즌 (4주)
    free_track: "코인, 기본 부스터"
    premium_track: "젬, 프리미엄 부스터, 한정 다트 스킨, 한정 풍선 스킨"
    levels: 30
    xp_source: "레벨 클리어 = 10xp, 스타 = 5xp/개, 일일 퀘스트 = 30xp"

  vip_system:
    enabled: false
    note: "소프트런칭 후 데이터 기반 도입 검토"

# ─────────────────────────────────────
# IAP Packages
# ─────────────────────────────────────
iap_packages:
  gem_packs:
    - { name: "소량 젬", gems: 80, price: 0.99, bonus: 0 }
    - { name: "중간 젬", gems: 500, price: 4.99, bonus: 50 }
    - { name: "대량 젬", gems: 1200, price: 9.99, bonus: 200 }
    - { name: "메가 젬", gems: 3000, price: 19.99, bonus: 800 }
    - { name: "울트라 젬", gems: 8000, price: 49.99, bonus: 3000 }
  special_offers:
    - { name: "스타터팩", price: 1.99, trigger: "Level 10", time_limit: "24h" }
    - { name: "레벨 팩", price: 3.99, trigger: "Level 50 실패 3회", time_limit: "6h" }
    - { name: "위크엔드 팩", price: 2.99, trigger: "주말 진입", time_limit: "48h" }
  no_ads:
    - { name: "광고 제거", price: 4.99, type: "non_consumable" }

# ─────────────────────────────────────
# Systems List
# ─────────────────────────────────────
systems:
  - IAPManager           # IAP 구매 처리
  - AdManager            # 광고 노출/보상 처리
  - OfferManager         # 특별 오퍼 타이밍/노출 관리
  - PiggyBankManager     # 피기뱅크 누적/구매 관리
  - SeasonPassManager    # 시즌패스 진행/보상 관리
