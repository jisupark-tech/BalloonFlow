# BalloonFlow — Stage 2-2: Balance System
# Domain: Balance | Tier: 1
# 정본 참조: concept.yaml, balance/difficulty_curve.yaml

domain: Balance
tier: 1

# ─────────────────────────────────────
# Required Parameters (12/12)
# ─────────────────────────────────────
parameters:
  target_clear_rate:
    overall: [0.58, 0.83]
    by_purpose:
      튜토리얼: [0.90, 0.95]
      노말: [0.65, 0.80]
      하드: [0.40, 0.60]
      슈퍼하드: [0.30, 0.45]
      휴식: [0.85, 0.95]
    beat_chart_targets:
      PKG1: { cr_range: [0.60, 0.95], cr_avg: 0.83, attempts_range: [1.0, 3.0], attempts_avg: 1.4 }
      PKG2: { cr_range: [0.40, 0.92], cr_avg: 0.68, attempts_range: [1.0, 5.0], attempts_avg: 2.2 }
      PKG3: { cr_range: [0.38, 0.92], cr_avg: 0.64, attempts_range: [1.0, 5.5], attempts_avg: 2.5 }
      PKG4: { cr_range: [0.35, 0.92], cr_avg: 0.61, attempts_range: [1.0, 6.0], attempts_avg: 2.8 }
      PKG5: { cr_range: [0.30, 0.92], cr_avg: 0.58, attempts_range: [1.0, 7.0], attempts_avg: 3.2 }

  move_limit_formula:
    description: >
      무브 제한 = 보관함들의 총 탄창 합계.
      총 탄창 수 = 최적 풀이 수 * 여유 계수.
    formula: "total_magazine = ceil(optimal_darts * buffer_multiplier)"
    buffer_multiplier_by_purpose:
      튜토리얼: 2.0
      노말: 1.4
      하드: 1.15
      슈퍼하드: 1.05
      휴식: 1.5
    note: >
      보관함 수 × 보관함당 탄창 수 = total_magazine.
      보관함 수는 사용 색상 수에 비례. 탄창 수는 레벨별 조정.

  time_limit: null   # 기본 시간제한 없음. 타임어택 특수 레벨에서만 60초

  retry_cost:
    status: _DEFERRED
    note: "OutGame 라이프 시스템 확정 후 결정"

  booster_expected_usage:
    status: _DEFERRED
    note: "OutGame 부스터 시스템 확정 후 결정"

  difficulty_curve_type: sawtooth
  # 톱니형: 일정 주기로 쉬운→어려운 반복, 하드 스파이크 후 휴식

  fail_rate_threshold: 0.60
  # 실패율 60% 초과 시 밸런스 수정 트리거

  first_fail_expected_level: 19
  # 유저 첫 실패 예상 레벨 (PKG1 pos 19, 첫 번째 하드/슈퍼하드 구간)

  paywall_pressure_points:
    status: _DEFERRED
    note: "OutGame/BM 확정 후 과금 압박점 설계"

  target_near_miss_rate: 0.35
  # 실패 판의 35%가 "아깝게 실패" (목표 80%+ 달성 후 실패)

  max_hopeless_fail_rate: 0.10
  # "희망 없는 실패" (목표 30% 미만) 비율 10% 이하 유지

  optimal_moves_policy: simulation
  # AI 시뮬레이션으로 최소 풀이 다트 수 자동 산출.

# ─────────────────────────────────────
# Optional Parameters
# ─────────────────────────────────────
  time_limit_special:
    time_attack: 60   # 타임어택 레벨 60초

# ─────────────────────────────────────
# Difficulty Formula Detail
# ─────────────────────────────────────
difficulty_formulas:
  # CANONICAL FORMULA: 정본은 balance/difficulty_curve.yaml
  difficulty_score:
    description: "레벨 난이도 점수 (0~100). 정본: balance/difficulty_curve.yaml"
    formula: >
      D(L) = W_color * (num_colors - 2) / 6
           + W_count * balloon_count / 80
           + W_gimmick * gimmick_weight(L)
           + W_return * estimated_return_rate(L)
           + W_skew * color_skew(L)
    weights: { W_color: 20, W_count: 20, W_gimmick: 25, W_return: 20, W_skew: 15 }
    note: "홀더 복귀 메커닉 기반. 상세 정의는 balance/difficulty_curve.yaml 참조."

  sawtooth_pattern:
    description: >
      패키지 내 20레벨 톱니 패턴. 정본: balance/difficulty_curve.yaml
      pos 4,9,14,19 = 하드/슈퍼하드 스파이크.
      pos 5,10,15,20 = 휴식 (난이도 하락).
      pos 1 or 11 = 기믹 도입 튜토리얼 (쉬움).
      슈퍼하드: PKG2+ pos 19.
    modifiers: [0.7, 0.85, 0.95, 1.0, 0.6]

  balloon_speed_curve:
    description: "레벨별 다트 이동 속도 (레일 기반)"
    note: "프로토타입에서 기본 속도 튜닝 후 공식 확정"

# ─────────────────────────────────────
# Scoring (체인 팝 없음 — 순차 1:1 타격 기반)
# ─────────────────────────────────────
scoring_note: >
  체인 팝 메커닉이 없으므로 점수는 기본 팝(100점) + speed_bonus +
  clear_bonus + remaining_holder_bonus로 구성.
  정본: systems/ingame.yaml scoring 참조.

# ─────────────────────────────────────
# Systems List
# ─────────────────────────────────────
systems:
  - DifficultyCalculator   # 난이도 점수 산출
  - BalanceProcessor       # 밸런스 지표 집계 및 자동 조정
  - ClearRateValidator     # 클리어율 모니터링
