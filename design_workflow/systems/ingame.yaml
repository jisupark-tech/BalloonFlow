# BalloonFlow — Stage 2-2: InGame System
# Domain: InGame | Tier: 1
# 정본 참조: concept.yaml — core_mechanic, play_flow, hit_structure

domain: InGame
tier: 1

# ─────────────────────────────────────
# Required Parameters (7/7)
# ─────────────────────────────────────
parameters:
  core_mechanic_type: queue_sort
  input_method: tap_holder   # 보관함 탭 (풍선 직접 탭이 아님)
  board_structure: fixed_board   # 풍선은 고정 보드, 새 유입 없음
  color_count_range: [3, 8]
  matching_rule: same_color_dart_to_balloon_1to1   # 다트 1개 → 풍선 1개
  fail_condition:
    status: _CONFIRMED
    primary: >
      홀더 초과. 홀더(5칸) 대기 보관함이 5개를 초과하면 실패.
      보관함이 홀더에서 대기 → 레일(원형 루프)에 올라가 한 바퀴 돌며 매칭 풍선에 다트 발사
      → 레일 도중 탄창 0이 되면 즉시 제거 → 한 바퀴 돌고도 탄창이 남아있으면 홀더로 복귀 대기.
    holder_slots: 5
    candidates:
      - "홀더(5칸)에 보관함이 가득 차서 새 보관함 추가 불가 (확정)"
      - "탄창이 남은 보관함이 레일에서 복귀 → 홀더 자리 차지 → 초과 시 실패"
    note: >
      홀더 초과 확정 (Pixel Flow 동일). 탄창이 남은 보관함이 홀더로 돌아오면서 홀더가 채워지는 구조.
      보관함 선택 순서가 중요 — 잘못된 순서로 복귀 보관함이 홀더를 넘치게 하면 게임 오버.
      필러 1(선택의 긴장감)과 직결.
  clear_condition: board_clear   # 보드 위 모든 풍선 제거

# ─────────────────────────────────────
# Optional Parameters
# ─────────────────────────────────────
  physics_sim: false   # 레일 기반 이동, 물리 불필요

# ─────────────────────────────────────
# Core Mechanic Detail — concept.yaml _LOCKED
# ─────────────────────────────────────
mechanic_detail:
  holder_system:
    description: >
      하단 그리드에 색상별 보관함 배치. 각 보관함은 탄창(magazine) 수를
      숫자 뱃지로 표시. 플레이어가 보관함을 탭하면 보관함이 레일(원형 루프)에
      올라가 한 바퀴를 돌며 매칭 풍선에 다트를 발사한다.
    holder_grid: "하단 그리드 (화면 하단 영역)"
    magazine_count: "레벨별 설정 (보관함당 다트 수, 예: 8)"
    behavior:
      - "보관함 탭 → 보관함이 레일(원형 루프)에 올라가 한 바퀴 돌기 시작"
      - "레일을 따라 이동하며 매칭 풍선을 만나면 다트 발사"
      - "레일 도중 탄창이 0이 되면 즉시 레일에서 제거"
      - "한 바퀴를 돌고도 탄창이 남아있으면 홀더로 복귀하여 대기"
      - "복귀한 보관함도 홀더 대기열에 포함 → 홀더 초과 실패 리스크"
    visual: "상자 형태, 숫자 뱃지, 볼륨감 있는 3D 오브젝트"

  dart_system:
    description: >
      보관함이 레일(원형 루프) 위에서 이동하며 매칭 풍선을 만나면 다트를 발사.
      다트는 동일 색상 풍선 1개에 1:1 순차 타격.
    hit_structure: "1:1 (다트 1개가 풍선 1개만 타격)"
    dart_shape: "핀/침 형태. 보관함과 동일 색상으로 통일."
    behavior:
      - "보관함이 레일 위를 이동하며 매칭 풍선 만나면 다트 발사"
      - "동일 색상 풍선에 닿는 즉시 타격 → 풍선 팡 팝"
      - "다트 자체는 담백한 연출 (필러 5: 쏘는 쪽은 담백)"

  balloon_system:
    description: >
      보드 상단에 색상별 풍선이 겹겹이 쌓여있는 고정 퍼즐 영역.
      풍선은 새로 유입되지 않으며, 보드 위 모든 풍선을 제거하면 클리어.
    board_type: fixed   # 고정 보드, 새 풍선 유입 없음
    texture: "매끄럽고 쫀득한 고무 물풍선. 볼록하고 탱글탱글."
    pop_behavior:
      - "다트에 닿는 즉시 팡 터짐"
      - "터지는 순간 물/반짝이 파편이 방사형으로 튐"
      - "파열음 피치가 순차적으로 상승 (팡-팡-팡-팡-팡!!)"
      - "마지막 풍선: 피치 최고점 + 화면 흔들림"
    pop_visual_principle: "터지는 쪽은 과하게 (필러 5: 모든 연출 리소스 집중)"

  rail_system:
    description: >
      보관함이 한 바퀴 도는 원형 루프 경로.
      보관함이 레일 위를 이동하며 경로 위의 매칭 풍선을 만나면 다트를 발사.
    type: "circular_loop (원형 루프)"
    function: "보관함 순회 경로. 경로 위에서 매칭 풍선을 만나면 다트 발사."
    shapes_basic: [circular_loop]
    shapes_advanced: "레벨 진행에 따라 경로 변형 추가 (TBD)"

  scoring:
    base_pop: 100   # 풍선 1개 팝 = 100점
    speed_bonus: >
      탄창 내 연속 팝 속도에 따른 보너스.
      빠른 리듬으로 풍선이 터질수록 추가 점수.
    clear_bonus: 500
    remaining_holder_bonus: >
      사용하지 않은 보관함의 남은 탄창 수에 비례한 보너스.

    # CANONICAL DEFINITION: base_score
    base_score_formula: "base_score(L) = balloon_count(L) * base_pop = balloon_count(L) * 100"
    base_score_note: >
      base_score는 해당 레벨의 모든 풍선을 기본 팝(보너스 없이)으로
      터뜨렸을 때의 최소 점수. speed_bonus, clear_bonus,
      remaining_holder_bonus가 추가되어 실제 점수는 더 높아짐.
    star_thresholds:
      star_1: "base_score (= balloon_count * 100)"
      star_2: "ceil(base_score * 1.5)"
      star_3: "ceil(base_score * 2.2)"

  # NOTE: 체인 팝 (인접 같은 색 연쇄) 메커닉은 컨셉에 없음.
  # 컨셉의 "연쇄 터짐"은 탄창 내 다트가 빠른 리듬으로 풍선을
  # 순차 1:1 타격하는 것을 의미. 인접 전파 메커닉이 아님.
  chain_pop_mechanic: false

# ─────────────────────────────────────
# Balloon Types (기본 + 기믹)
# ─────────────────────────────────────
balloon_types:
  normal:
    description: "기본 풍선. 동일 색 다트 1개 타격 시 팝."
    hp: 1

  # 기믹은 5종. 상세 정의는 content/gimmick_spec.yaml 참조.
  gimmick_note: >
    기믹 종류와 도입 시점은 Content 도메인 gimmick_intro_schedule 및
    gimmick_spec.yaml에서 관리. 아래는 InGame 관점의 요약.

# ─────────────────────────────────────
# Gimmick System (5종) — 상세: content/gimmick_spec.yaml
# ─────────────────────────────────────
gimmick_system:
  total_gimmicks: 5
  reference: "content/gimmick_spec.yaml (상세 규칙, 상호작용 매트릭스)"

  hidden:
    name: Hidden
    name_ko: "비활성 색상 숨김"
    intro_level: 11
    ingame_behavior: >
      보관함의 색상이 비활성 상태에서 가려져 있음.
      터치 불가 상태에서는 색상 숨김. 터치 가능 시 색상 공개.
      공개 후 일반 보관함과 동일 동작.

  spawner_transparent:
    name: "Spawner 투명"
    name_ko: "투명 Spawner"
    intro_level: 21
    ingame_behavior: >
      보드 위 Spawner가 방향성을 가지고 배치.
      해당 방향의 오브젝트가 제거되면 새 오브젝트 생성.
      다음 생성될 오브젝트의 색상이 반투명하게 미리 보임.

  spawner_opaque:
    name: "Spawner 불투명"
    name_ko: "불투명 Spawner"
    intro_level: 31
    ingame_behavior: >
      Spawner 투명과 동일하나, 다음 생성 오브젝트 색상이 보이지 않음.
      생성된 후에야 색상 확인 가능.

  big_object:
    name: "Big Object"
    name_ko: "대형 오브젝트"
    intro_level: 41
    ingame_behavior: >
      1x1보다 큰 오브젝트 (2×2, 1×3, 2×3 등 직사각형 가능). 라이프 시스템 보유.
      라이프 수만큼 같은 색 다트 히트 필요. 0이 되면 제거.

  chain:
    name: Chain
    name_ko: "연결 보관함"
    intro_level: 61
    ingame_behavior: >
      2개의 보관함이 체인으로 연결. 쌍으로 동시 활성화.
      한쪽 탭 시 보관함 A가 레일에 올라가 한 바퀴 돌며 다트를 발사한 뒤,
      이어서 보관함 B가 레일에 올라가 한 바퀴 돌며 다트를 발사.
      각각 탄창이 남으면 홀더로 복귀 (색상 A 쭉 → 색상 B 쭉 순서).
      잘못된 타이밍에 보내면 2개 모두 홀더로 복귀하여 홀더 2칸 동시 차지 → 실패 위험 급증.

# ─────────────────────────────────────
# Feedback Asymmetry (필러 5 구현)
# ─────────────────────────────────────
feedback_asymmetry:
  dart_side: "담백 — 레일을 따라 이동, 발사되는 정도. 최소 이펙트."
  balloon_side: "과하게 — 물/반짝이 파편 방사, 피치 상승 파열음, 진동, 화면 흔들림."
  goal: "유저 시선이 상단 풍선에 100% 가도록 유도."

# ─────────────────────────────────────
# Systems List
# ─────────────────────────────────────
systems:
  - HolderManager        # 보관함 그리드, 탄창, 색상, 선택, 비워짐 관리
  - DartManager          # 다트 생성, 레일 배치, 이동, 풍선 타격
  - RailManager          # 레일 경로, 다트 이동 관리
  - BalloonController    # 풍선 상태, 색상, 위치, HP, 오브젝트 풀
  - BoardStateManager    # 보드 전체 상태, 풍선 현황, 클리어/실패 판정
  - PopProcessor         # 팝 판정 (1:1 타격), 피드백 트리거
  - ScoreManager         # 점수 집계, 스타 판정
  - InputHandler         # 보관함 탭 입력 처리
