# BalloonFlow — Stage 2-2: OutGame System
# Domain: OutGame | Tier: 2

domain: OutGame
tier: 2

# ─────────────────────────────────────
# Required Parameters (10/10)
# ─────────────────────────────────────
parameters:
  life_system_type: heart
  max_lives: 5
  life_regen_time: 30   # 30분당 1개 자동 충전
  life_refill_cost:
    gem: 50
    ad: "보상형 광고 1회 = 하트 1개"
    full_refill_gem: 200

  booster_types:
    pre_play:
      - id: "BF_PRE_01"
        name: "Color Reveal"
        description: "다음 다트 5개 색상 미리보기 (기본 3개 → 5개)"
        cost: { coin: 500 }
      - id: "BF_PRE_02"
        name: "Extra Darts +5"
        description: "시작 시 다트 5개 추가"
        cost: { coin: 800 }
      - id: "BF_PRE_03"
        name: "Rail Freeze"
        description: "시작 10초간 풍선 이동 정지"
        cost: { gem: 20 }
    in_play:
      - id: "BF_IN_01"
        name: "Bomb Dart"
        description: "반경 2칸 범위 팝 다트 1개 생성"
        cost: { coin: 600 }
      - id: "BF_IN_02"
        name: "Rainbow Dart"
        description: "아무 색 풍선에 명중 가능한 다트 1개"
        cost: { coin: 700 }
      - id: "BF_IN_03"
        name: "Shuffle Rail"
        description: "레일 위 풍선 위치 무작위 재배치"
        cost: { gem: 15 }
    continue:
      - id: "BF_CONT_01"
        name: "Continue +5"
        description: "실패 후 다트 5개 추가하여 이어하기"
        cost: { gem: 30 }
        escalation: "연속 사용 시 비용 +10 gem씩 증가"

  booster_acquire_sources:
    - level_clear_reward
    - daily_reward
    - shop_purchase
    - rewarded_ad
    - event_reward
    - achievement_reward

  booster_use_timing:
    - pre_play: "레벨 시작 화면에서 선택"
    - in_play: "플레이 중 하단 부스터 슬롯에서 사용"
    - continue: "실패 팝업에서 선택"

  currency_types:
    - id: coin
      name: "코인"
      type: soft
      description: "기본 재화. 부스터 구매, 일부 꾸미기에 사용"
      icon: "gold_coin"
    - id: gem
      name: "젬"
      type: hard
      description: "프리미엄 재화. 하트 충전, 고급 부스터, 컨티뉴에 사용"
      icon: "blue_gem"

  currency_sources:
    coin:
      - { source: "레벨 클리어", amount: "100 + level_number * 5", frequency: "매 레벨" }
      - { source: "스타 보너스", amount: "star_count * 50", frequency: "매 레벨" }
      - { source: "일일 보상", amount: "day_streak * 100 (최대 700)", frequency: "일 1회" }
      - { source: "광고 시청", amount: 200, frequency: "일 5회 제한" }
      - { source: "챕터 완료", amount: 2000, frequency: "챕터당 1회" }
    gem:
      - { source: "챕터 완료", amount: 30, frequency: "챕터당 1회" }
      - { source: "도전과제 달성", amount: "10~50", frequency: "달성 시" }
      - { source: "일일 보상 (7일차)", amount: 20, frequency: "주 1회" }
      - { source: "IAP 구매", amount: "구매 패키지에 따름", frequency: "수시" }
      - { source: "피기뱅크", amount: "누적량", frequency: "구매 시" }

  currency_sinks:
    coin:
      - "부스터 구매 (500~800 per use)"
      - "꾸미기 아이템 (1000~5000)"
      - "다트 스킨 (2000~8000)"
    gem:
      - "하트 충전 (50 per heart, 200 full)"
      - "컨티뉴 (30+ per continue)"
      - "고급 부스터 (15~20)"
      - "프리미엄 꾸미기 (100~500)"

# ─────────────────────────────────────
# Optional Parameters
# ─────────────────────────────────────
  continue_system:
    enabled: true
    first_continue_cost: 30   # gem
    escalation: "+10 gem per additional continue in same level"
    max_continues_per_level: 3
    ad_continue: true   # 첫 번째 컨티뉴는 광고 시청으로 가능

# ─────────────────────────────────────
# Economy Flow Diagram
# ─────────────────────────────────────
economy_flow:
  sources: "레벨클리어, 일일보상, 광고, IAP, 이벤트"
  sinks: "부스터, 하트, 컨티뉴, 꾸미기"
  balance_target: >
    일 평균 코인 획득 2000~3000, 소비 1500~2500.
    젬은 일 평균 무과금 획득 5~10, 소비 경로를 통해 자연 소진.
    D7 기준 무과금 유저 젬 잔고 50~80 유지 목표.

# ─────────────────────────────────────
# Systems List
# ─────────────────────────────────────
systems:
  - LifeManager          # 하트 관리, 자동 충전 타이머
  - BoosterManager       # 부스터 인벤토리, 사용 처리
  - CurrencyManager      # 재화 획득/소비 원장 관리
  - ShopManager          # 상점 UI 데이터 제공
  - DailyRewardManager   # 일일 출석 보상
  - ContinueHandler      # 이어하기 로직 처리
