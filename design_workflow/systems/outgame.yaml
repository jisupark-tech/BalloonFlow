# BalloonFlow — Stage 2-2: OutGame System
# Domain: OutGame | Tier: 2
# 정본 참조: concept.yaml, 아웃게임디렉션.md
# STATUS: confirmed — 1.0(소프트런칭) 범위

domain: OutGame
tier: 2
status: confirmed

# ─────────────────────────────────────
# 전제
# ─────────────────────────────────────
premise:
  fail_condition: "홀더 초과 (Pixel Flow 동일). 실패 조건 변경 시 부스터 구성도 재설계 필요"
  scope: "1.0(소프트런칭) 범위만 정의. 피기뱅크, 시즌패스 등은 소프트런칭 데이터 확인 후"
  booster_count: 4
  currency_type: "코인 1종 (하드 재화 미포함)"

# ─────────────────────────────────────
# 1. 라이프 시스템
# ─────────────────────────────────────
life_system:
  type: heart
  max_count: 5
  consume_trigger: "레벨 실패 시 1개 (클리어/취소 시 소모 없음)"
  auto_recharge:
    interval_min: 30
    full_recharge_min: 150    # 2시간 30분
  refill_paths:
    - { method: "시간 경과", cost: "무료", condition: "자동" }
    - { method: "보상형 광고", cost: "무료 (광고 시청)", condition: "하트 4개 이하" }
    - { method: "코인 즉시 충전", cost: "900코인 (전체 충전)", condition: "상시" }
    - { method: "IAP", cost: "상점 구매", condition: "상시" }
  design_intent: >
    하트 0이 되는 시점이 과금/광고 접점.
    30분 충전은 "잠깐 쉬었다 오면 1개 있다"는 복귀 유도.
    업계 표준 (Pixel Flow, Royal Match, Candy Crush).

# ─────────────────────────────────────
# 2. 부스터 (4종, in_play)
# ─────────────────────────────────────
booster_system:
  total_count: 4
  category: in_play    # 4종 전부 판 진행 중 사용
  unlock: "Lv.1+ (튜토리얼과 함께 순차 학습)"
  use_limit: "제한 없음 (피어 분석 후 제한값 입력 예정)"

  boosters:
    tray_add:
      name: "트레이 추가"
      effect: "레일의 트레이를 1개 추가. 레일에서 동시에 작동할 수 있는 보관함 수 증가"
      timing: "판 진행 중"
      coin_price: 300
      unit_count: 1
      per_unit_cost: 300
      design_intent: "레일 운용 여유 확보로 홀더 초과 간접 완화. 가장 저렴한 가벼운 보험"
      note: "홀더(5칸)가 아니라 레일 트레이를 확장하는 것"
      fail_condition_change: "레일 초과 방식이면 역할 변경 → 재설계 필요"

    hand:
      name: "손"
      effect: "비활성화된(Hidden 상태) 보관함을 즉시 활성화하여 레일에 올릴 수 있게 함"
      timing: "판 진행 중"
      coin_price: 1900
      unit_count: 3
      per_unit_cost: 633
      design_intent: "Hidden 기믹 직접 대응. Hidden 비율 높은 레벨에서 가치 급등. 불확실성 해소"
      fail_condition_change: "실패 조건과 무관 유지"

    shuffle:
      name: "셔플"
      effect: "홀더에 대기 중인 보관함의 배치 순서를 무작위 재배치"
      timing: "판 진행 중"
      coin_price: 1500
      unit_count: 3
      per_unit_cost: 500
      design_intent: "순서 실수 시 리셋 기회. 소트 퍼즐 표준 부스터"
      fail_condition_change: "실패 조건과 무관 유지"

    color_remove:
      name: "색상 제거"
      effect: "유저가 색상 1개 지정 → 해당 색상의 풍선(보드) + 보관함(홀더) + 다트(레일) 일괄 제거"
      timing: "판 진행 중"
      coin_price: 2900
      unit_count: 3
      per_unit_cost: 967
      design_intent: "가장 강력하고 비싼 부스터. 실질적으로 색상 수 1개 감소 효과"
      fail_condition_change: "실패 조건과 무관 유지"

  value_hierarchy: "트레이 추가(300) < 셔플(1,500/3) < 손(1,900/3) < 색상 제거(2,900/3)"
  hierarchy_note: "가격이 효과의 강도를 반영"

  acquisition_paths:
    - "레벨 클리어 보상 (저확률)"
    - "코인으로 구매 (상점)"
    - "보상형 광고 시청 (1회 무료 사용)"
    - "IAP 번들에 포함"

# ─────────────────────────────────────
# 3. 컨티뉴 (이어하기)
# ─────────────────────────────────────
continue_system:
  trigger: "레벨 실패 시 이어하기 팝업 노출"
  first_free: true
  escalating_cost:
    1st: 900       # 첫 번째 이어하기
    2nd: 1900      # 두 번째 이어하기
    3rd: 2900      # 세 번째 이어하기 (최대)
    max_uses: 3    # 동일 회차 최대 3회
    reset_rule: "해당 플레이를 포기하고 재시도하면 1회차(900코인)부터 다시 시작"
  continue_effect: >
    탄창이 남아 홀더에 쌓인 보관함을 홀더 윗부분 대기열로 이동.
    유저가 터치할 때까지 대기열에서 머무르고, 터치하면 레일에 올라감.
    자동으로 홀더에 내려오지 않음 — 유저가 원하는 타이밍에 재투입.
  ad_continue: "추후 추가 (피어 분석 필요)"
  design_intent: >
    아깝게 실패한 유저의 재도전 욕구를 코인 소비로 연결.
    단계별 상승 비용으로 컨티뉴 남용 방지 + 이어하기 가치 인식 강화.
    near_miss_rate 높은 레벨에서 컨티뉴 사용률 높아야 좋은 설계.
    하드/슈퍼하드에서 수요 집중이 정상.
    3회 제한으로 무한 컨티뉴 방지, 재시도 시 리셋으로 합리적 재도전 유도.

# ─────────────────────────────────────
# 4. 재화
# ─────────────────────────────────────
currency_system:
  currencies:
    coin:
      name: "코인"
      type: soft
      initial_amount: 2000
      initial_note: "이어하기 약 2회분. 런칭 초기 라이브옵스 이벤트 부족 고려하여 여유 제공"

  hard_currency:
    status: _TBD
    note: "젬은 1.0에 미포함. 피어 분석 후 필요 시 추가"

  source:      # 획득
    - { channel: "레벨 클리어 보상", amount: "노말 50, 하드 75, 슈퍼하드 100", note: "기본 소스" }
    - { channel: "보상형 광고 시청", amount: "TBD", note: "" }
    - { channel: "IAP 구매 (코인팩)", amount: "가변", note: "" }
    - { channel: "데일리 보상", amount: "7일 주기", note: "" }

  sink:        # 소비
    - { channel: "부스터 구매", amount: "300~2,900코인", note: "" }
    - { channel: "하트 전체 충전", amount: "900코인", note: "" }
    - { channel: "컨티뉴", amount: "900 → 1,900 → 2,900코인 (동일 회차 내 단계별 상승)", note: "재시도 시 1회차부터 리셋" }
    - { channel: "스킨/꾸미기", amount: "TBD (이후 업데이트)", note: "" }

  balance_principle: >
    무과금 유저도 자연 플레이로 부스터를 가끔 살 수 있는 코인 지급.
    하드/슈퍼하드에서 부스터+컨티뉴 사용 시 소비 > 자연 획득 (과금 유도).
    net_coin_flow 추적: 패키지 단위로 소스 > 싱크(인플레) 방지.

# ─────────────────────────────────────
# 5. 데일리 보상
# ─────────────────────────────────────
daily_reward:
  cycle: 7
  reset_policy: "연속 접속 끊어져도 이어감 (리셋 안 함)"
  schedule:
    - { day: 1, reward: "코인", note: "" }
    - { day: 2, reward: "코인", note: "" }
    - { day: 3, reward: "부스터", note: "" }
    - { day: 4, reward: "코인", note: "" }
    - { day: 5, reward: "코인", note: "" }
    - { day: 6, reward: "부스터", note: "" }
    - { day: 7, reward: "대량 코인 + 부스터", note: "최대 보상" }
  design_intent: "D1~D7 리텐션 지원. 7일차 보상이 가장 크게 느껴지도록 설계"

# ─────────────────────────────────────
# 6. 광고
# ─────────────────────────────────────
ad_system:
  rewarded:
    placements:
      - { name: "하트 충전", condition: "하트 4개 이하", reward: "하트 1개" }
      - { name: "부스터 1회 무료", condition: "판 진행 중", reward: "부스터 1회 사용" }
      - { name: "컨티뉴 광고", condition: "추후 추가 (피어 분석 필요)", reward: "TBD" }
      - { name: "코인 보상 2배", condition: "데일리 보상 수령 시", reward: "데일리 보상 2배" }

  interstitial:
    protection_period: "Lv.20까지 전면 광고 미노출 (FTUE 보호)"
    timing: "레벨 결과 화면에서만 노출 (플레이 중, 로비, 상점에서 절대 미노출)"
    cooldown_sec: 30    # 1회 노출 후 최소 30초 딜레이
    ad_removal: "광고 제거 IAP 구매 시 영구 제거"

# ─────────────────────────────────────
# 7. 상품 노출 정책
# ─────────────────────────────────────
offer_policy:
  popup_cooldown_min: 20    # 스페셜 오퍼 팝업 간 최소 20분
  popup_cooldown_exception: "각 상품의 해금 조건 달성 시 첫 등장은 쿨타임 무시"

  popup_priority:      # 레벨 클리어/실패 후
    - { rank: 1, product: "스타터팩", condition: "NPU에게 1회 한정" }
    - { rank: 2, product: "전면 광고", condition: "Lv.20+, 30초 딜레이" }

  shop_display_order:  # 상점 내
    - { rank: 1, product: "스타터팩 (구매 전 한정 배너)" }
    - { rank: 2, product: "번들 상품 (저가→고가)" }
    - { rank: 3, product: "코인 상품 (저가→고가)" }
    - { rank: 4, product: "광고 제거" }

  v1_scope_note: "1.0에서는 NPU/PU 분기 미적용 (Dynamic Pricing 미도입)"

  future_policies:
    - "NPU/PU 분기 노출 (Best Value 도입 시)"
    - "More Offer 버튼 (상품 수 증가 시)"
    - "시간제 상품 마지막 기회 팝업 (유효 시간 1시간 남았을 때)"
    - "레벨 실패 후 Hard Level Bundle 팝업"

# ─────────────────────────────────────
# 이후 업데이트 (소프트런칭 후)
# ─────────────────────────────────────
future_updates:
  events:
    - "개인 경쟁 이벤트 (랭킹)"
    - "연속 클리어 이벤트 (실패 없이 N레벨)"
  static_products:
    - "피기뱅크 ($2.99, 플레이하면 코인 누적 → 구매하여 열기)"
    - "프리미엄 패스 (시즌패스, 무료+유료 트랙)"
    - "일일 행사"
  dynamic_products:
    - "Best Value ($1~$5, 5단계, 상시 최고 효율 2.5배)"
    - "Mega Sale (NPU 첫 구매 전환 팝업)"
    - "주간 행사"
    - "주말 세일"
    - "어려운 레벨 번들 (하드/슈퍼하드 실패 시)"
    - "상점 노출 우선순위 NPU/PU 분기"

# ─────────────────────────────────────
# Systems List
# ─────────────────────────────────────
systems:
  - LifeManager          # 하트 충전/소모/표시
  - BoosterManager       # 부스터 4종 관리/사용/구매
  - CurrencyManager      # 코인 관리 (소스/싱크)
  - ContinueHandler      # 이어하기 팝업/처리
  - ShopManager          # 상점 UI/구매 처리
  - DailyRewardManager   # 7일 주기 보상
  - AdManager            # 보상형/전면 광고 관리
  - OfferManager         # 상품 노출 정책/팝업 관리
