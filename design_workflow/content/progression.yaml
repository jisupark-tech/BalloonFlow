  - { level: 21, gimmick: "Spawner 투명", package: PKG2 }
  - { level: 31, gimmick: "Spawner 불투명", package: PKG2 }
  - { level: 41, gimmick: "Big Object", package: PKG3 }
  - { level: 61, gimmick: Chain, package: PKG4 }

# ─────────────────────────────────────
# 4. Day-based Progression Estimate
# ─────────────────────────────────────
day_progression:
  assumptions:
    levels_per_day_casual: 5
    levels_per_day_core: 10
  estimates:
    casual:
      D1: "Level 5"
      D7: "Level 30"
      D14: "Level 60"
      D30: "Level 100 (완료)"
    core:
      D1: "Level 10"
      D7: "Level 55"
      D14: "Level 100 (완료)"
      D30: "하드 모드 / 무한 모드 진행"

