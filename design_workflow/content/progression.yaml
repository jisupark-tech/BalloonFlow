  - { level: 8, colors: 5, added: "Pink" }
  - { level: 26, colors: 6, added: "Orange" }
  - { level: 46, colors: 7, added: "Purple" }
  - { level: 66, colors: 8, added: "Sky (최대)" }

# ─────────────────────────────────────
