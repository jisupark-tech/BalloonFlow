# BalloonFlow — Stage 2-4: Content — Progression Schedule
# Complete progression timeline: colors, gimmicks, packages
# 정본 참조: concept.yaml, beat_chart.yaml, gimmick_spec.yaml

domain: Content
sub_doc: progression

# ─────────────────────────────────────
# 1. Full Progression Timeline (100 Levels)
# ─────────────────────────────────────
timeline:
  # === PKG1: LEARN (Lv.1-20) ===
  - level: 1
    event: "게임 시작. 튜토리얼 Level 1-5. 보관함+다트 기본 체험."
    unlocks: [basic_object, holder_system]
    colors: 2
    gimmicks: []
    package: 1

  - level: 3
    event: "3번째 색상 (Green) 도입"
    unlocks: [color_3]
    colors: 3
    package: 1

  - level: 6
    event: "4번째 색상 (Yellow) + 4번째 보관함 도입"
    unlocks: [color_4]
    colors: 4
    package: 1

  - level: 8
    event: "5번째 색상 (Pink) 도입"
    unlocks: [color_5]
    colors: 5
    package: 1

  - level: 11
    event: "Hidden 기믹 도입 — 보관함 색상 숨김"
    unlocks: [hidden]
    colors: 5
    gimmicks: [hidden]
    package: 1

  - level: 20
    event: "PKG1 완료."
    unlocks: [package_2]
    colors: 5
    package: 1

  # === PKG2: LEARN→GROW (Lv.21-40) ===
  - level: 21
    event: "Spawner 투명 기믹 도입 — 보드 위 생성기, 다음 색상 보임"
    unlocks: [spawner_transparent]
    colors: 5
    gimmicks: [hidden, spawner_transparent]
    package: 2

  - level: 26
    event: "6번째 색상 (Orange) 도입"
    unlocks: [color_6]
    colors: 6
    package: 2

  - level: 31
    event: "Spawner 불투명 기믹 도입 — 다음 색상 안 보임"
    unlocks: [spawner_opaque]
    colors: 6
    gimmicks: [hidden, spawner_transparent, spawner_opaque]
    package: 2

  - level: 40
    event: "PKG2 완료."
    unlocks: [package_3]
    colors: 6
    package: 2

  # === PKG3: GROW (Lv.41-60) ===
  - level: 41
    event: "Big Object 기믹 도입 — 대형 오브젝트 + 라이프 시스템"
    unlocks: [big_object]
    colors: 6
    gimmicks: [hidden, spawner_transparent, spawner_opaque, big_object]
    package: 3

  - level: 46
    event: "7번째 색상 (Purple) 도입"
    unlocks: [color_7]
    colors: 7
    package: 3

  - level: 60
    event: "PKG3 완료."
    unlocks: [package_4]
    colors: 7
    package: 3

  # === PKG4: GROW→MASTER (Lv.61-80) ===
  - level: 61
    event: "Chain 기믹 도입 — 2개 보관함 연결, 동시 활성화. 5종 기믹 전부 활성화."
    unlocks: [chain]
    colors: 7
    gimmicks: [hidden, spawner_transparent, spawner_opaque, big_object, chain]
    package: 4

  - level: 66
    event: "8번째 색상 (Sky) 도입 — 최대 색상"
    unlocks: [color_8]
    colors: 8
    package: 4

  - level: 80
    event: "PKG4 완료."
    unlocks: [package_5]
    colors: 8
    package: 4

  # === PKG5: MASTER (Lv.81-100) ===
  - level: 81
    event: "PKG5 시작. 5종 기믹 최대 조합, 마스터리 레벨."
    colors: 8
    gimmicks: [hidden, spawner_transparent, spawner_opaque, big_object, chain]
    package: 5

  - level: 100
    event: "PKG5 완료. 엔딩."
    unlocks: [ending]
    colors: 8
    package: 5

  # NOTE: OutGame 시스템 해금 (스타터팩, 피기뱅크, 시즌패스, 리더보드 등)은
  # OutGame/BM 확정 후 타임라인에 추가.

# ─────────────────────────────────────
