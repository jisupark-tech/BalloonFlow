# 5. Content Longevity
# ─────────────────────────────────────
longevity:
  launch_content: "100 levels (5 packages)"
  update_plan: "4주마다 +20 levels (1 package)"
  target_runway: "소프트런칭 후 6개월간 콘텐츠 고갈 방지"
  post_100_plan:
    - "하드 모드 (기존 레벨 고난도 변형)"
