# BalloonFlow — Beat Chart (디자이너 디렉션)
# 100 레벨, 5 패키지 x 20 레벨
# 정본 참조: concept.yaml, content.yaml, gimmick_spec.yaml

domain: Content
sub_doc: beat_chart

# ─────────────────────────────────────
# 1. Global Rules
# ─────────────────────────────────────
global_rules:
  total_levels: 100
  packages: 5
  levels_per_package: 20
  holder_slots: 5

  fail_condition: >
    홀더 초과. 홀더(5칸) 대기 보관함이 5개를 초과하면 실패.
    보관함이 레일(원형 루프)에서 한 바퀴 돌고 탄창이 남으면 홀더로 복귀 → 홀더 초과 시 실패.

  position_rules:
    hard_positions: [4, 9, 14, 19]
    rest_positions: [5, 10, 15, 20]
    note: >
      하드(pos 4,9,14,19)와 휴식(pos 5,10,15,20)이 교대 배치.
      나머지 포지션은 튜토리얼/노말로 구성.
      PKG1은 학습 구간이라 pos 19에만 하드 1개. pos 4,9,14는 노말. pos 20만 휴식.

  difficulty_order:
    - 튜토리얼    # 신규 요소 학습
    - 노말        # 일반 난이도
    - 하드        # pos 4,9,14
    - 슈퍼하드    # pos 19 (패키지 클라이맥스). 슈퍼하드: PKG 2부터 pos 19. PKG 1은 pos 19도 일반 하드.
    - 휴식        # pos 5,10,15,20

  difficulty_principles:
    sawtooth_pattern: >
      각 패키지 내 난이도는 톱니 모양(sawtooth)으로 오르내린다.
      하드 직후 휴식이 오고, 슈퍼하드 직후에도 휴식이 온다.
      이 반복이 긴장과 해소의 리듬을 만든다.
    strict_ordering: >
      난이도 순서는 엄격하게 지켜져야 한다: 슈퍼하드 > 하드 > 노말 > 튜토리얼 > 휴식.
      이 순서의 위반(역주행)은 절대 불가.
      같은 패키지 내에서 난이도는 이 순서를 전체 흐름으로 유지.
      단, 휴식 레벨은 예외로 직전 레벨보다 낮은 난이도 허용.
    new_element_intro_rule: >
      신규 요소(기믹·색상·오브젝트 타입) 도입 레벨에서는
      전체 오브젝트 수를 직전 대비 줄여서 플레이어가 새 요소에 집중할 수 있도록 한다.
      패키지 평균보다 20~30% 감소시킨다.

  gimmick_isolation_rule: >
    신규 기믹이 도입되는 레벨(튜토리얼)에서는 해당 기믹만 단독 등장.
    다른 기믹과 조합은 다음 레벨부터 허용.

# ─────────────────────────────────────
# 2. Per-Package Beat Chart
# ─────────────────────────────────────
packages:
  PKG1:
    level_range: [1, 20]
    intent: "LEARN: Basics"
    description: "코어 메카닉 학습 → 충분한 성공 경험 → 첫 기믹(Hidden, pos 11) → 첫 하드(pos 19)에서 첫 실패 경험"
    composition:
      튜토리얼: 6
      노말: 12
      하드: 1       # pos 19 (PKG1은 슈퍼하드 없이 일반 하드로 처리)
      슈퍼하드: 0
      휴식: 1       # pos 20만 휴식
    target_cr:
      min: 0.60
      avg: 0.83
      max: 0.95
    target_attempts:
      min: 1.0
      avg: 1.4
      max: 3.0
    colors:
      min: 2
      avg: 3.6
      max: 5
    color_distribution: "2색:3색:4색:5색 = 10%:35%:30%:25%"
    color_ratio_intent: "편중. 튜토리얼 구간은 2~3색 위주, 중반부에서 4색, 후반부에서 5색으로 확장."
    objects:
      min: 8
      avg: 30
      max: 44
    gimmick_types:
      min: 0
      avg: 0.2
      max: 1
    gimmick_levels: "약 3~5개 / 20레벨"
    gimmicks:
      available: [Hidden]
      new_elements:
        - { pos: 3,  element: "3색",   note: "3번째 색상 추가" }
        - { pos: 6,  element: "4색",   note: "4번째 색상 추가" }
        - { pos: 8,  element: "5색",   note: "5번째 색상 추가" }
        - { pos: 11, element: "Hidden", note: "PKG1 첫 기믹 도입 (단독 등장)" }
    paywall_points: []
    first_fail_expected: "pos 19"
    emotion_curve: "안전→호기심→작은 도전→성취"

  PKG2:
    level_range: [21, 40]
    intent: "LEARN → GROW"
    description: "Spawner 계열 도입. 유입 오브젝트 대응력 학습."
    composition:
      튜토리얼: 2   # pos 1(Spawner투명), pos 11(Spawner불투명)
      노말: 10
      하드: 3       # pos 4, 9, 14
      슈퍼하드: 1   # pos 19 (PKG2부터 슈퍼하드 적용)
      휴식: 4
    target_cr:
      min: 0.40
      avg: 0.68
      max: 0.92
    target_attempts:
      min: 1.0
      avg: 2.2
      max: 5.0
    colors:
      min: 4
      avg: 5.4
      max: 6
    color_distribution: "4색:5색:6색 = 15%:45%:40%"
    color_ratio_intent: "편중→균등 전환기."
    objects:
      min: 28
      avg: 42
      max: 56
    gimmick_types:
      min: 0
      avg: 1.0
      max: 3
    gimmick_levels: "약 10~12개 / 20레벨"
    gimmicks:
      available: [Hidden, Spawner_transparent, Spawner_opaque]
      new_elements:
        - { pos: 6,  element: "6색",              note: "6번째 색상 추가" }
        - { pos: 1,  element: "Spawner_transparent", note: "PKG2 pos1에서 도입 (단독 등장)" }
        - { pos: 11, element: "Spawner_opaque",    note: "PKG2 pos11에서 도입 (단독 등장)" }
    paywall_points: [39]   # pos 19 슈퍼하드, 첫 과금 포인트
    emotion_curve: "새로움→적응→난관→돌파"

  PKG3:
    level_range: [41, 60]
    intent: "GROW: Depth"
    description: "Big Object 도입. 7색 추가. 라이프 시스템으로 전략 깊이 확대."
    composition:
      튜토리얼: 1   # pos 1(BigObject)
      노말: 11
      하드: 3       # pos 4, 9, 14
      슈퍼하드: 1   # pos 19
      휴식: 4
    target_cr:
      min: 0.38
      avg: 0.64
      max: 0.92
    target_attempts:
      min: 1.0
      avg: 2.5
      max: 5.5
    colors:
      min: 5
      avg: 6.4
      max: 7
    color_distribution: "5색:6색:7색 = 15%:35%:50%"
    color_ratio_intent: "7색 도입 시 편중 유지. 핵심 3~4색이 60~70%, 나머지 10% 이하."
    objects:
      min: 30
      avg: 48
      max: 60
    gimmick_types:
      min: 0
      avg: 1.3
      max: 4
    gimmick_levels: "약 12~14개 / 20레벨"
    gimmicks:
      available: [Hidden, Spawner_transparent, Spawner_opaque, BigObject]
      new_elements:
        - { pos: 6, element: "7색",      note: "7번째 색상 추가" }
        - { pos: 1, element: "BigObject", note: "PKG3 pos1에서 도입 (단독 등장)" }
    paywall_points: [59]
    emotion_curve: "도전→학습→성장→보상"

  PKG4:
    level_range: [61, 80]
    intent: "GROW → MASTER"
    description: "Chain 도입. 5종 기믹 전부 활성화. 8색 추가. 복합 조합 시작."
    composition:
      튜토리얼: 1   # pos 1(Chain)
      노말: 11
      하드: 3       # pos 4, 9, 14
      슈퍼하드: 1   # pos 19
      휴식: 4
    target_cr:
      min: 0.35
      avg: 0.61
      max: 0.92
    target_attempts:
      min: 1.0
      avg: 2.8
      max: 6.0
    colors:
      min: 6
      avg: 7.2
      max: 8
    color_distribution: "6색:7색:8색 = 15%:40%:45%"
    color_ratio_intent: "8색 도입 후 점진적 균등화."
    objects:
      min: 30
      avg: 52
      max: 64
    gimmick_types:
      min: 0
      avg: 1.8
      max: 5
    gimmick_levels: "약 14~16개 / 20레벨"
    gimmicks:
      available: [Hidden, Spawner_transparent, Spawner_opaque, BigObject, Chain]
      new_elements:
        - { pos: 6, element: "8색",  note: "8번째 색상 추가" }
        - { pos: 1, element: "Chain", note: "PKG4 pos1에서 도입 (단독 등장)" }
    paywall_points: [79]
    emotion_curve: "긴장→집중→클라이맥스→성취"

  PKG5:
    level_range: [81, 100]
    intent: "MASTER: Extreme"
    description: "5종 기믹 최대 조합. 마스터리 레벨. 도전과 성취 중심."
    composition:
      튜토리얼: 0
      노말: 12
      하드: 3       # pos 4, 9, 14
      슈퍼하드: 1   # pos 19
      휴식: 4
    target_cr:
      min: 0.30
      avg: 0.58
      max: 0.92
    target_attempts:
      min: 1.0
      avg: 3.2
      max: 7.0
    colors:
      min: 6
      avg: 7.6
      max: 8
    color_distribution: "6색:8색 = 15%:85%"
    color_ratio_intent: "거의 균등. 각 색상 10~15%."
    objects:
      min: 30
      avg: 57
      max: 72
    gimmick_types:
      min: 0
      avg: 2.3
      max: 5
    gimmick_levels: "약 15~17개 / 20레벨"
    gimmicks:
      available: [Hidden, Spawner_transparent, Spawner_opaque, BigObject, Chain]
      new_elements: null
      max_combo: true
    paywall_points: []   # 없음, 도전과 성취 중심
    emotion_curve: "도전→시련→극복→엔딩 카타르시스"

# ─────────────────────────────────────
# 3. Gimmick Frequency Guidelines
# ─────────────────────────────────────
gimmick_frequency_guidelines:
  per_level_type:
    슈퍼하드: { min_gimmick_types: 3, max_gimmick_types: 5 }
    하드:     { min_gimmick_types: 2, max_gimmick_types: 3 }
    노말:     { min_gimmick_types: 0, max_gimmick_types: 2 }
    튜토리얼: { min_gimmick_types: 1, max_gimmick_types: 1 }
    휴식:     { min_gimmick_types: 0, max_gimmick_types: 1 }

  per_gimmick_ratio:
    description: "해당 기믹이 포함된 레벨에서, 전체 오브젝트 중 해당 기믹 오브젝트 비율(%)"
    Hidden:               { min: 20, avg: 40, max: 60 }
    Spawner_transparent:  { min:  5, avg: 10, max: 20 }
    Spawner_opaque:       { min:  5, avg: 10, max: 15 }
    BigObject:            { min:  5, avg: 15, max: 25 }
    Chain:                { min: 10, avg: 25, max: 40 }

  per_package_frequency:
    description: "각 패키지 20레벨 중 해당 기믹이 등장하는 레벨 수 (범위)"
    PKG1:
      Hidden: "3~5"
    PKG2:
      Hidden:              "5~10"
      Spawner_transparent: "3~4"
      Spawner_opaque:      "2~3"
    PKG3:
      Hidden:              "5~10"
      Spawner_transparent: "4~8"
      Spawner_opaque:      "3~6"
      BigObject:           "2~4"
    PKG4:
      Hidden:              "5~10"
      Spawner_transparent: "4~8"
      Spawner_opaque:      "3~6"
      BigObject:           "4~7"
      Chain:               "2~4"
    PKG5:
      Hidden:              "5~10"
      Spawner_transparent: "4~8"
      Spawner_opaque:      "3~6"
      BigObject:           "4~7"
      Chain:               "4~7"

  frequency_principle: >
    도입 패키지에서는 낮은 범위, 이후 패키지에서는 높은 범위.
    상한 초과는 전체 레벨의 5% 이내.

# ─────────────────────────────────────
# 4. AI Instructions
# ─────────────────────────────────────
ai_instructions:
  level_generation: >
    레벨 자동 생성 시 이 Beat Chart를 참조하여:
    1) 해당 패키지의 intent/emotion_curve에 맞는 난이도 설정
    2) position_rules에 따라 하드/휴식 배치 (PKG1 예외 적용)
    3) gimmick_frequency_guidelines에 따라 기믹 종류·비율 결정
    4) target_cr.avg에 수렴하도록 오브젝트 수/색상 수 조절
    5) new_elements 도입 레벨에서는 오브젝트 수를 패키지 평균 대비 20~30% 감소
  validation: >
    생성된 레벨이 Beat Chart 범위를 벗어나면 경고.
    특히 CR이 target_cr.avg 대비 ±10% 이상 벗어나면 재조정 필요.
    composition 합계가 20이 되는지 확인 (튜토리얼+노말+하드+슈퍼하드+휴식 = 20).
