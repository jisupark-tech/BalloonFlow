# BalloonFlow — Gimmick Specification
# 5종 기믹 상세 정의
# 정본 참조: concept.yaml, beat_chart.yaml

domain: Content
sub_doc: gimmick_spec

# ─────────────────────────────────────
# Common Terms
# ─────────────────────────────────────
common_terms:
  보관함: >
    홀더에서 대기 → 레일(원형 루프)에 올라가 한 바퀴 돌며 매칭 풍선에 다트 발사
    → 레일 도중 탄창 0이 되면 즉시 제거 → 한 바퀴 후 탄창이 남아있으면 홀더로 복귀 대기
  다트: "레일 위 보관함에서 발사되어 풍선을 타격하는 발사체"
  레일: "보관함이 한 바퀴 도는 원형 루프 경로. 경로 위에서 매칭 풍선을 만나면 다트 발사"
  보드: "상단에 풍선이 배치된 퍼즐 영역"
  홀더: >
    보관함 5칸 대기열. 대기 보관함이 5개를 초과하면 실패.
    레일에서 탄창이 남은 채로 돌아온 보관함도 홀더에 대기.
  터치 가능 상태: "유저가 해당 보관함을 탭할 수 있는 상태 (홀더에 있는 보관함)"
  오브젝트: "보드 위 제거 대상 (풍선 등). 기본은 1x1 풍선."
  라이프: "Big Object의 내구도. 다트 히트마다 1씩 감소, 0이 되면 제거."
  Spawner: "보드 위 오브젝트 생성기. Spawner의 방향과 일치하는 라인에서 오브젝트가 제거되면 새 오브젝트 생성."

# ─────────────────────────────────────
# 5 Gimmicks
# ─────────────────────────────────────
gimmicks:
  - id: hidden
    name: Hidden
    name_ko: "비활성 색상 숨김"
    intro_timing:
      package: PKG1
      position: 11
      level: 11
    rules:
      - "터치 불가능 상태인 보관함은 색상이 가려져 보이지 않음 (실루엣 또는 ? 표시)"
      - "터치 가능 상태가 되면 색상이 공개됨"
      - "색상이 공개된 후에는 일반 보관함과 동일하게 동작"
    difficulty_impact:
      cognitive_load: "중 — 색상 정보 없이 순서 계획 필요"
      risk: "중 — 잘못된 순서 선택 시 홀더 초과 위험 증가"
      main_effect: "전체 보관함을 미리 보고 최적 순서를 짜는 플레이가 불가능. '지금 보이는 것만으로 판단'하는 단기 계획 플레이로 전환"
    difficulty_levers:
      - "Hidden 보관함 비율 (전체의 30% vs 70%로 강도 조절)"
    feedback:
      hidden_state: "검은색 바탕에 흰색 ? 패턴"
      hidden_visibility_note: "공개 전에도 보관함의 존재 자체는 인지 가능 (크기, 위치는 보임)"
      reveal_animation: "? 이미지가 사라지며 원래 색상이 드러남 (별도 전환 연출 없이 자연스럽게)"
      sound: "공개 시 '짠!' 효과음"
    designer_note: "첫 기믹. 규칙 자체는 단순하나 불확실성이 추가되는 구조. 같은 색상 수/오브젝트 수여도 체감 난이도 상승."

  - id: spawner_transparent
    name: "Spawner 투명"
    name_ko: "투명 Spawner"
    intro_timing:
      package: PKG2
      position: 1
      level: 21
    rules:
      - "보드 위 특정 위치에 Spawner가 배치됨"
      - "Spawner는 방향(상/하/좌/우)을 가짐"
      - "Spawner의 방향과 일치하는 라인에서 오브젝트(풍선)가 제거되면, Spawner가 새 오브젝트를 해당 위치에 생성(spawn)"
      - "Spawner가 투명하여 다음에 생성될 오브젝트의 색상이 미리 보임"
    difficulty_impact:
      cognitive_load: "중 — 생성될 오브젝트를 예측하며 순서 계획"
      risk: "중 — 보드가 고정이 아니라 변동됨 → 보드 클리어 계산이 복잡해짐"
      main_effect: "다음 색상이 보이므로 '이걸 먼저 터뜨리면 다음에 뭐가 나온다'는 선행 계획 가능"
    difficulty_levers:
      - "Spawner 수 (1개 vs 3개)"
      - "Spawner 방향 수 (단방향 vs 복수 방향)"
      - "spawn 최대 횟수"
    feedback:
      spawner_visual: "Spawner 내부에 다음 색상 오브젝트가 반투명으로 보임"
      spawn_animation: "톡 하고 나타나는 팝 연출"
      direction_indicator: "화살표 아이콘으로 방향 표시"
      sound: "생성 시 '쏙' 효과음"
    designer_note: "보드가 변동되는 첫 경험. 다음 색상이 보이므로 학습 부담 완화."

  - id: spawner_opaque
    name: "Spawner 불투명"
    name_ko: "불투명 Spawner"
    intro_timing:
      package: PKG2
      position: 11
      level: 31
    rules:
      - "Spawner 투명과 동일한 메카닉"
      - "차이점: Spawner가 불투명하여 다음에 생성될 오브젝트의 색상을 알 수 없음"
    difficulty_impact:
      cognitive_load: "상 — 다음 오브젝트 색상을 예측할 수 없어 불확실성 증가"
      risk: "상 — 예상 못한 색상 유입으로 홀더 초과 위험 높음"
      main_effect: "Spawner 투명의 상위 버전. '다음에 뭐가 나올지 모른다'는 불확실성 추가. 선행 계획 불가."
    difficulty_levers:
      - "투명/불투명 Spawner 비율로 조절"
    feedback:
      spawner_visual: "Spawner 내부가 가려져 있음 (불투명 색상 또는 ? 표시)"
      spawn_animation: "투명 Spawner보다 살짝 강한 서프라이즈 연출"
      sound: "생성 시 '쏙' + 공개 시 추가 효과음"
    designer_note: >
      Spawner 투명(pos 1)으로 규칙 학습 후, 10레벨 뒤에 불투명 변형 도입.
      Hidden과 조합 시 불확실성 극대화 (보관함 색상도 모르고 보드 변화도 모름).

  - id: big_object
    name: "Big Object"
    name_ko: "대형 오브젝트"
    intro_timing:
      package: PKG3
      position: 1
      level: 41
    rules:
      - "보드 위에 1×1보다 큰 오브젝트가 배치됨 (예: 2×2, 1×3, 2×3 등 직사각형 가능)"
      - "라이프 숫자를 표기 (예: 라이프 4)"
      - "오브젝트의 충돌 영역에 닿은 다트마다 라이프가 1 감소"
      - "라이프가 0이 되면 제거됨"
      - "다트의 색상과 Big Object의 색상이 일치해야 라이프 감소 (일반 매칭 규칙 적용)"
    difficulty_impact:
      cognitive_load: "중상 — 라이프 관리 + 탄창 배분 계산 필요"
      risk: "중 — 다트를 여러 발 소비해야 하므로 보관함 자원 관리 압박 증가"
      main_effect: "보드 공간을 많이 차지하여 다른 풍선에 대한 접근 경로를 물리적으로 막음"
    difficulty_levers:
      - "크기 (2×2 vs 2×3)"
      - "라이프 수"
      - "배치 위치 (경로 차단 여부)"
      - "Big Object 수"
    feedback:
      visual: "라이프 숫자 뱃지가 보이고, 다트 맞을 때마다 숫자 감소 + 흔들림"
      life_indicator: "다트가 맞을 때마다 금이 가거나 색이 바래는 단계적 시각 변화"
      destroy_animation: "라이프 0 시: 일반 풍선보다 큰 파열 이펙트 (크기에 비례한 쾌감)"
      sound: "히트마다 '쿵' + 파괴 시 '쾅!'"
    designer_note: "자원 관리의 새로운 차원. 처음에는 2×2 / 라이프 2~3부터 시작. Chain과 조합 시 대량 다트로 높은 라이프를 효율적으로 처리 가능."

  - id: chain
    name: Chain
    name_ko: "연결 보관함"
    intro_timing:
      package: PKG4
      position: 1
      level: 61
    rules:
      - "2개의 보관함이 체인으로 연결되어 있음 (시각적으로 사슬/줄로 표시)"
      - "연결된 보관함 중 하나를 탭하면, 보관함 A가 레일에 올라가 한 바퀴 돌며 다트를 발사한 뒤 이어서 보관함 B가 레일에 올라가 한 바퀴 돌며 다트를 발사"
      - "각각 탄창이 남으면 홀더로 복귀 (색상 A 쭉 → 색상 B 쭉 순서)"
      - "연결된 두 보관함은 개별 탭 불가. 반드시 쌍으로 동시 활성화"
    difficulty_impact:
      cognitive_load: "상 — '이 쌍을 지금 보낼지, 나중에 보낼지'의 판단이 추가됨"
      risk: >
        상 — 잘못된 타이밍에 보내면 두 보관함 모두 탄창이 남은 채 홀더로 복귀,
        홀더 2칸을 동시에 차지하여 실패 위험 급증.
      main_effect: "디자인 필러 1 '선택의 긴장감' 직접 강화"
    difficulty_levers:
      - "Chain 쌍 수"
      - "연결된 보관함의 탄창 합계"
      - "색상 조합 (같은 색 vs 다른 색)"
    feedback:
      visual: "연결된 두 보관함 사이에 사슬/줄 아이콘"
      activation: "탭 시 두 보관함이 동시에 열리며 다트가 연속 배치되는 연출"
      chain_break: "배치 완료 시 사슬이 끊어지는 이펙트"
      sound: "체인 당기는 '찰칵' + 순차 발사음"
    designer_note: "순서 계획의 복잡도가 가장 높은 기믹. 모든 기본 메카닉에 익숙한 후반에 도입."

# ─────────────────────────────────────
# Interaction Matrix (기믹 간 조합)
# ─────────────────────────────────────
interaction_matrix:
  description: "2종 이상 기믹이 동시 등장 시 상호작용 규칙"
  combinations:
    - pair: [Hidden, Spawner]
      interaction: "Hidden 보관함의 색상을 모르는 상태에서 Spawner가 보드를 변동"
      difficulty: "이중 불확실성. 높은 난이도"

    - pair: [Hidden, Spawner_opaque]
      interaction: "보관함 색상도 모르고 Spawner 다음 색상도 모름 — 이중 불확실성"
      difficulty: "극상"

    - pair: [Hidden, Chain]
      interaction: "체인 연결된 보관함 중 하나가 Hidden이면, 활성화 전까지 한쪽 색상 불명"
      difficulty: "상"

    - pair: [Spawner_transparent, BigObject]
      interaction: "Spawner가 Big Object 뒤에 배치되면, Big Object를 먼저 제거해야 Spawner 라인이 열림"
      difficulty: "순서 강제 + 자원 관리"

    - pair: [BigObject, Chain]
      interaction: "Chain으로 대량 다트를 보내서 Big Object의 높은 라이프를 한 번에 깎는 전략 가능"
      difficulty: "효율적 사용 시 보상감"

    - pair: [Spawner_opaque, Chain]
      interaction: "Chain 쌍을 보냈는데 Spawner가 예상 못한 색을 생성하면 계획 붕괴"
      difficulty: "리스크 관리 요구"

    - pair: [Hidden, Spawner_transparent, Spawner_opaque, BigObject, Chain]
      interaction: >
        5종 전체 혼합. 불확실성(Hidden, Spawner 불투명) + 자원 압박(Big Object) + 순서 강제(Chain).
        PKG 4 후반~PKG 5에서 등장.
      difficulty: "최대 난이도. 전략 총동원"

  ai_notes:
    - "기믹 도입 레벨에서는 해당 기믹만 등장. 기존 기믹 미등장 (기믹 격리 원칙)"
    - "도입 후 2~3레벨은 해당 기믹만 사용하여 적응 구간 제공"
    - "이후 기존 기믹과 혼합 허용. 상호작용 매트릭스 참고"
    - "난이도 조절 시 각 기믹의 '난이도 조절 레버'를 활용"
    - "Spawner 투명→불투명은 같은 메카닉의 상위 버전이므로, 불투명 도입 후 투명과 혼재 가능 (한 레벨에 투명 2개 + 불투명 1개 등)"
