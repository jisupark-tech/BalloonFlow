# BalloonFlow — Stage 2-4: Content — Level Design Rules
# Level composition rules and templates

domain: Content
sub_doc: level_design

# ─────────────────────────────────────
# 1. Level Data Structure (level_meta mapping)
# ─────────────────────────────────────
level_meta_schema:
  level_id: "bf_{level_number:04d}"
  level_number: int
  hard_tier: "0=Normal, 1=Hard, 2=Boss"
  is_tutorial: bool
  optimal_darts: int   # AI 시뮬레이션 산출
  objective_type: "board_clear"
  objective_target: "balloon_count (전체 풍선 수)"
  moves_limit: "dart_count (다트 수 = 무브 제한)"
  time_limit_sec: "null (타임어택만 60)"
  num_colors: int
  num_rail_segments: int
  overflow_limit: int
  special_mechanics: "JSON array of gimmick IDs"
  designer_note: string

# ─────────────────────────────────────
# 2. Level Composition Rules
# ─────────────────────────────────────
composition_rules:
  balloon_count:
    formula: "floor(8 + level_number * 0.35 + sin(level_number/5) * 3)"
    min: 8
    max: 80

  color_distribution:
    rule: "각 색상 최소 2개 이상. 나머지 균등 랜덤."
    formula: >
      per_color_min = 2
      remaining = balloon_count - (num_colors * per_color_min)
      remaining은 균등 랜덤 분배 (±1 허용)

  special_balloon_placement:
    ratio_formula: "special_ratio = min(0.3, (level_number - 15) * 0.003)"
    placement_rule: "레일 중간~후반부에 배치 (앞 30% 구간에는 배치 금지)"
    constraint: "연속 3개 이상 특수 풍선 금지"

  rail_layout:
    segments_formula: "segments = min(4, 1 + floor(level_number / 50))"
    shapes_available:
      chapter_1_2: [straight, s_curve]
      chapter_3_4: [straight, s_curve, zigzag, loop]
      chapter_5_plus: [straight, s_curve, zigzag, loop, spiral, branching]

  dart_queue:
    initial_visible: 5
    color_distribution: "레일 위 풍선 색상 비율에 비례 + 10% 랜덤 변동"
    guaranteed_solvable: true
    description: "AI 시뮬레이터로 최소 1개 풀이 경로 보장"

# ─────────────────────────────────────
# 3. Level Purpose Assignment
# ─────────────────────────────────────
purpose_assignment:
  rule: >
    level_in_chapter = (level_number - 1) % 20 + 1
    if level_in_chapter <= 2: learning (첫 2레벨 — 챕터 시작)
    elif level_in_chapter == 20: boss (챕터 마지막)
    elif level_in_chapter % 5 == 0: challenge (매 5번째)
    elif level_in_chapter in [8, 14]: monetization (과금 포인트)
    else: rest

  distribution_target:
    learning: "10% (20레벨 중 2개)"
    rest: "55% (20레벨 중 11개)"
    challenge: "20% (20레벨 중 4개 — 5, 10, 15 + boss)"
    monetization: "10% (20레벨 중 2개)"
    boss: "5% (20레벨 중 1개)"

# ─────────────────────────────────────
# 4. Tutorial Levels (1~5) Spec
# ─────────────────────────────────────
tutorial_levels:
  level_1:
    balloons: 6
    colors: 2
    darts: 12
    gimmicks: []
    guide: "full — 첫 탭 유도, 다트 발사 설명"
    objective: "같은 색 풍선에 다트 맞추기 체험"

  level_2:
    balloons: 8
    colors: 3
    darts: 14
    gimmicks: []
    guide: "full — 연쇄 팝 체험 (인접 같은 색 2개 배치)"
    objective: "연쇄 팝 발생시키기"

  level_3:
    balloons: 10
    colors: 3
    darts: 16
    gimmicks: []
    guide: "semi — 다트 큐 전환 가이드"
    objective: "다트 큐 관리 체험"

  level_4:
    balloons: 12
    colors: 3
    darts: 10
    gimmicks: []
    guide: "semi — 일부러 어렵게 설정"
    objective: "첫 실패 경험 (의도적) + 재도전 유도"

  level_5:
    balloons: 10
    colors: 3
    darts: 16
    gimmicks: []
    guide: "light — 스타 시스템 안내"
    objective: "3스타 도전 + 보상 수령"

# ─────────────────────────────────────
# 5. Gimmick Introduction Tutorial Hints
# ─────────────────────────────────────
gimmick_tutorial_hints:
  description: >
    각 신규 기믹이 처음 등장하는 레벨에서 팝업 가이드를 표시한다.
    첫 해당 기믹 풍선을 하이라이트하고 메커닉 설명 + 대응 방법을 안내.
    TutorialManager.ShowHighlight() + 말풍선 텍스트 사용.
  hints:
    - { level: 15, gimmick: "double_balloon", guide_type: "popup + highlight", text: "이중 풍선! 2번 명중해야 터져요.", tutorial_level: true }
    - { level: 25, gimmick: "frozen_balloon", guide_type: "popup + highlight", text: "얼음 풍선! 옆 풍선을 먼저 터뜨려 해동하세요.", tutorial_level: true }
    - { level: 35, gimmick: "bomb_balloon", guide_type: "popup + highlight", text: "폭탄 풍선! 아무 색 다트로 터뜨리면 주변이 폭발!", tutorial_level: true }
    - { level: 40, gimmick: "lock_balloon", guide_type: "popup", text: "자물쇠 풍선! 키를 모아 해제하세요." }
    - { level: 50, gimmick: "rainbow_balloon", guide_type: "popup + highlight", text: "무지개 풍선! 아무 색 다트로 같은 색 전체 제거!" }
    - { level: 70, gimmick: "speed_rail", guide_type: "popup", text: "빠른 레일! 풍선이 더 빨리 움직여요." }
    - { level: 90, gimmick: "branching_rail", guide_type: "popup", text: "분기 레일! 풍선이 두 방향으로 갈라져요." }
  implementation_note: >
    gimmick_intro 레벨은 해당 기믹 풍선을 쉬운 배치(learning purpose)로 구성.
    buffer_multiplier = 1.8 (학습 레벨 수준 여유). 기믹 비율 낮게 (10~15%).

# ─────────────────────────────────────
# 6. Boss Level Template
# ─────────────────────────────────────
boss_level:
  frequency: "매 20레벨 (챕터 종료)"
  structure:
    phase_1: "일반 풍선 웨이브 (전체의 40%)"
    phase_2: "특수 풍선 혼합 웨이브 (전체의 40%)"
    phase_3: "보스 풍선 (거대 풍선 — HP 5, 전체의 20%)"
  dart_budget: "optimal * 1.1 (빡빡하게)"
  time_limit: null
  rewards: "코인 3x + 챕터 완료 보상 + 도감 풍선"
