domain: LiveOps
tier: 3
status: _DEFERRED
deferred_note: "BM/LiveOps 디렉션 완료 후 구현. 컨셉 가이드라인만 기록."

# ─────────────────────────────────────
# Confirmed: Season Operation — concept.yaml _LOCKED
# ─────────────────────────────────────
seasonal_operation:
  name: "풍선 축제"
  description: >
    풍선의 비주얼만 교체하면 시즌이 갱신.
    아트 리소스 교체 비용이 낮으면서 신선함 확보.
  examples:
    - "봄: 벚꽃 풍선"
    - "여름: 수박 풍선"
    - "할로윈: 호박 풍선"
    - "크리스마스: 오너먼트 풍선"
  skins: "시즌 한정 다트/보관함 스킨으로 수집 동기 부여"
  cycle: "4주 (예상)"

# ─────────────────────────────────────
# Confirmed: Win Streak Bonus — concept.yaml _LOCKED
# ─────────────────────────────────────
win_streak_bonus:
  description: >
    한 세션 안에서 연속 플레이를 유도하는 구조.
    보너스 자체가 "더 많이 터뜨리는 경험"이라는 점이 핵심.
  streaks:
    - { streak: 3, reward: "클리어 시 보너스 풍선이 화면에 추가 등장 → 터지며 추가 보상" }
    - { streak: 5, reward: "골드 풍선이 섞여 터지며 추가 코인 지급" }
    - { streak: 10, reward: "특별 풍선이 연쇄로 팡팡팡 터지며 대량 보상" }

# ─────────────────────────────────────
# Confirmed: Season Pass — concept.yaml _LOCKED (BM Domain 연계)
# ─────────────────────────────────────
season_pass:
  structure: "업계 표준 구조"
  free_track: "기능적 보상 (코인, 부스터, 라이프 리필)"
  premium_track: "꾸미기 보상 (시즌 한정 풍선 이펙트, 다트/보관함 스킨)"
  philosophy: "더 예쁘게 터뜨리는 경험이지, 더 쉽게 클리어하는 파워가 아님"

# ─────────────────────────────────────
# Confirmed: Daily Challenge — concept.yaml _LOCKED
# ─────────────────────────────────────
daily_challenge:
  name: "오늘의 풍선"
  description: "매일 특수 조건의 레벨이 하나 열림"
  examples:
    - "빨간 풍선만 100개 터뜨리기"
    - "30초 안에 전부 클리어"
    - "보관함 3개로 보드 비우기"
  reward: "클리어 시 시즌 패스 경험치 지급"

