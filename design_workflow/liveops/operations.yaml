# BalloonFlow — Stage 2-5: LiveOps — Operations Plan
# Season cycle, events, update schedule

domain: LiveOps
tier: 3

# ─────────────────────────────────────
# Optional Parameters (all LiveOps params are optional)
# ─────────────────────────────────────
parameters:
  season_cycle: 4   # weeks
  event_calendar:
    weekly:
      - { name: "주간 랭킹", type: "competitive", duration: "7일", rewards: "젬 + 뱃지" }
      - { name: "일일 퀘스트", type: "daily", duration: "24시간", rewards: "코인 + 부스터" }
    biweekly:
      - { name: "테마 이벤트", type: "collection", duration: "14일", description: "한정 풍선 수집", rewards: "한정 스킨 + 젬" }
    monthly:
      - { name: "시즌 챌린지", type: "season_pass", duration: "28일", rewards: "프리미엄 트랙 보상" }
    special:
      - { name: "런칭 이벤트", type: "limited", duration: "7일", rewards: "한정 다트 스킨 + 젬 100" }
      - { name: "명절 이벤트", type: "holiday", duration: "10일", rewards: "테마 풍선 + 특별 레벨" }

  update_cycle:
    content: "4주마다 +20 levels (1 chapter)"
    feature: "8주마다 신규 기능 or 기믹"
    balance: "2주마다 밸런스 핫픽스 (데이터 기반)"
    client: "4주마다 클라이언트 업데이트"

  ab_test_plan:
    soft_launch:
      - { test: "fail_condition", variants: ["rail_overflow_10", "rail_overflow_8", "dart_limit_only"], metric: "D7 retention + clear_rate", duration: "2주" }
      - { test: "interstitial_freq", variants: ["every_2_levels", "every_3_levels", "every_4_levels"], metric: "ad_revenue + D7_retention", duration: "2주" }
      - { test: "starter_pack_price", variants: ["$0.99", "$1.99", "$2.99"], metric: "conversion_rate + LTV", duration: "2주" }
      - { test: "piggy_bank_fill", variants: ["6판", "8판", "10판"], metric: "purchase_rate + satisfaction", duration: "2주" }
    post_launch:
      - { test: "season_pass_price", variants: ["$3.99", "$4.99", "$6.99"], metric: "purchase_rate + ARPPU" }
      - { test: "booster_price", variants: ["current", "-20%", "+20%"], metric: "use_rate + revenue" }

# ─────────────────────────────────────
# Daily Quest System
# ─────────────────────────────────────
daily_quests:
  count: 3
  refresh: "매일 00:00 UTC"
  examples:
    - "레벨 5개 클리어 → 코인 500"
    - "연쇄 팝 10회 달성 → 부스터 1개"
    - "스타 10개 획득 → 젬 5"
  bonus: "3개 전부 완료 시 추가 보상 (젬 10 + 부스터)"

# ─────────────────────────────────────
# Systems List
# ─────────────────────────────────────
systems:
  - EventManager         # 이벤트 스케줄, 활성화/비활성화
  - QuestManager         # 일일/주간 퀘스트 관리
  - SeasonManager        # 시즌 진행, 리셋 관리
  - NotificationManager  # 푸시 알림 스케줄
  - ABTestManager        # A/B 테스트 설정 및 분기
  - RemoteConfigService  # 서버 설정값 동기화
