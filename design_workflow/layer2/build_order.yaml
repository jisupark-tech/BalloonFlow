# ═══════════════════════════════════════════
# BalloonFlow — Layer 2: Build Order
# ═══════════════════════════════════════════
# 33 Confirmed Systems (Phase 0~3) + Deferred
# 정본 참조: concept.yaml, layer2/system_spec.yaml

project: BalloonFlow
confirmed_systems: 33

# ═══════════════════════════════════════════
# Phase 0: Core Foundation (Main Coder 전담)
# ═══════════════════════════════════════════
phase_0:
  name: "Core Foundation"
  coder: "Main Coder Only"
  description: "전체 아키텍처 뼈대. _ARCHITECTURE.md 생성."
  systems:
    - { name: "Singleton<T>", layer: Core, priority: 1, description: "매니저 싱글톤 베이스" }
    - { name: "ObjectPool", layer: Core, priority: 2, description: "오브젝트 풀링 (풍선, 다트)" }
    - { name: "EventBus", layer: Core, priority: 3, description: "전역 이벤트 시스템" }
    - { name: "InputHandler", layer: Core, priority: 4, description: "보관함 탭 입력 처리" }
    - { name: "UIManager", layer: Core, priority: 5, description: "UI 상태 관리" }
    - { name: "PopupManager", layer: Core, priority: 6, description: "팝업 큐잉" }
    - { name: "RailManager", layer: Core, priority: 7, description: "레일 경로 관리" }
    - { name: "ScoreManager", layer: Core, priority: 8, description: "점수 집계, 스타 판정" }
  output:
    - "_ARCHITECTURE.md"
    - "Core scripts (8)"
  dependency: "없음 (Phase 0은 의존 없음)"

# ═══════════════════════════════════════════
# Phase 1: Core Gameplay (Main + Sub A + Sub B)
# ═══════════════════════════════════════════
phase_1:
  name: "Core Gameplay"
  description: "보관함→다트→풍선 코어 루프 구현"
  parallel_assignment:
    main_coder:
      - { name: "HolderManager", layer: Domain, description: "보관함 선택, 탄창, 비워짐" }
      - { name: "DartManager", layer: Domain, description: "다트 순차 배치, 레일 이동, 풍선 타격" }
      - { name: "PopProcessor", layer: Domain, description: "1:1 팝 판정, 피드백 트리거" }
    sub_coder_a:
      - { name: "BalloonController", layer: Domain, description: "풍선 상태, 색상, 고정 보드 배치" }
      - { name: "BoardStateManager", layer: Domain, description: "보드 상태, 클리어/실패 판정" }
    sub_coder_b:
      - { name: "LevelDataProvider", layer: Domain, description: "레벨 JSON 파싱, 보관함/풍선 데이터" }
      - { name: "LevelManager", layer: Domain, description: "레벨 로드, 진행, 완료/실패" }
  dependency: "Phase 0 완료 필수"
  systems_count: 7

# ═══════════════════════════════════════════
# Phase 2: Content + Balance (Main + Sub A + Sub B)
# ═══════════════════════════════════════════
phase_2:
  name: "Content + Balance"
  description: "레벨 디자인, 패키지, 5종 기믹, 난이도 밸런스"
  parallel_assignment:
    main_coder:
      - { name: "DifficultyCalculator", layer: Domain, description: "난이도 공식 구현" }
      - { name: "BalanceProcessor", layer: Domain, description: "밸런스 지표 집계" }
    sub_coder_a:
      - { name: "PackageManager", layer: Domain, description: "패키지(5×20) 진행, 해금" }
      - { name: "GimmickManager", layer: Domain, description: "5종 기믹(Hidden/Spawner/BigObject/Chain) 활성화/해금" }
      - { name: "ClearRateValidator", layer: Domain, description: "클리어율 모니터링" }
    sub_coder_b:
      - { name: "TutorialController", layer: Game, description: "튜토리얼 1~5 보관함 기반 가이드" }
      - { name: "TutorialManager", layer: Game, description: "FTUE 하이라이트, 화살표" }
  dependency: "Phase 1 완료 필수"
  systems_count: 7

# ═══════════════════════════════════════════
# Phase 3: UX + LiveOps + BM (Main + Sub A + Sub B)
# ═══════════════════════════════════════════
phase_3:
  name: "UX + OutGame + BM"
  description: "UI, 피드백, 라이프, 부스터, 코인 경제, 상점, IAP, 광고"
  parallel_assignment:
    main_coder:
      - { name: "FeedbackController", layer: Game, description: "비대칭 피드백 (담백↔과하게)" }
      - { name: "CurrencyManager", layer: Core, description: "코인 소스/싱크, 초기 2000코인" }
      - { name: "IAPManager", layer: Domain, description: "IAP 결제 처리 (Unity IAP)" }
    sub_coder_a:
      - { name: "PageController", layer: Game, description: "화면 전환" }
      - { name: "HUDController", layer: Game, description: "인게임 HUD (보관함 탄창 표시 포함)" }
      - { name: "LifeManager", layer: Domain, description: "하트 5개, 실패 시 소모, 30분 충전" }
      - { name: "DailyRewardManager", layer: Domain, description: "7일 주기 순차 보상" }
    sub_coder_b:
      - { name: "BoosterManager", layer: Domain, description: "부스터 4종 관리/사용/구매" }
      - { name: "ContinueHandler", layer: Domain, description: "이어하기 (첫 무료, 이후 900→1900→2900코인)" }
      - { name: "ShopManager", layer: Domain, description: "상점 UI, 코인팩/번들/스타터팩 구매" }
      - { name: "AdManager", layer: Domain, description: "보상형+전면 광고, Lv.20 보호" }
      - { name: "OfferManager", layer: Domain, description: "상품 노출 정책, 20분 쿨타임" }
  dependency: "Phase 2 완료 필수"
  systems_count: 11

# ═══════════════════════════════════════════
# Deferred Phase: Meta + Social + 나머지
# ═══════════════════════════════════════════
phase_deferred:
  name: "BM/LiveOps + Meta + Social + 나머지"
  status: _DEFERRED
  trigger: "BM/LiveOps 디렉션 완료 후 + 소프트런칭 데이터 수집 후"
  expected_scope:
    BM_remaining: "SeasonPassManager (디렉션 후), PiggyBankManager (소프트런칭 후)"
    LiveOps: "SeasonManager, QuestManager, StreakManager, EventManager, ABTestManager, RemoteConfigService"
    Meta: "CollectionManager, SkinManager, StarManager, AchievementManager"
    Social: "LeaderboardManager, FriendManager"

# ═══════════════════════════════════════════
# Critical Path
# ═══════════════════════════════════════════
critical_path:
  - "Phase 0 → Phase 1 → Phase 2 → Phase 3"
  - "Phase 0: Core (Main only) → _ARCHITECTURE.md"
  - "Phase 1: HolderManager → DartManager → PopProcessor (코어 루프 핵심)"
  - "Phase 2: DifficultyCalculator → TutorialController (밸런스+학습)"
  - "Phase 3: FeedbackController + CurrencyManager → ShopManager → IAPManager (UX+수익화)"
  - "Deferred: BM/LiveOps 디렉션 완료 후 + 소프트런칭 후 별도 Phase로 추가"

# ═══════════════════════════════════════════
# Editor Scripts
# ═══════════════════════════════════════════
editor_scripts:
  - { name: "SceneBuilder", phase: 0, description: "3씬 자동 구성 + 프리팹 생성" }
  - { name: "ProjectConfigurator", phase: 0, description: "Build Settings + Player Settings" }
editor_scripts_note: "에디터 스크립트는 Phase 0에서 Main Coder가 Core와 함께 작성"
