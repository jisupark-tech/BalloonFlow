# ═══════════════════════════════════════════
# BalloonFlow — Layer 2: System Specification
# ═══════════════════════════════════════════
# 33 Confirmed Systems + Deferred Domains
# 정본 참조: concept.yaml, systems/*.yaml

project: BalloonFlow
total_confirmed_systems: 33

# ═══════════════════════════════════════════
# DOMAIN: InGame (8 systems) — CONFIRMED
# ═══════════════════════════════════════════
InGame:

  HolderManager:
    layer: Domain
    role: Manager
    description: >
      홀더(5칸) 관리. 보관함이 홀더에서 대기, 선택 시 레일(원형 루프)에 올라감.
      레일에서 한 바퀴 돌고 탄창이 남으면 홀더로 복귀 대기.
      홀더 대기 보관함이 5개를 초과하면 실패. 코어 메커닉의 입력 진입점.
    provides:
      - GetHolders() -> HolderData[]
      - SelectHolder(holderId) -> bool
      - GetCurrentHolder() -> HolderData
      - GetMagazineCount(holderId) -> int
      - IsHolderEmpty(holderId) -> bool
      - ConsumeMagazine(holderId) -> int
      - AreAllHoldersEmpty() -> bool
      - GetHolderCapacity() -> int  # always 5
      - ReturnToHolder(holderId) -> bool   # 레일에서 복귀
      - GetHolderCount() -> int            # 현재 홀더 대기 수
    requires:
      - LevelDataProvider.GetHolderSetup()
      - InputHandler.OnHolderTapped
    events_published:
      - OnHolderSelected(holderId, color, magazineCount)
      - OnHolderEmpty(holderId)
      - OnAllHoldersEmpty
      - OnHolderReturned(holderId, remainingMagazine)   # 레일에서 복귀
      - OnHolderOverflow   # 홀더 초과 실패
    data: "HolderData(holderId, color, magazineCount, magazineRemaining, isReturned)"

  DartManager:
    layer: Domain
    role: Manager
    description: >
      보관함이 레일(원형 루프)에 올라가 한 바퀴를 돌며 매칭 풍선에 다트를 발사.
      레일 도중 탄창 0이면 즉시 제거. 한 바퀴 후 탄창 남으면 홀더로 복귀.
    provides:
      - StartRailLoop(holderId, color, magazineCount)
      - GetActiveDarts() -> DartData[]
      - GetDeployedCount() -> int
      - IsLoopComplete() -> bool
      - GetRemainingMagazine(holderId) -> int
    requires:
      - HolderManager.OnHolderSelected
      - HolderManager.ConsumeMagazine()
      - HolderManager.ReturnToHolder()
      - RailManager.GetRailPath()
      - ObjectPool.Get()
      - ObjectPool.Return()
    events_published:
      - OnDartDeployed(dartId, color, position)
      - OnDartHitBalloon(dartId, balloonId)
      - OnLoopComplete(holderId, remainingMagazine)
      - OnMagazineEmpty(holderId)   # 레일 도중 탄창 소진 → 즉시 제거
    data: "DartData(dartId, color, railPosition)"

  RailManager:
    layer: Core
    role: Manager
    description: >
      레일(원형 루프) 경로 관리. 보관함이 레일 위를 한 바퀴 돌며 매칭 풍선에 다트 발사.
      루프 완료 판정, 보관함 위치 추적.
    provides:
      - GetRailPath() -> Vector3[]
      - SetRailLayout(railData)
      - GetHolderPosition(holderId) -> Vector3
      - IsLoopComplete(holderId) -> bool
      - ResetRail()
    requires:
      - LevelDataProvider.GetRailLayout()
    data: "RailLayout(circular_loop), RailPath"

  BalloonController:
    layer: Domain
    role: Controller
    description: >
      풍선 상태 관리. 색상, 위치, HP. 고정 보드 위 풍선 배치.
      BigObject 기믹: 1x1보다 큰 오브젝트, 생명력(lifePoints) 보유.
      여러 번 타격해야 제거됨.
    provides:
      - GetBalloon(balloonId) -> BalloonData
      - GetBalloonsByColor(color) -> BalloonData[]
      - PopBalloon(balloonId) -> PopResult
      - GetAllBalloons() -> BalloonData[]
      - GetRemainingCount() -> int
    requires:
      - LevelDataProvider.GetBalloonLayout()
      - ObjectPool.Get()
      - ObjectPool.Return()
    events_published:
      - OnBalloonPopped(balloonId, color, position)
      - OnBalloonSpawned(balloonId)
    data: "BalloonData(balloonId, color, position, hp)"

  BoardStateManager:
    layer: Domain
    role: Manager
    description: "보드 전체 상태. 풍선 현황, 클리어/실패 판정."
    provides:
      - GetBoardState() -> BoardState
      - GetRemainingBalloons() -> int
      - IsBoardClear() -> bool
      - CheckFailCondition() -> FailResult
    requires:
      - BalloonController.GetRemainingCount()
      - HolderManager.AreAllHoldersEmpty()
    events_published:
      - OnBoardStateChanged
      - OnBoardCleared
      - OnBoardFailed(reason)
    data: "BoardState"
    note: >
      실패 조건: 홀더 초과 확정 (Pixel Flow 동일). 홀더 대기 보관함이 5개를 초과하면 실패.
      보관함이 홀더에서 대기 → 레일(원형 루프)에 올라가 한 바퀴 → 탄창 0이면 즉시 제거,
      탄창 남으면 홀더로 복귀. 복귀한 보관함으로 홀더가 넘치면 게임 오버.
      CheckFailCondition()은 홀더 용량 초과 여부를 검사 (HolderManager.OnHolderReturned 이벤트 수신 후).

  PopProcessor:
    layer: Domain
    role: Processor
    description: "팝 판정. 다트 → 풍선 1:1 타격 시 팝 처리 + 피드백 트리거."
    provides:
      - ProcessPop(balloonId, dartColor) -> PopResult
      - GetPopCount() -> int
    requires:
      - BalloonController.PopBalloon()
      - DartManager.OnDartHitBalloon
    events_published:
      - OnPopComplete(balloonId, color, position, popIndex)
    data: "PopResult(balloonId, color, position, score)"
    note: "체인 팝 없음. 순차 1:1 타격."

  ScoreManager:
    layer: Core
    role: Manager
    description: "점수 집계, 스타 판정, 보너스 계산."
    provides:
      - AddScore(amount)
      - GetCurrentScore() -> int
      - GetStarCount() -> int
      - GetClearBonus() -> int
      - GetRemainingHolderBonus() -> int
    requires:
      - PopProcessor.OnPopComplete
      - BoardStateManager.OnBoardCleared
      - HolderManager.AreAllHoldersEmpty()
      - LevelDataProvider.GetStarThresholds()
    events_published:
      - OnScoreChanged(newScore)
      - OnStarEarned(starCount)
      - OnLevelCleared(score, stars)
      - OnLevelFailed(reason)
    data: "StarThresholds(star1, star2, star3)"

  InputHandler:
    layer: Core
    role: Handler
    description: "터치/탭 입력 처리. 홀더에 있는 보관함 탭 감지."
    provides:
      - EnableInput()
      - DisableInput()
      - IsInputEnabled() -> bool
    requires: []
    events_published:
      - OnHolderTapped(holderId)
    data: null

# ═══════════════════════════════════════════
# DOMAIN: Content (5 systems) — CONFIRMED
# ═══════════════════════════════════════════
Content:

  LevelManager:
    layer: Domain
    role: Manager
    description: "레벨 로드, 진행, 완료/실패 처리, 다음 레벨 전환."
    provides:
      - LoadLevel(levelNumber)
      - StartLevel()
      - CompleteLevel(score, stars)
      - FailLevel(reason)
      - RetryLevel()
      - GetCurrentLevel() -> int
    requires:
      - LevelDataProvider.LoadLevelData()
      - ScoreManager.OnLevelCleared
      - ScoreManager.OnLevelFailed
    events_published:
      - OnLevelLoaded(levelNumber)
      - OnLevelStarted
      - OnLevelCompleted(levelNumber, score, stars)
      - OnLevelFailed(levelNumber, reason)

  LevelDataProvider:
    layer: Domain
    role: Provider
    description: "레벨 JSON 데이터 로드. 풍선 배치, 보관함 설정, 레일 레이아웃 제공."
    provides:
      - LoadLevelData(levelNumber) -> LevelData
      - GetBalloonLayout() -> BalloonLayout[]
      - GetHolderSetup() -> HolderSetup[]
      - GetRailLayout() -> RailLayout
      - GetStarThresholds() -> int[3]
      - GetSpecialMechanics() -> string[]
    requires: []
    data: "LevelData JSON (level_meta schema)"

  PackageManager:
    layer: Domain
    role: Manager
    description: >
      패키지 진행, 해금 관리. 5패키지 × 20레벨 = 100레벨 구조.
      패키지별 난이도 곡선 및 Beat Chart 목표 관리.
    provides:
      - GetCurrentPackage() -> int
      - IsPackageUnlocked(packageId) -> bool
      - CompletePackage(packageId)
    requires:
      - LevelManager.OnLevelCompleted
    events_published:
      - OnPackageCompleted(packageId)
      - OnPackageUnlocked(packageId)

  GimmickManager:
    layer: Domain
    role: Manager
    description: >
      5종 기믹 활성화, 해금 스케줄 관리.
      Hidden(숨김풍선), Spawner(투명/불투명), BigObject(대형 오브젝트, 생명력),
      Chain(연결 풍선). 각 기믹은 패키지 내 pos 1 or 11에서 튜토리얼로 도입.
    provides:
      - IsGimmickUnlocked(gimmickId) -> bool
      - GetActiveGimmicks(levelNumber) -> string[]
      - ApplyGimmick(gimmickId, target)
      - ApplyHidden(target)
      - ApplySpawner(target, isTransparent)
      - ApplyBigObject(target, lifePoints)
      - ApplyChain(targets)
    requires:
      - LevelDataProvider.GetSpecialMechanics()
    events_published:
      - OnGimmickActivated(gimmickId)
    note: >
      기믹 격리 원칙: 각 기믹은 독립적으로 동작하며 코어 루프에 영향을 주지 않음.
      Spawner는 GimmickManager 내에서 처리 (별도 SpawnerManager 불필요).

  TutorialController:
    layer: Game
    role: Controller
    description: >
      튜토리얼 레벨 강제 가이드. 보관함 탭 유도 중심.
      PKG1 pos 1 기본 튜토리얼 + 각 패키지 기믹 도입 튜토리얼 (pos 1 or 11).
      총 5회 튜토리얼 레벨 (패키지당 1회 기믹 소개).
    provides:
      - StartTutorial(step)
      - NextTutorialStep()
      - IsTutorialActive() -> bool
      - CompleteTutorial()
    requires:
      - LevelManager.OnLevelLoaded
      - InputHandler.OnHolderTapped
      - UIManager.ShowScreen()
    events_published:
      - OnTutorialStepCompleted(step)
      - OnTutorialCompleted

# ═══════════════════════════════════════════
# DOMAIN: Balance (3 systems) — CONFIRMED
# ═══════════════════════════════════════════
Balance:

  DifficultyCalculator:
    layer: Domain
    role: Calculator
    description: "레벨 난이도 점수 산출. 정본: balance/difficulty_curve.yaml"
    provides:
      - CalculateDifficulty(levelData) -> float
      - GetSawtoothModifier(levelNumber) -> float
      - GetFinalDifficulty(levelNumber) -> float
    requires:
      - LevelDataProvider.LoadLevelData()
    formulas:
      canonical_ref: "balance/difficulty_curve.yaml"

  BalanceProcessor:
    layer: Domain
    role: Processor
    description: "밸런스 지표 수집/집계. 클리어율, 실패율 대시보드."
    provides:
      - RecordPlayResult(levelId, result, data)
      - GetLevelStats(levelId) -> LevelBalanceStats
    requires:
      - LevelManager.OnLevelCompleted
      - LevelManager.OnLevelFailed

  ClearRateValidator:
    layer: Domain
    role: Validator
    description: "클리어율 모니터링. 목표 범위 이탈 시 경고."
    provides:
      - ValidateClearRate(levelId) -> ValidationResult
      - GetOutOfRangeLevels() -> LevelId[]
    requires:
      - BalanceProcessor.GetLevelStats()

# ═══════════════════════════════════════════
# DOMAIN: UX (6 systems) — CONFIRMED
# ═══════════════════════════════════════════
UX:

  UIManager:
    layer: Core
    role: Manager
    description: "전체 UI 상태 관리. Canvas, 화면 전환."
    provides:
      - ShowScreen(screenId)
      - HideScreen(screenId)
      - GetCurrentScreen() -> string
    requires: []
    events_published:
      - OnScreenChanged(from, to)

  PageController:
    layer: Game
    role: Controller
    description: "화면 전환 관리. Title → Main → Level → Result → Main."
    provides:
      - NavigateTo(pageId)
      - GoBack()
    requires:
      - UIManager.ShowScreen()

  PopupManager:
    layer: Core
    role: Manager
    description: "팝업 큐잉, 우선순위 관리."
    provides:
      - ShowPopup(popupId, priority, data)
      - ClosePopup(popupId)
    requires:
      - UIManager
    config:
      max_concurrent: 1

  TutorialManager:
    layer: Game
    role: Manager
    description: "FTUE 관리. 하이라이트, 화살표, 가이드 표시."
    provides:
      - IsTutorialComplete() -> bool
      - ShowHighlight(target)
      - ShowArrow(target, direction)
      - HideGuides()
    requires:
      - TutorialController.OnTutorialStepCompleted
      - UIManager

  FeedbackController:
    layer: Game
    role: Controller
    description: >
      시청각/햅틱 피드백 제어. 비대칭 원칙: 다트=담백, 풍선팝=과하게.
      피치 상승 파열음, 물/반짝이 파편, 진동.
    provides:
      - PlayPopEffect(position, popIndex, color)
      - PlaySound(soundId)
      - PlayHaptic(intensity)
      - PlayClearCelebration()
      - PlayFailEffect()
    requires:
      - PopProcessor.OnPopComplete
      - ScoreManager.OnLevelCleared
      - ScoreManager.OnLevelFailed
    note: >
      popIndex를 사용하여 피치 상승 효과 구현.
      순차 팝마다 음높이가 올라감 (팡-팡-팡-팡-팡!!).

  HUDController:
    layer: Game
    role: Controller
    description: "인게임 HUD 업데이트. 점수, 남은 풍선, 보관함 탄창 수."
    provides:
      - UpdateScore(score)
      - UpdateRemainingBalloons(count)
      - UpdateHolderMagazine(holderId, remaining)
      - UpdateStarProgress(progress)
    requires:
      - ScoreManager.OnScoreChanged
      - PopProcessor.OnPopComplete
      - HolderManager.OnHolderSelected

# ═══════════════════════════════════════════
# DOMAIN: OutGame (8 systems) — CONFIRMED
# ═══════════════════════════════════════════
OutGame:

  LifeManager:
    layer: Domain
    role: Manager
    description: >
      하트 시스템 관리. 최대 5개, 실패 시 1개 소모, 30분 자동 충전.
      하트 0에서 과금/광고 접점 발생.
    provides:
      - GetLives() -> int
      - ConsumeLive() -> bool
      - RefillLives()
      - GetRechargeTimeRemaining() -> float
      - IsLiveFull() -> bool
    requires:
      - LevelManager.OnLevelFailed
      - CurrencyManager.SpendCurrency()
    events_published:
      - OnLiveConsumed(remaining)
      - OnLiveRefilled(count)
      - OnLivesEmpty
    config:
      max_lives: 5
      recharge_min: 30

  BoosterManager:
    layer: Domain
    role: Manager
    description: >
      부스터 4종 관리. 트레이 추가(300), 손(1900/3), 셔플(1500/3), 색상 제거(2900/3).
      판 진행 중(in_play) 사용. 보유 수량, 구매, 사용 처리.
    provides:
      - GetBoosterCount(boosterId) -> int
      - UseBooster(boosterId) -> bool
      - PurchaseBooster(boosterId) -> bool
      - GetAllBoosters() -> BoosterData[]
    requires:
      - CurrencyManager.SpendCurrency()
      - HolderManager (셔플 시)
      - BalloonController (색상 제거 시)
      - GimmickManager (손 - Hidden 해제)
    events_published:
      - OnBoosterUsed(boosterId, effect)
      - OnBoosterPurchased(boosterId, count)
    data: "BoosterData(boosterId, name, count, coinPrice, unitCount)"
    price_table:
      tray_add: { coin_price: 300, unit: 1, note: "홀더 슬롯 1칸 추가 — 가장 저렴한 보험" }
      shuffle: { coin_price: 1500, unit: 3, note: "보드 풍선 배치 셔플" }
      hand: { coin_price: 1900, unit: 3, note: "Hidden 풍선 1개 공개" }
      color_remove: { coin_price: 2900, unit: 3, note: "지정 색상 풍선 전부 제거 — 가장 강력" }

  CurrencyManager:
    layer: Core
    role: Manager
    description: >
      코인 관리 (소프트 재화). 소스(레벨 보상, IAP)와 싱크(부스터, 하트, 컨티뉴) 처리.
      초기 2000코인 지급.
    provides:
      - GetBalance(currencyType) -> int
      - AddCurrency(currencyType, amount, reason)
      - SpendCurrency(currencyType, amount, reason) -> bool
      - HasEnough(currencyType, amount) -> bool
    requires: []
    events_published:
      - OnCurrencyChanged(currencyType, newBalance, delta, reason)
      - OnInsufficientFunds(currencyType, required)
    config:
      initial_coins: 2000

  ContinueHandler:
    layer: Domain
    role: Handler
    description: >
      이어하기 처리. 실패 시 팝업 노출, 첫 1회 무료, 이후 900→1900→2900코인 단계별 상승.
      최대 3회. 재시도 시 1회차로 리셋.
      컨티뉴 효과: 탄창이 남아 홀더에 쌓인 보관함을 홀더 윗부분 대기열로 이동.
      유저가 터치할 때까지 대기열에서 머무르고, 터치하면 레일에 올라감. 자동으로 홀더에 내려오지 않음.
    provides:
      - ShowContinuePopup()
      - ProcessContinue() -> bool
      - GetContinueCost() -> int
      - GetContinueUsedCount() -> int
      - IsFreeContineAvailable() -> bool
      - ResetContinueCount()   # 재시도 시 호출
    requires:
      - BoardStateManager.OnBoardFailed
      - CurrencyManager.SpendCurrency()
      - HolderManager (홀더 → 상단 대기열 이동)
      - PopupManager.ShowPopup()
    events_published:
      - OnContinueUsed(isFree, cost, usedCount)
      - OnContinueDeclined
    config:
      first_free: true
      escalating_cost: [900, 1900, 2900]
      max_uses: 3
      reset_on_retry: true

  ShopManager:
    layer: Domain
    role: Manager
    description: >
      상점 UI 및 구매 처리. 코인팩(6), 번들(5), 스타터팩, 광고 제거.
      노출 순서: 스타터팩 → 번들 → 코인 → 광고 제거.
    provides:
      - GetShopProducts() -> ProductData[]
      - PurchaseProduct(productId) -> PurchaseResult
      - IsProductAvailable(productId) -> bool
      - GetStarterPackStatus() -> StarterPackStatus
    requires:
      - CurrencyManager.AddCurrency()
      - BoosterManager (부스터 지급)
      - IAPManager (결제 처리)
    events_published:
      - OnProductPurchased(productId, price)
    data: "ProductData(productId, name, price, contents, efficiency)"

  DailyRewardManager:
    layer: Domain
    role: Manager
    description: >
      7일 주기 순차 보상. 연속 접속 끊어져도 이어감.
      코인→코인→부스터→코인→코인→부스터→대량코인+부스터.
    provides:
      - GetCurrentDay() -> int
      - GetReward(day) -> RewardData
      - ClaimDailyReward() -> RewardData
      - IsDailyRewardAvailable() -> bool
    requires:
      - CurrencyManager.AddCurrency()
      - BoosterManager (부스터 지급)
    events_published:
      - OnDailyRewardClaimed(day, reward)
    config:
      cycle_days: 7

  AdManager:
    layer: Domain
    role: Manager
    domain_owner: BM   # BM 소속이나 OutGame 의존성으로 인해 여기에 배치
    description: >
      보상형 광고 + 전면 광고 관리. Lv.20까지 전면 광고 미노출 (FTUE 보호).
      전면 광고는 레벨 결과 화면에서만, 30초 쿨다운.
    provides:
      - ShowRewardedAd(placement) -> bool
      - ShowInterstitialAd() -> bool
      - IsAdRemovalPurchased() -> bool
      - IsInterstitialReady() -> bool
    requires:
      - LifeManager (하트 충전 보상)
      - BoosterManager (부스터 무료 사용 보상)
      - CurrencyManager (코인 보상)
    events_published:
      - OnAdCompleted(adType, placement, reward)
      - OnAdSkipped(adType)
    config:
      interstitial_protection_level: 20
      interstitial_cooldown_sec: 30

  OfferManager:
    layer: Domain
    role: Manager
    domain_owner: BM   # BM 소속이나 OutGame 의존성으로 인해 여기에 배치
    description: >
      상품 노출 정책/팝업 관리. 스페셜 오퍼 간 20분 쿨타임.
      팝업 우선순위: 스타터팩 → 전면 광고.
    provides:
      - CheckOfferTrigger(trigger) -> OfferData
      - ShowOffer(offerId)
      - GetActiveOffers() -> OfferData[]
    requires:
      - PopupManager.ShowPopup()
      - ShopManager.GetStarterPackStatus()
      - AdManager.IsInterstitialReady()
    events_published:
      - OnOfferShown(offerId)
      - OnOfferAccepted(offerId)
      - OnOfferDeclined(offerId)
    config:
      popup_cooldown_min: 20

# ═══════════════════════════════════════════
# DOMAIN: BM (3 confirmed + 1 deferred)
# AdManager, OfferManager는 BM 소속이나 OutGame 의존성으로 OutGame 섹션에 배치 (domain_owner: BM 태그)
# ═══════════════════════════════════════════
BM:

  IAPManager:
    layer: Domain
    role: Manager
    description: >
      IAP 결제 처리. 코인팩(6), 번들(5), 스타터팩, 광고 제거.
      Unity IAP 래핑. 결제 완료 → 아이템 지급 → 영수증 검증.
    provides:
      - InitiatePurchase(productId) -> PurchaseResult
      - RestorePurchases()
      - GetProductPrice(productId) -> string
    requires:
      - CurrencyManager.AddCurrency()
      - BoosterManager (부스터 지급)
    events_published:
      - OnPurchaseCompleted(productId, receipt)
      - OnPurchaseFailed(productId, reason)
    note: "조건부 컴파일: #if UNITY_IAP"

# ═══════════════════════════════════════════
# DEFERRED DOMAINS
# ═══════════════════════════════════════════
# BM deferred: SeasonPassManager (BM/LiveOps 디렉션 후), PiggyBankManager (소프트런칭 후)
# LiveOps: _DEFERRED — SeasonManager, QuestManager, StreakManager + EventManager, ABTestManager, RemoteConfigService
# Meta: _DEFERRED (리텐션 데이터 후)
# Social: _DEFERRED (소프트런칭 후)
