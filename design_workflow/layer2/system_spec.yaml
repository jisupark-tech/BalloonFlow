# ═══════════════════════════════════════════
# BalloonFlow — Layer 2: System Specification
# ═══════════════════════════════════════════
# 45 Systems across 9 Domains
# Generated: 2026-03-11

project: BalloonFlow
total_systems: 45

# ═══════════════════════════════════════════
# DOMAIN: InGame (8 systems)
# ═══════════════════════════════════════════
InGame:

  RailManager:
    layer: Core
    role: Manager
    description: "레일 생성, 풍선 이동 경로 관리, 레일 형태(직선/S자/지그재그 등) 설정"
    provides:
      - CreateRail(railData)
      - GetRailPath(railId) -> Vector3[]
      - GetBalloonPositions() -> BalloonPosition[]
      - SetRailSpeed(speed)
      - ResetRail()
    requires:
      - LevelDataProvider.GetRailLayout()
    events_published:
      - OnRailOverflow
      - OnBalloonReachedEnd
    data: "RailLayout, BalloonPosition"

  BalloonController:
    layer: Domain
    role: Controller
    description: "풍선 상태(색상, 타입, HP), 생성/파괴, 풍선 오브젝트 풀 관리"
    provides:
      - SpawnBalloon(color, type, position)
      - PopBalloon(balloonId) -> PopResult
      - GetBalloonColor(balloonId) -> ColorEnum
      - GetBalloonType(balloonId) -> BalloonType
      - GetAdjacentBalloons(balloonId) -> Balloon[]
      - ThawBalloon(balloonId)
    requires:
      - RailManager.GetBalloonPositions()
      - ObjectPool.Get()
      - ObjectPool.Return()
    events_published:
      - OnBalloonPopped(balloonId, color, position)
      - OnBalloonSpawned(balloonId)
    data: "BalloonData(color, type, hp, position)"

  DartManager:
    layer: Domain
    role: Manager
    description: "다트 큐 관리, 현재/다음 다트 표시, 다트 발사 실행"
    provides:
      - GetCurrentDart() -> DartData
      - GetDartQueue() -> DartData[]
      - FireDart(targetBalloonId) -> FireResult
      - DiscardDart() -> bool
      - AddBonusDarts(count)
      - GetRemainingDarts() -> int
    requires:
      - LevelDataProvider.GetDartQueue()
      - BalloonController.GetBalloonColor()
      - InputHandler.OnBalloonTapped
    events_published:
      - OnDartFired(dartColor, targetId)
      - OnDartQueueEmpty
      - OnBonusDartAwarded
    data: "DartData(color, index)"

  PopProcessor:
    layer: Domain
    role: Processor
    description: "팝 판정 로직. 다트 명중 → 기본 팝 → 인접 같은 색 연쇄 팝 계산"
    provides:
      - ProcessPop(balloonId, dartColor) -> PopChainResult
      - GetChainLength() -> int
    requires:
      - BalloonController.PopBalloon()
      - BalloonController.GetAdjacentBalloons()
      - BalloonController.GetBalloonColor()
      - ComboCalculator.CalculateComboScore()
    events_published:
      - OnChainPopComplete(chainLength, totalScore)
    data: "PopChainResult(poppedBalloons[], chainLength, score)"

  ComboCalculator:
    layer: Domain
    role: Calculator
    description: "연쇄 팝 점수 계산. 체인 길이에 따른 배수 적용."
    provides:
      - CalculateComboScore(chainLength, baseScore) -> int
      - GetComboMultiplier(chainLength) -> float
      - ShouldAwardBonusDart(chainLength) -> bool
    requires: []
    data: "ComboMultiplierTable"
    formulas:
      multiplier: "[1.0, 1.5, 2.0, 3.0] (index = min(chainLength-1, 3))"
      bonus_dart: "chainLength >= 4 → 보너스 다트 1개"

  ScoreManager:
    layer: Core
    role: Manager
    description: "점수 집계, 스타 판정, 클리어/실패 판정"
    provides:
      - AddScore(amount)
      - GetCurrentScore() -> int
      - GetStarCount() -> int
      - CheckClearCondition() -> bool
      - CheckFailCondition() -> bool
      - GetClearBonus() -> int
    requires:
      - PopProcessor.OnChainPopComplete
      - DartManager.GetRemainingDarts()
      - BoardStateManager.GetOverflowCount()
      - LevelDataProvider.GetStarThresholds()
    events_published:
      - OnScoreChanged(newScore)
      - OnStarEarned(starCount)
      - OnLevelCleared(score, stars)
      - OnLevelFailed(reason)
    data: "StarThresholds(star1, star2, star3)"

  InputHandler:
    layer: Core
    role: Handler
    description: "터치/탭 입력 처리. 풍선 탭 감지 → 다트 발사 명령."
    provides:
      - EnableInput()
      - DisableInput()
      - IsInputEnabled() -> bool
    requires: []
    events_published:
      - OnBalloonTapped(balloonId)
      - OnEmptyTapped(position)
    data: null

  BoardStateManager:
    layer: Domain
    role: Manager
    description: "보드 전체 상태 관리. 레일 + 대기 영역 + 풍선 현황 통합 조회."
    provides:
      - GetBoardState() -> BoardState
      - GetOverflowCount() -> int
      - GetRemainingBalloons() -> int
      - IsBoardClear() -> bool
      - SaveBoardSnapshot() -> BoardSnapshot
    requires:
      - RailManager.GetBalloonPositions()
      - BalloonController.GetAllBalloons()
    events_published:
      - OnBoardStateChanged
    data: "BoardState, BoardSnapshot"

# ═══════════════════════════════════════════
# DOMAIN: Content (5 systems)
# ═══════════════════════════════════════════
Content:

  LevelManager:
    layer: Domain
    role: Manager
    description: "레벨 로드, 진행 제어, 완료/실패 처리, 다음 레벨 전환"
    provides:
      - LoadLevel(levelNumber)
      - StartLevel()
      - CompleteLevel(score, stars)
      - FailLevel(reason)
      - RetryLevel()
      - GetCurrentLevel() -> int
    requires:
      - LevelDataProvider.LoadLevelData()
      - ScoreManager.OnLevelCleared
      - ScoreManager.OnLevelFailed
      - LifeManager.ConsumeLife()
      - CurrencyManager.AddCurrency()
    events_published:
      - OnLevelLoaded(levelNumber)
      - OnLevelStarted
      - OnLevelCompleted(levelNumber, score, stars)
      - OnLevelFailed(levelNumber, reason)

  LevelDataProvider:
    layer: Domain
    role: Provider
    description: "레벨 JSON 데이터 로드, 파싱, 풍선 배치/레일 레이아웃/다트 큐 제공"
    provides:
      - LoadLevelData(levelNumber) -> LevelData
      - GetRailLayout() -> RailLayout
      - GetBalloonLayout() -> BalloonLayout[]
      - GetDartQueue() -> DartData[]
      - GetStarThresholds() -> int[3]
      - GetMoveLimit() -> int
      - GetOverflowLimit() -> int
      - GetSpecialMechanics() -> string[]
    requires: []
    data: "LevelData JSON (level_meta schema)"

  ChapterManager:
    layer: Domain
    role: Manager
    description: "챕터 진행, 해금 판정 (스타 게이트), 챕터 보상 관리"
    provides:
      - GetCurrentChapter() -> int
      - IsChapterUnlocked(chapterId) -> bool
      - GetChapterProgress(chapterId) -> float
      - CompleteChapter(chapterId)
      - GetStarGateRequirement(chapterId) -> int
    requires:
      - StarManager.GetTotalStars()
      - LevelManager.OnLevelCompleted
    events_published:
      - OnChapterCompleted(chapterId)
      - OnChapterUnlocked(chapterId)

  GimmickManager:
    layer: Domain
    role: Manager
    description: "특수 기믹(이중풍선, 얼음, 폭탄 등) 활성화, 해금 스케줄 관리"
    provides:
      - IsGimmickUnlocked(gimmickId) -> bool
      - GetActiveGimmicks(levelNumber) -> string[]
      - ApplyGimmick(gimmickId, target)
    requires:
      - LevelDataProvider.GetSpecialMechanics()
      - LevelManager.GetCurrentLevel()
    events_published:
      - OnGimmickActivated(gimmickId)

  TutorialController:
    layer: Game
    role: Controller
    description: "튜토리얼 레벨(1~5) 강제 가이드, 힌트, 단계별 진행 제어"
    provides:
      - StartTutorial(step)
      - NextTutorialStep()
      - IsTutorialActive() -> bool
      - GetTutorialStep() -> int
      - CompleteTutorial()
    requires:
      - LevelManager.OnLevelLoaded
      - InputHandler.OnBalloonTapped
      - UIManager.ShowScreen()
    events_published:
      - OnTutorialStepCompleted(step)
      - OnTutorialCompleted

# ═══════════════════════════════════════════
# DOMAIN: Balance (3 systems)
# ═══════════════════════════════════════════
Balance:

  DifficultyCalculator:
    layer: Domain
    role: Calculator
    description: "레벨 난이도 점수 산출. 색상수, 풍선수, 특수비율, 여유계수, 레일복잡도 가중 합산."
    provides:
      - CalculateDifficulty(levelData) -> float
      - GetSawtoothModifier(levelNumber) -> float
      - GetFinalDifficulty(levelNumber) -> float
    requires:
      - LevelDataProvider.LoadLevelData()
    formulas:
      canonical_ref: "balance/difficulty_curve.yaml (정본)"
      difficulty: "D(L) = 25*(colors-3)/5 + 25*balloons/80 + 20*special_ratio + 15*(1-(buffer-1)) + 15*rail_complexity"
      sawtooth: "modifiers[(level-1)%5] where modifiers=[0.7, 0.85, 0.95, 1.0, 0.6]"

  BalanceProcessor:
    layer: Domain
    role: Processor
    description: "밸런스 지표 수집/집계. 클리어율, 실패율, near-miss율 등 대시보드 데이터."
    provides:
      - RecordPlayResult(levelId, result, data)
      - GetLevelStats(levelId) -> LevelBalanceStats
      - GetDailyReport() -> BalanceReport
    requires:
      - LevelManager.OnLevelCompleted
      - LevelManager.OnLevelFailed
    data: "level_balance_daily schema 기반"

  ClearRateValidator:
    layer: Domain
    role: Validator
    description: "클리어율 모니터링. 목표 범위 이탈 시 경고 생성."
    provides:
      - ValidateClearRate(levelId) -> ValidationResult
      - GetOutOfRangeLevels() -> LevelId[]
    requires:
      - BalanceProcessor.GetLevelStats()
    thresholds:
      fail_rate_max: 0.60
      near_miss_target: 0.35
      hopeless_fail_max: 0.10

# ═══════════════════════════════════════════
# DOMAIN: OutGame (6 systems)
# ═══════════════════════════════════════════
OutGame:

  LifeManager:
    layer: Domain
    role: Manager
    description: "하트 시스템. 최대 5개, 30분 자동 충전, 광고/젬 충전."
    provides:
      - GetCurrentLives() -> int
      - ConsumeLife() -> bool
      - AddLife(count)
      - RefillLives(method)
      - GetNextRegenTime() -> float
      - HasLives() -> bool
    requires:
      - CurrencyManager.SpendCurrency() (for gem refill)
    events_published:
      - OnLivesChanged(current, max)
      - OnLivesEmpty
      - OnLifeRegenerated
    config:
      max_lives: 5
      regen_minutes: 30

  BoosterManager:
    layer: Domain
    role: Manager
    description: "부스터 인벤토리, 사용, 획득 관리. Pre-play, In-play, Continue 카테고리."
    provides:
      - GetBoosterInventory() -> BoosterData[]
      - UseBooster(boosterId) -> bool
      - AddBooster(boosterId, count)
      - GetBoosterCount(boosterId) -> int
      - CanUseBooster(boosterId) -> bool
    requires:
      - CurrencyManager.SpendCurrency()
    events_published:
      - OnBoosterUsed(boosterId)
      - OnBoosterAcquired(boosterId, count)

  CurrencyManager:
    layer: Core
    role: Manager
    description: "재화 원장 관리. 코인/젬 획득/소비 트랜잭션."
    provides:
      - GetBalance(currencyId) -> int
      - AddCurrency(currencyId, amount, source)
      - SpendCurrency(currencyId, amount, sink) -> bool
      - CanAfford(currencyId, amount) -> bool
      - GetTransactionHistory(currencyId) -> Transaction[]
    requires: []
    events_published:
      - OnCurrencyChanged(currencyId, newBalance, delta, source)
      - OnInsufficientFunds(currencyId, required, current)

  ShopManager:
    layer: Game
    role: Manager
    description: "상점 아이템 목록, 가격, 구매 처리."
    provides:
      - GetShopItems(category) -> ShopItem[]
      - PurchaseItem(itemId) -> PurchaseResult
      - RefreshShop()
    requires:
      - CurrencyManager.SpendCurrency()
      - CurrencyManager.CanAfford()
      - BoosterManager.AddBooster()
      - IAPManager.ProcessIAP()

  DailyRewardManager:
    layer: Domain
    role: Manager
    description: "일일 출석 보상. 7일 주기, 연속 출석 보너스."
    provides:
      - GetDailyRewardStatus() -> DailyRewardData
      - ClaimDailyReward() -> RewardData
      - GetStreak() -> int
    requires:
      - CurrencyManager.AddCurrency()
      - BoosterManager.AddBooster()
    events_published:
      - OnDailyRewardClaimed(day, rewards)

  ContinueHandler:
    layer: Domain
    role: Handler
    description: "실패 후 이어하기 로직. 광고/젬 비용, 에스컬레이션."
    provides:
      - GetContinueCost() -> ContinueCostData
      - UseContinue(method) -> bool
      - GetContinueCount() -> int
      - ResetContinueCount()
    requires:
      - CurrencyManager.SpendCurrency()
      - AdManager.ShowRewardedAd()
      - DartManager.AddBonusDarts()
    config:
      first_cost_gem: 30
      escalation_per_use: 10
      max_per_level: 3
      ad_first_free: true

# ═══════════════════════════════════════════
# DOMAIN: BM (5 systems)
# ═══════════════════════════════════════════
BM:

  IAPManager:
    layer: Core
    role: Manager
    description: "IAP 구매 처리. Unity IAP 래핑. 영수증 검증."
    provides:
      - ProcessIAP(productId) -> IAPResult
      - GetProducts() -> IAPProduct[]
      - RestorePurchases()
      - IsProductOwned(productId) -> bool
    requires:
      - CurrencyManager.AddCurrency()
    events_published:
      - OnPurchaseCompleted(productId, price)
      - OnPurchaseFailed(productId, reason)
    sdk: "UNITY_IAP"

  AdManager:
    layer: Core
    role: Manager
    description: "광고 노출 관리. 보상형/전면 광고, 쿨다운, 일일 캡."
    provides:
      - ShowRewardedAd(placement) -> AdResult
      - ShowInterstitial() -> bool
      - IsRewardedAdReady() -> bool
      - ShouldShowInterstitial() -> bool
      - GetDailyAdCount(placement) -> int
    requires: []
    events_published:
      - OnRewardedAdCompleted(placement, reward)
      - OnInterstitialShown
    sdk: "GOOGLE_MOBILE_ADS"
    config:
      interstitial_every_n_levels: 3
      interstitial_cooldown_sec: 120

  OfferManager:
    layer: Domain
    role: Manager
    description: "특별 오퍼 타이밍, 노출 조건, 시간 제한 관리."
    provides:
      - CheckOfferTrigger(context) -> Offer[]
      - GetActiveOffers() -> Offer[]
      - DismissOffer(offerId)
      - IsOfferAvailable(offerId) -> bool
    requires:
      - LevelManager.GetCurrentLevel()
      - LevelManager.OnLevelFailed
      - IAPManager.ProcessIAP()
    events_published:
      - OnOfferTriggered(offerId)
      - OnOfferExpired(offerId)

  PiggyBankManager:
    layer: Domain
    role: Manager
    description: "피기뱅크 누적, 가득 참 감지, 구매 처리."
    provides:
      - GetPiggyBankStatus() -> PiggyBankData
      - AddToPiggyBank(amount)
      - PurchasePiggyBank() -> bool
      - IsPiggyBankFull() -> bool
      - IsPiggyBankUnlocked() -> bool
    requires:
      - LevelManager.OnLevelCompleted
      - IAPManager.ProcessIAP()
      - CurrencyManager.AddCurrency()
    config:
      unlock_level: 20
      fill_cycle: 8
      price: 2.99

  SeasonPassManager:
    layer: Domain
    role: Manager
    description: "시즌패스 진행, XP 누적, 무료/프리미엄 트랙 보상 지급."
    provides:
      - GetSeasonPassStatus() -> SeasonPassData
      - AddXP(amount)
      - ClaimReward(level, track) -> RewardData
      - IsSeasonPassPremium() -> bool
      - GetCurrentSeasonPassLevel() -> int
    requires:
      - LevelManager.OnLevelCompleted
      - IAPManager.ProcessIAP()
      - CurrencyManager.AddCurrency()
      - BoosterManager.AddBooster()
    config:
      levels: 30
      xp_per_clear: 10
      xp_per_star: 5
      price: 4.99

# ═══════════════════════════════════════════
# DOMAIN: UX (6 systems)
# ═══════════════════════════════════════════
UX:

  UIManager:
    layer: Core
    role: Manager
    description: "전체 UI 상태 관리. Canvas, 화면 전환, 공통 UI 로직."
    provides:
      - ShowScreen(screenId)
      - HideScreen(screenId)
      - GetCurrentScreen() -> string
      - ShowLoading()
      - HideLoading()
    requires: []
    events_published:
      - OnScreenChanged(from, to)

  PageController:
    layer: Game
    role: Controller
    description: "화면 전환 관리. Title → Main → Level → Result → Main 루프."
    provides:
      - NavigateTo(pageId)
      - GoBack()
      - GetCurrentPage() -> string
    requires:
      - UIManager.ShowScreen()

  PopupManager:
    layer: Core
    role: Manager
    description: "팝업 큐잉, 우선순위 관리. 동시 1개, 큐에 대기."
    provides:
      - ShowPopup(popupId, priority, data)
      - ClosePopup(popupId)
      - GetActivePopup() -> string
      - HasPendingPopups() -> bool
    requires:
      - UIManager
    config:
      max_concurrent: 1
      priority_levels: 8

  TutorialManager:
    layer: Game
    role: Manager
    description: "FTUE 전체 관리. 튜토리얼 진행 상태, 하이라이트, 화살표 표시."
    provides:
      - IsTutorialComplete() -> bool
      - GetFTUEProgress() -> int
      - ShowHighlight(target)
      - ShowArrow(target, direction)
      - HideGuides()
    requires:
      - TutorialController.OnTutorialStepCompleted
      - UIManager

  FeedbackController:
    layer: Game
    role: Controller
    description: "시청각/햅틱 피드백 제어. 팝 이펙트, 사운드, 진동."
    provides:
      - PlayPopEffect(position, chainLength, color)
      - PlaySound(soundId)
      - PlayHaptic(intensity)
      - PlayClearCelebration()
      - PlayFailEffect()
    requires:
      - PopProcessor.OnChainPopComplete
      - ScoreManager.OnLevelCleared
      - ScoreManager.OnLevelFailed

  HUDController:
    layer: Game
    role: Controller
    description: "인게임 HUD 업데이트. 점수, 다트수, 목표, 스타바."
    provides:
      - UpdateScore(score)
      - UpdateDartCount(remaining)
      - UpdateObjective(current, total)
      - UpdateStarProgress(progress)
      - ShowComboText(multiplier)
    requires:
      - ScoreManager.OnScoreChanged
      - DartManager.OnDartFired
      - PopProcessor.OnChainPopComplete

# ═══════════════════════════════════════════
# DOMAIN: Meta (4 systems)
# ═══════════════════════════════════════════
Meta:

  CollectionManager:
    layer: Domain
    role: Manager
    description: "풍선 도감 관리. 수집 진행, 마일스톤 보상."
    provides:
      - UnlockCollectible(collectibleId)
      - GetCollectionProgress() -> CollectionData
      - GetMilestoneRewards() -> MilestoneData[]
      - ClaimMilestoneReward(milestoneId) -> RewardData
    requires:
      - LevelManager.OnLevelCompleted
      - CurrencyManager.AddCurrency()
    events_published:
      - OnCollectibleUnlocked(collectibleId)
      - OnMilestoneReached(milestoneId)

  SkinManager:
    layer: Domain
    role: Manager
    description: "다트/풍선 스킨 관리. 보유, 장착, 구매."
    provides:
      - GetOwnedSkins() -> SkinData[]
      - EquipSkin(skinId, slot)
      - GetEquippedSkin(slot) -> SkinData
      - PurchaseSkin(skinId) -> bool
    requires:
      - CurrencyManager.SpendCurrency()

  StarManager:
    layer: Domain
    role: Manager
    description: "스타 누적 관리. 레벨별 최고 스타, 총 스타수, 게이트 판정."
    provides:
      - RecordStars(levelId, starCount)
      - GetTotalStars() -> int
      - GetLevelStars(levelId) -> int
      - MeetsStarGate(requirement) -> bool
    requires:
      - ScoreManager.OnStarEarned
    events_published:
      - OnTotalStarsChanged(total)

  AchievementManager:
    layer: Domain
    role: Manager
    description: "도전과제 추적, 달성 판정, 보상 지급."
    provides:
      - GetAchievements() -> AchievementData[]
      - CheckAchievement(achievementId) -> bool
      - ClaimAchievementReward(achievementId) -> RewardData
      - GetProgress(achievementId) -> float
    requires:
      - PopProcessor.OnChainPopComplete
      - LevelManager.OnLevelCompleted
      - CurrencyManager.AddCurrency()
    events_published:
      - OnAchievementUnlocked(achievementId)

# ═══════════════════════════════════════════
# DOMAIN: Social (2 systems)
# ═══════════════════════════════════════════
Social:

  LeaderboardManager:
    layer: Domain
    role: Manager
    description: "주간 랭킹 관리. 점수 제출, 랭킹 조회, 시즌 리셋."
    provides:
      - SubmitScore(metric, value)
      - GetLeaderboard(type) -> LeaderboardEntry[]
      - GetPlayerRank(type) -> int
      - ClaimRankReward() -> RewardData
    requires:
      - StarManager.GetTotalStars()
      - CurrencyManager.AddCurrency()
    events_published:
      - OnLeaderboardUpdated
      - OnRankChanged(newRank)

  FriendManager:
    layer: Domain
    role: Manager
    description: "친구 목록, 하트 선물 보내기/받기."
    provides:
      - GetFriendList() -> FriendData[]
      - SendGift(friendId, giftType) -> bool
      - ReceiveGifts() -> GiftData[]
      - GetDailySendCount() -> int
    requires:
      - LifeManager.AddLife()
    config:
      daily_send_limit: 20
      daily_receive_limit: 20

# ═══════════════════════════════════════════
# DOMAIN: LiveOps (6 systems)
# ═══════════════════════════════════════════
LiveOps:

  EventManager:
    layer: Domain
    role: Manager
    description: "이벤트 스케줄, 활성화/비활성화, 이벤트 진행 관리."
    provides:
      - GetActiveEvents() -> EventData[]
      - IsEventActive(eventId) -> bool
      - GetEventProgress(eventId) -> float
      - ClaimEventReward(eventId) -> RewardData
    requires:
      - RemoteConfigService.GetConfig()
      - CurrencyManager.AddCurrency()
    events_published:
      - OnEventStarted(eventId)
      - OnEventEnded(eventId)

  QuestManager:
    layer: Domain
    role: Manager
    description: "일일/주간 퀘스트 관리. 진행 추적, 보상 수령."
    provides:
      - GetDailyQuests() -> QuestData[]
      - UpdateQuestProgress(questType, amount)
      - ClaimQuestReward(questId) -> RewardData
      - AreAllDailyQuestsComplete() -> bool
    requires:
      - LevelManager.OnLevelCompleted
      - PopProcessor.OnChainPopComplete
      - CurrencyManager.AddCurrency()
    events_published:
      - OnQuestCompleted(questId)
      - OnAllDailyQuestsComplete

  SeasonManager:
    layer: Domain
    role: Manager
    description: "시즌 진행, 리셋, 시즌별 테마 관리."
    provides:
      - GetCurrentSeason() -> SeasonData
      - GetSeasonTimeRemaining() -> float
      - ResetSeason()
    requires:
      - RemoteConfigService.GetConfig()
    events_published:
      - OnSeasonStarted(seasonId)
      - OnSeasonEnded(seasonId)

  NotificationManager:
    layer: Core
    role: Manager
    description: "로컬/푸시 알림 스케줄링."
    provides:
      - ScheduleNotification(type, time, message)
      - CancelNotification(type)
      - GetScheduledNotifications() -> NotificationData[]
    requires: []

  ABTestManager:
    layer: Core
    role: Manager
    description: "A/B 테스트 설정, 유저 그룹 배정, 변수 조회."
    provides:
      - GetVariant(testId) -> string
      - IsInTest(testId) -> bool
      - GetTestConfig(testId) -> object
    requires:
      - RemoteConfigService.GetConfig()

  RemoteConfigService:
    layer: Core
    role: Service
    description: "서버 설정값 동기화. Firebase Remote Config 래핑."
    provides:
      - GetConfig(key) -> object
      - FetchConfig() -> bool
      - GetLastFetchTime() -> DateTime
    requires: []
    events_published:
      - OnConfigUpdated
    sdk: "FIREBASE_ANALYTICS"
