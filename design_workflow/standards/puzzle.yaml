# ═══════════════════════════════════════════
# Stage 0: Puzzle Genre Design Standard
# ═══════════════════════════════════════════
# Genre: Puzzle | Applied to: BalloonFlow (queue_sort)
# Purpose: 장르별 설계 표준 — 파라미터 정의, 상세도 기준, 데이터 스키마

genre: Puzzle
version: "1.0.0"
created: "2026-03-11"

# ─────────────────────────────────────
# 1. Tier Priorities
# ─────────────────────────────────────
tier_priorities:
  tier_1:
    label: "Core (출시 필수)"
    domains: [InGame, Content, Balance]
    description: "코어 루프 + 레벨 디자인 + 난이도 밸런스. 퍼즐 장르의 근간."
  tier_2:
    label: "Growth (소프트런칭 전)"
    domains: [OutGame, BM, UX]
    description: "리텐션/수익화 구조. 피어 분석 후 설계."
  tier_3:
    label: "Expansion (런칭 후)"
    domains: [Meta, Social, LiveOps]
    description: "장기 리텐션 시스템. 데이터 기반 도입."

# ─────────────────────────────────────
# 2. Domain Parameter Definitions
# ─────────────────────────────────────
domains:

  # ── Tier 1 ──

  InGame:
    tier: 1
    description: "코어 메카닉과 인게임 시스템"
    parameters:
      - name: core_mechanic_type
        description: "퍼즐 메카닉 유형 (match3, sort, merge, connect 등)"
        type: string
        scope: common
        required: true
      - name: board_layout
        description: "보드 구조 (grid, free-form, rail, stack 등)"
        type: string
        scope: common
        required: true
      - name: input_method
        description: "유저 입력 방식 (tap, drag, swipe 등)"
        type: string
        scope: common
        required: true
      - name: match_rule
        description: "매칭/클리어 판정 규칙"
        type: object
        scope: common
        required: true
      - name: hit_structure
        description: "타격 구조 (1:1, 1:N, N:1 등)"
        type: string
        scope: custom
        required: true
      - name: fail_condition
        description: "실패 조건 (move_limit, time_limit, deadlock, overflow 등)"
        type: string
        scope: common
        required: true
      - name: clear_condition
        description: "클리어 조건 (clear_all, target_score, collect_items 등)"
        type: string
        scope: common
        required: true
      - name: object_types
        description: "게임 오브젝트 종류 및 속성"
        type: array
        scope: custom
        required: true
      - name: agent_structure
        description: "플레이어가 조작하는 에이전트 구조"
        type: object
        scope: custom
        required: false
      - name: feedback_design
        description: "팝/클리어/콤보 시 시각/청각/촉각 피드백"
        type: object
        scope: custom
        required: true
      - name: queue_system
        description: "큐/홀더 시스템 구조 (슬롯 수, 대기 방식)"
        type: object
        scope: custom
        required: false
      - name: physics_sim
        description: "물리 시뮬레이션 적용 여부 및 방식"
        type: object
        scope: custom
        required: false
      - name: combo_system
        description: "콤보 시스템 구조 (연속 타격, 체인 등)"
        type: object
        scope: custom
        required: false

  Content:
    tier: 1
    description: "레벨 디자인과 콘텐츠 구조"
    parameters:
      - name: total_levels
        description: "총 레벨 수 (출시 시)"
        type: integer
        scope: common
        required: true
      - name: package_structure
        description: "레벨 묶음 구조 (패키지/챕터/월드)"
        type: string
        scope: common
        required: true
      - name: level_purpose_types
        description: "레벨 용도 분류 (튜토리얼, 노말, 하드, 슈퍼하드, 휴식)"
        type: array
        scope: common
        required: true
      - name: gimmick_list
        description: "기믹 종류 및 해금 스케줄"
        type: array
        scope: custom
        required: true
      - name: gimmick_count
        description: "총 기믹 수"
        type: integer
        scope: custom
        required: true
      - name: tutorial_levels
        description: "튜토리얼 레벨 수 및 배치"
        type: object
        scope: common
        required: true
      - name: beat_chart
        description: "레벨별 난이도/기믹/목적 배치표"
        type: object
        scope: common
        required: true
      - name: level_library
        description: "레벨 데이터 저장 형식 및 구조"
        type: object
        scope: common
        required: true
      - name: level_composition_params
        description: "레벨 구성 파라미터 (색상 수, 풍선 수, 기믹 비율, 버퍼 배수 등)"
        type: object
        scope: custom
        required: true

  Balance:
    tier: 1
    description: "난이도 곡선 및 수치 밸런스"
    parameters:
      - name: difficulty_curve
        description: "난이도 곡선 유형 (sawtooth, linear, step 등)"
        type: string
        scope: common
        required: true
      - name: clear_rate_target
        description: "레벨 유형별 목표 클리어율"
        type: object
        scope: common
        required: true
      - name: star_rating
        description: "스타 판정 기준 (점수, 잔여 무브, 시간 등)"
        type: object
        scope: common
        required: false
      - name: booster_balance
        description: "부스터 효과 및 경제적 가치"
        type: object
        scope: common
        required: false
      - name: color_count_curve
        description: "레벨 진행에 따른 색상/오브젝트 수 변화"
        type: object
        scope: custom
        required: true
      - name: board_complexity_formula
        description: "보드 복잡도 산출 공식"
        type: string
        scope: custom
        required: true
      - name: target_near_miss_rate
        description: "목표 아슬아슬 실패율 (유저가 거의 클리어할 뻔한 비율)"
        type: float
        scope: common
        required: true
      - name: max_hopeless_fail_rate
        description: "허용 최대 절망적 실패율 (처음부터 클리어 불가능한 느낌 비율)"
        type: float
        scope: common
        required: true
      - name: optimal_moves_policy
        description: "최적 무브 수 산출 정책 (시뮬레이션 vs 수동 설계)"
        type: string
        scope: common
        required: true

  # ── Tier 2 ──

  OutGame:
    tier: 2
    description: "인게임 밖 시스템 (라이프, 부스터, 재화)"
    parameters:
      - name: life_system
        description: "라이프/하트 시스템 구조"
        type: object
        scope: common
        required: true
      - name: booster_types
        description: "부스터 종류 및 획득 경로"
        type: array
        scope: common
        required: true
      - name: currency_types
        description: "재화 종류 및 용도"
        type: array
        scope: common
        required: true
      - name: shop_structure
        description: "상점 구조 및 상품 배치"
        type: object
        scope: common
        required: false
      - name: inventory_system
        description: "인벤토리/보관함 시스템"
        type: object
        scope: common
        required: false
      - name: continue_system
        description: "컨티뉴 시스템 (광고 시청/재화 소비로 추가 무브 획득)"
        type: object
        scope: common
        required: false

  BM:
    tier: 2
    description: "비즈니스 모델 및 수익화"
    parameters:
      - name: ad_placement
        description: "광고 배치 (보상형, 인터스티셜, 배너)"
        type: object
        scope: common
        required: true
      - name: iap_packages
        description: "인앱 구매 상품 구조"
        type: array
        scope: common
        required: true
      - name: season_pass
        description: "시즌 패스 구조 (무료/프리미엄 트랙)"
        type: object
        scope: common
        required: false
      - name: starter_pack
        description: "스타터 팩 구성 및 가격"
        type: object
        scope: common
        required: false
      - name: ltv_model
        description: "LTV 예측 모델 (D1, D7, D30)"
        type: object
        scope: common
        required: false
      - name: first_purchase_timing
        description: "첫 구매 유도 타이밍 (레벨, 실패 횟수 등 트리거 조건)"
        type: object
        scope: common
        required: true
      - name: vip_system
        description: "VIP/구독 시스템 구조"
        type: object
        scope: common
        required: false
      - name: ad_free_period
        description: "광고 없는 초기 보호 구간 (첫 N레벨 또는 N분)"
        type: object
        scope: common
        required: true

  UX:
    tier: 2
    description: "유저 경험 및 UI 플로우"
    parameters:
      - name: ftue_flow
        description: "첫 실행 경험 (First Time User Experience) 플로우"
        type: object
        scope: common
        required: true
      - name: screen_flow
        description: "화면 전환 플로우 (메인→게임→결과→메인)"
        type: object
        scope: common
        required: true
      - name: hud_layout
        description: "인게임 HUD 구성 및 배치"
        type: object
        scope: common
        required: true
      - name: popup_types
        description: "팝업 종류 및 트리거 조건"
        type: array
        scope: common
        required: true
      - name: feedback_asymmetry
        description: "연출 비대칭 원칙 정의"
        type: object
        scope: custom
        required: false

  # ── Tier 3 ──

  Meta:
    tier: 3
    description: "메타 시스템 (컬렉션, 업적, 꾸미기)"
    parameters:
      - name: collection_system
        description: "수집 시스템 구조"
        type: object
        scope: common
        required: false
      - name: achievement_system
        description: "업적/도전과제 시스템"
        type: object
        scope: common
        required: false
      - name: decoration_system
        description: "꾸미기/커스터마이징 시스템"
        type: object
        scope: common
        required: false
      - name: profile_progression
        description: "프로필 레벨/경험치 시스템"
        type: object
        scope: common
        required: false

  Social:
    tier: 3
    description: "소셜 시스템 (친구, 랭킹, 협동)"
    parameters:
      - name: friend_system
        description: "친구 시스템 (초대, 하트 교환)"
        type: object
        scope: common
        required: false
      - name: leaderboard
        description: "랭킹/리더보드 시스템"
        type: object
        scope: common
        required: false
      - name: team_event
        description: "팀/길드 이벤트"
        type: object
        scope: common
        required: false

  LiveOps:
    tier: 3
    description: "라이브 운영 (이벤트, 시즌, AB테스트)"
    parameters:
      - name: season_theme
        description: "시즌 테마 교체 구조"
        type: object
        scope: common
        required: false
      - name: daily_challenge
        description: "데일리 챌린지/퀘스트 시스템"
        type: object
        scope: common
        required: false
      - name: win_streak
        description: "연승 보너스 시스템"
        type: object
        scope: custom
        required: false
      - name: limited_event
        description: "기간 한정 이벤트 구조"
        type: object
        scope: common
        required: false
      - name: ab_test_framework
        description: "AB 테스트 프레임워크"
        type: object
        scope: common
        required: false
      - name: remote_config
        description: "리모트 컨피그 시스템"
        type: object
        scope: common
        required: false

# ─────────────────────────────────────
# 3. Common vs Custom Distinction
# ─────────────────────────────────────
parameter_scope:
  common:
    description: "퍼즐 장르 공통 파라미터. 모든 퍼즐 게임에 적용."
    examples:
      - "fail_condition (move_limit, time_limit, overflow 등)"
      - "difficulty_curve (sawtooth, linear 등)"
      - "life_system (하트 충전 시간, 최대 보유량)"
      - "total_levels, package_structure"
      - "level_purpose_types (튜토리얼/노말/하드/슈퍼하드/휴식)"
  custom:
    description: "프로젝트 특화 파라미터. 게임별 고유 설계."
    examples:
      - "hit_structure (BalloonFlow: 1:1 다트→풍선)"
      - "agent_structure (BalloonFlow: 보관함+다트 분리)"
      - "feedback_design (BalloonFlow: ASMR급 비대칭 피드백)"
      - "gimmick_list (BalloonFlow: Hidden, Spawner 투명/불투명, Big Object, Chain)"

# ─────────────────────────────────────
# 4. Schema Definitions
# ─────────────────────────────────────
schemas:

  beat_chart:
    description: "레벨별 난이도/기믹/목적 배치표. 100레벨(5패키지) 기준."
    format: table
    columns:
      - { name: level, type: integer, description: "레벨 번호 (1~100)" }
      - { name: package, type: integer, description: "패키지 번호 (1~5)" }
      - { name: purpose, type: string, description: "레벨 용도 (튜토리얼/노말/하드/슈퍼하드/휴식)" }
      - { name: color_count, type: integer, description: "사용 색상 수" }
      - { name: balloon_count, type: integer, description: "풍선 총 개수" }
      - { name: gimmick, type: string, description: "적용 기믹 (없음/Hidden/Spawner_T/Spawner_O/BigObject/Chain)" }
      - { name: gimmick_ratio, type: float, description: "기믹 풍선 비율 (0.0~1.0)" }
      - { name: target_clear_rate, type: float, description: "목표 클리어율 (0.0~1.0)" }
      - { name: holder_slots, type: integer, description: "보관함 슬롯 수" }
      - { name: difficulty_score, type: float, description: "난이도 점수 (0.0~10.0)" }
      - { name: note, type: string, description: "비고 (특이사항)" }
    package_structure: "5 패키지 x 20 레벨 = 100 레벨"
    level_purpose_distribution:
      튜토리얼: "패키지 1 초반 집중 (레벨 1~5)"
      노말: "전체의 약 50~60%"
      하드: "전체의 약 20~25%"
      슈퍼하드: "전체의 약 5~10% (패키지 3 이후)"
      휴식: "하드/슈퍼하드 직후 배치 (전체의 약 10~15%)"

  hard_level_view:
    description: "하드/슈퍼하드 레벨의 상세 난이도 분석 뷰. 직전 노말 대비 갭을 별도 검증."
    format: table
    columns:
      - { name: level, type: integer, description: "레벨 번호" }
      - { name: purpose, type: string, description: "하드 or 슈퍼하드" }
      - { name: primary_challenge, type: string, description: "주요 난이도 요인" }
      - { name: gimmick_combo, type: string, description: "기믹 조합" }
      - { name: cr_gap_vs_normal, type: float, description: "직전 노말 대비 클리어율 갭 (음수=더 어려움)" }
      - { name: attempts_gap_vs_normal, type: float, description: "직전 노말 대비 평균 시도 횟수 갭" }
      - { name: distance_to_rest, type: integer, description: "다음 휴식 레벨까지의 거리 (레벨 수)" }
      - { name: booster_dependency, type: float, description: "부스터 의존도 (0.0~1.0)" }

  level_library:
    description: "레벨 데이터 저장 형식. LevelDataProvider가 로드하는 구조."
    format: json
    schema:
      level_id: { type: integer, description: "레벨 고유 ID" }
      package_id: { type: integer, description: "패키지 번호" }
      purpose: { type: string, description: "레벨 용도" }
      board:
        layout_type: { type: string, description: "보드 레이아웃 유형" }
        rows: { type: integer }
        cols: { type: integer }
        balloon_positions: { type: array, description: "[{row, col, color, gimmick}]" }
      holders:
        count: { type: integer }
        data: { type: array, description: "[{color, ammo_count}]" }
      rail:
        path_type: { type: string, description: "레일 경로 유형" }
        capacity: { type: integer, description: "레일 최대 수용 다트 수 (홀더 초과 판정 기준)" }
      gimmicks:
        active: { type: array, description: "이 레벨에서 활성화된 기믹 목록" }
      clear_condition:
        type: { type: string }
        target: { type: object }
      star_thresholds: { type: array, description: "[1성, 2성, 3성 기준값]" }

  live_data:
    description: "라이브 서비스 데이터 스키마. Stage 8 동기화 기준."
    raw_data:
      level_play_event: "레벨 시작/완료/실패/취소 이벤트 (level_id, result, attempts, duration, booster_used)"
      item_use_event: "아이템/부스터 사용 이벤트 (item_id, level_id, trigger_reason)"
      purchase_event: "구매 이벤트 (product_id, price, currency, level_at_purchase)"
      economy_event: "재화 획득/소비 이벤트 (currency, amount, reason, balance_after)"
      session_event: "세션 시작/종료 이벤트 (session_id, duration, levels_played)"
      ad_event: "광고 노출/완료/스킵 이벤트 (ad_type, placement, level_id, completed)"
      user_property: "유저 속성 (level_progress, install_date, country, platform)"
    metadata:
      level_meta: "레벨 기본 정보 (level_id, package, purpose, gimmicks, difficulty_score)"
      level_balance_daily: "일별 레벨 밸런스 집계 (clear_rate, avg_attempts, cancel_rate)"
      level_item_daily: "일별 아이템 사용 집계 (item_type, use_count, clear_rate_with_item)"
      level_economy_daily: "일별 경제 지표 (revenue_per_level, ad_views_per_level)"
      level_retention_daily: "일별 리텐션 (churn_at_level, d1_retention, d7_retention)"
      level_ab_test_daily: "AB 테스트 일별 집계 (test_id, variant, metric, value)"
    dashboard_priority:
      priority_1_daily: "매일 확인: clear_rate (목표 범위 이탈 즉시 알림), cancel_rate (0.15 초과 시 경고), churn_rate (레벨별 이탈률)"
      priority_2_weekly: "주간 확인: near_miss_rate (아슬아슬 실패율), 아이템 사용 스파이크 (특정 레벨 쏠림), d7_retention 트렌드"
      priority_3_balance: "밸런스 조정 시: optimal_moves vs avg_moves 갭, booster_dependency 상승 레벨, hard_level cr_gap_vs_normal"

  design_db_format:
    description: "Base Design DB 저장 형식 (MongoDB design_base)"
    fields:
      designId: { type: string, description: "고유 ID (예: BF_InGame_CoreMechanic)" }
      genre: { type: string, description: "Puzzle" }
      domain: { type: string, description: "InGame, Content, Balance 등 9종" }
      system: { type: string, description: "시스템 이름" }
      data_type: { type: string, description: "formula, table, rule, flow, config, content_data" }
      source: { type: string, description: "internal_original, observed, generated 등" }
      score: { type: float, description: "신뢰도 점수 (0.0~1.0)" }
      version: { type: string, description: "시맨틱 버전" }
      project: { type: string, description: "BalloonFlow" }
      provides: { type: array, description: "이 데이터가 제공하는 것" }
      requires: { type: array, description: "이 데이터가 필요로 하는 것" }
      tags: { type: array, description: "분류 태그" }

# ─────────────────────────────────────
# 5. Management Principles
# ─────────────────────────────────────
management_principles:
  - name: "Tier 순서 준수"
    description: "Tier 1(InGame/Content/Balance)이 확정되지 않으면 Tier 2로 넘어가지 않는다."
  - name: "Common 먼저, Custom 나중에"
    description: "Common 파라미터를 먼저 정의하고, 프로젝트별 Custom으로 확장한다."
  - name: "피어 분석 우선"
    description: "Tier 2 도메인(OutGame, BM)은 피어 게임 분석 데이터가 있어야 설계를 시작한다."
  - name: "데이터 기반 도입"
    description: "Tier 3 도메인(Meta, Social, LiveOps)은 실측 데이터(리텐션, DAU 등)가 있어야 도입한다."
  - name: "Beat Chart 중심"
    description: "퍼즐 장르에서 Beat Chart는 레벨 디자인의 핵심 문서. 모든 밸런스/콘텐츠 결정의 기준."
  - name: "프로토타입 검증"
    description: "실패 조건, 기믹 효과, 피드백 품질은 문서가 아닌 프로토타입에서 확정한다."
  - name: "Level Library 표준화"
    description: "레벨 데이터는 Level Library 스키마를 따르며, LevelDataProvider가 일관되게 로드한다."
  - name: "Beat Chart 하한/평균/상한"
    description: "모든 난이도 지표에 하한/평균/상한을 기록한다."
  - name: "Hard Level View"
    description: "하드/슈퍼하드 레벨은 직전 노말 대비 갭을 별도 검증한다."

# ─────────────────────────────────────
# 6. Version History
# ─────────────────────────────────────
